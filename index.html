    <p class="hint">${esc(c.name||"의뢰인")}님에게 보낸·저장한 요청/리마인더 메시지입니다. 다음에 리마인드할 때 참고하세요.</p>
    <div style="max-height:60vh;overflow:auto">${body}</div>
    <div class="modal-actions"><button class="btn btn-primary" onclick="closeModal()">닫기</button></div>`,580);
}
function copyMsgHistory(cid,idx){ const c=findClient(cid); const m=(c&&c.msgLog||[])[idx]; if(!m) return; copyText(m.text).then(ok=>toast(ok?"메시지를 복사했습니다 ✓":"복사 실패 — 직접 선택해 복사하세요")); }
function delMsgHistory(cid,idx){ if(!confirm("이 기록을 삭제할까요?")) return; const c=findClient(cid); if(!c||!c.msgLog) return; c.msgLog.splice(idx,1); touch(`[${c.name}] 메시지 기록 삭제`); openMsgHistory(cid); }
/* ---------- 7c. 내부용 미비서류(직접발급 미수령) 체크·공유 ---------- */
function selfMissingItems(c){
  const list=[];
  TEMPLATE.forEach(b=>b.groups.forEach(g=>g.items.forEach(it=>{ const s=c.items[it.id]; if(s && s.mode==="self" && !s.done) list.push({id:it.id,name:it.name,group:b.title}); })));
  Object.keys(c.extra||{}).forEach(bid=>(c.extra[bid]||[]).forEach(ex=>{ const s=c.items[ex.id]; if(s && s.mode==="self" && !s.done) list.push({id:ex.id,name:ex.name,group:"추가 서류"}); }));
  return list;
}
function openInternalMissing(cid){
  const c=ensureItems(findClient(cid)); const name=(c.name||"의뢰인").trim();
  const list=selfMissingItems(c);
  if(list.length===0){ modal(`<h3>🏢 ${esc(name)}_미비서류</h3><p class="hint">직접발급 서류 중 아직 못 받은 항목이 없습니다 ✓</p><div class="modal-actions"><button class="btn btn-primary" onclick="closeModal()">닫기</button></div>`); return; }
  const rows=list.map(x=>`<label style="display:flex;gap:9px;align-items:flex-start;padding:8px 2px;border-bottom:1px solid var(--line);cursor:pointer">
    <input type="checkbox" style="width:18px;height:18px;margin-top:2px;flex:none" onchange="internalCheck('${cid}','${x.id}',this)">
    <span><b style="font-size:13.5px">${esc(x.name)}</b>${msgWhere(x.id)?`<div style="font-size:11.5px;color:var(--muted)">📍 ${esc(msgWhere(x.id))}</div>`:""}</span></label>`).join("");
  modal(`<h3>🏢 ${esc(name)}_미비서류</h3>
    <p class="hint">사무실에서 <b>직접 발급</b>해야 하는데 아직 못 받은 서류입니다(내부 공유용). 체크하면 '확보 완료'로 저장됩니다. (<b>${list.length}</b>건)</p>
    <div style="max-height:46vh;overflow:auto;border:1px solid var(--line);border-radius:10px;padding:2px 12px">${rows}</div>
    <div style="display:flex;gap:6px;margin-top:12px">
      <button class="btn" style="flex:1" onclick="copyInternalMissing('${cid}',false)">📋 목록 복사</button>
      <button class="btn btn-primary" style="flex:1" onclick="copyInternalMissing('${cid}',true)">복사 + 기록 저장</button>
    </div>
    <div class="modal-actions"><button class="btn" onclick="closeModal();renderDetail('${cid}')">닫기</button></div>`,560);
}
function internalCheck(cid,id,el){
  const c=findClient(cid); const s=c.items[id]; if(!s) return;
  s.done=el.checked;
  if(el.checked){ s.recvDate=now(); s.rejected=false; if(s.mode==="request") s.reqTag="received"; } else { s.recvDate=null; }
  const lab=el.closest("label"); if(lab){ lab.style.opacity=el.checked?"0.5":"1"; const b=lab.querySelector("b"); if(b) b.style.textDecoration=el.checked?"line-through":"none"; }
  touch(`[${c.name}] '${itemName(id,c)}' ${el.checked?"확보 완료":"미확보"} (내부 미비체크)`);
}
function copyInternalMissing(cid,save){
  const c=findClient(cid); const name=(c.name||"의뢰인").trim(); const list=selfMissingItems(c);
  if(list.length===0){ toast("남은 미비서류가 없습니다 ✓"); return; }
  let t=`[${name}_미비서류] 직접발급 필요\n\n`;
  list.forEach((x,i)=>{ t+=`${i+1}. ${x.name}\n`; });
  t+=`\n총 ${list.length}건 · 작성 ${fmt(now())}`;
  copyText(t).then(ok=>{
    if(save){ if(!c.msgLog) c.msgLog=[]; c.msgLog.push({ts:now(),kind:"internal",via:"내부 미비서류",items:list.map(x=>x.name),text:t}); if(c.msgLog.length>60) c.msgLog=c.msgLog.slice(-60); touch(`[${c.name}] 미비서류 목록 기록 저장`); }
    toast(ok?(save?"복사 + 기록 저장 ✓":"미비서류 목록 복사 ✓"):"복사 실패 — 직접 선택해 복사하세요");
  });
}
function copySummary(cid){
  const c=ensureItems(findClient(cid)); const p=progress(c);
  const buckets={recv:[],reqing:[],notreq:[],self:[]};
  const push=(it)=>{ const s=c.items[it.id]; if(!s||s.mode==="na") return;
    if(s.done) buckets.recv.push(it.name);
    else if(s.mode==="request"){ if(s.reqTag==="requesting") buckets.reqing.push(it.name); else buckets.notreq.push(it.name); }
    else buckets.self.push(it.name); };
  TEMPLATE.forEach(b=>b.groups.forEach(g=>g.items.forEach(push)));
  Object.keys(c.extra||{}).forEach(bid=>(c.extra[bid]||[]).forEach(push));
  let t=`[${c.name}] 개인회생 서류 진행상황 (${fmtD(now())})\n`;
  t+=`사건: ${c.caseType||"개인회생"}${c.caseNo?(" "+c.caseNo):""}\n`;
  t+=`확보 ${p.done}/${p.total} (${p.pct}%)\n\n`;
  if(buckets.reqing.length) t+=`■ 요청중(회신 대기): ${buckets.reqing.join(", ")}\n`;
  if(buckets.notreq.length) t+=`■ 미요청(요청 필요): ${buckets.notreq.join(", ")}\n`;
  if(buckets.self.length) t+=`■ 직접발급 예정: ${buckets.self.join(", ")}\n`;
  if(buckets.recv.length) t+=`■ 확보 완료: ${buckets.recv.join(", ")}\n`;
  if(c.memo) t+=`\n[메모] ${c.memo}\n`;
  copyText(t).then(ok=>toast(ok?"진행상황을 복사했습니다 ✓ (노션·시트에 붙여넣기)":"복사 실패"));
}

/* ---------- 7d. 인쇄 / PDF 출력 ---------- */
function printChecklist(cid){
  const c=ensureItems(findClient(cid)); const p=progress(c);
  const stTxt=(s)=>{ if(s.done) return "☑ 확보완료"+(s.recvDate?` (${fmtD(s.recvDate)})`:""); if(s.mode==="na") return "— 해당없음"; if(s.mode==="self") return "☐ 직접발급"; if(s.reqTag==="requesting") return "☐ 요청중"+(s.reqDate?` (${fmtD(s.reqDate)})`:""); return "☐ 요청필요"; };
  let rows="";
  TEMPLATE.forEach((b,bi)=>{
    rows+=`<tr class="bh"><td colspan="3">${bi+1}. ${esc(b.title)}</td></tr>`;
    b.groups.forEach(g=>{ if(g.title) rows+=`<tr class="gh"><td colspan="3">— ${esc(g.title)}</td></tr>`;
      g.items.forEach(it=>{ const s=c.items[it.id]; if(!s) return; rows+=`<tr><td>${esc(it.name)}</td><td>${stTxt(s)}</td><td>${esc(s.memo||"")}</td></tr>`; }); });
    (c.extra[b.id]||[]).forEach(ex=>{ const s=c.items[ex.id]; if(!s) return; rows+=`<tr><td>${esc(ex.name)} (추가)</td><td>${stTxt(s)}</td><td>${esc(s.memo||"")}</td></tr>`; });
  });
  const w=window.open("","_blank"); if(!w){ toast("팝업이 차단되었습니다. 팝업 허용 후 다시 시도하세요"); return; }
  w.document.write(`<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8"><title>${esc(c.name)} 서류 체크리스트</title>
   <style>body{font-family:"Malgun Gothic","맑은 고딕",sans-serif;padding:24px;color:#1f2540}h1{font-size:20px;margin:0 0 4px}.sub{color:#555;font-size:13px;margin-bottom:6px}table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:10px}td,th{border:1px solid #c5c9d6;padding:6px 9px;vertical-align:top;text-align:left}tr.bh td{background:#3b5bdb;color:#fff;font-weight:800}tr.gh td{background:#eef0f6;font-weight:700;color:#2f49bf}th{background:#f0f2f8}@media print{.noprint{display:none}}</style></head>
   <body><h1>${esc(c.name)} — 개인회생 서류 체크리스트</h1>
   <div class="sub">${esc(c.caseType||"개인회생")}${c.caseNo?(" · "+esc(c.caseNo)):""}${(c.incomeType&&c.incomeType!=="미정")?(" · "+esc(c.incomeType)):""} · 확보 ${p.done}/${p.total} (${p.pct}%) · 출력일 ${fmtD(now())}</div>
   ${c.memo?`<div class="sub">메모: ${esc(c.memo)}</div>`:""}
   <button class="noprint" onclick="window.print()" style="margin:10px 0;padding:9px 16px;font-size:14px;font-weight:700;border:1px solid #3b5bdb;background:#3b5bdb;color:#fff;border-radius:8px;cursor:pointer">🖨️ 인쇄 / PDF로 저장</button>
   <table><thead><tr><th style="width:45%">서류</th><th style="width:25%">상태</th><th>메모</th></tr></thead><tbody>${rows}</tbody></table></body></html>`);
  w.document.close();
  setTimeout(()=>{ try{ w.focus(); w.print(); }catch(_){} }, 500);
}

function exportData(){
  const blob=new Blob([JSON.stringify(state,null,1)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="서류취합_백업_"+fmtD(now()).replace("/","-")+".json"; a.click();
  toast("백업 파일을 내려받았습니다");
}
function importData(){
  const inp=document.createElement("input"); inp.type="file"; inp.accept=".json,application/json";
  inp.onchange=()=>{ const f=inp.files[0]; if(!f) return; const r=new FileReader();
    r.onload=()=>{ try{ const d=JSON.parse(r.result);
      if(!confirm("현재 데이터를 이 백업으로 교체할까요? (되돌릴 수 없습니다)")) return;
      state=d; if(!state.clients)state.clients=[]; if(!state.log)state.log=[]; state.clients.forEach(ensureItems);
      touch("백업 파일에서 데이터 복원"); showDashboard(); toast("복원 완료 ✓");
    }catch(e){ toast("올바른 백업 파일이 아닙니다"); } };
    r.readAsText(f); };
  inp.click();
}

function openSnapshots(){
  const snaps=getSnapshots();
  const rows=snaps.length? snaps.map((s,i)=>`<div class="log-row">
    <div class="log-ts">${fmt(s.ts)}</div>
    <div class="log-who">${esc(s.by||'?')}</div>

    <button class="btn btn-sm" onclick="restoreSnapshot(${i})">되돌리기</button></div>`).join("")
    : `<div class="log-row"><div class="log-txt" style="color:var(--muted)">아직 스냅샷이 없습니다.</div></div>`;
  modal(`<h3>🕘 스냅샷에서 되돌리기</h3>
    <p class="hint">변경할 때마다 자동 저장된 시점입니다. 실수로 지웠거나 잘못 바꿨을 때 그 시점으로 되돌립니다.</p>
    <div class="log-list" style="max-height:55vh;overflow:auto">${rows}</div>
    <div class="modal-actions"><button class="btn" onclick="openSettings()">← 설정</button><button class="btn" onclick="closeModal()">닫기</button></div>`,660);
}
function restoreSnapshot(i){
  const snaps=getSnapshots(); const s=snaps[i]; if(!s) return;
  if(!confirm(`${fmt(s.ts)} 시점(의뢰인 ${s.clients}명)으로 되돌릴까요? 지금 내용은 스냅샷에 백업됩니다.`)) return;
  pushSnapshot();

  touch("스냅샷 복구: "+fmt(s.ts)); showDashboard(); toast("되돌렸습니다 ✓");

async function connectGithub(){

  cfg.owner=($("#s_owner")?$("#s_owner").value.trim():"")||DEFAULT_OWNER;
  cfg.repo=($("#s_repo")?$("#s_repo").value.trim():"")||DEFAULT_REPO;

  saveCfg();
  if(!githubReady()){ updateSyncPill(); toast("저장됨 · 깃헙 동기화는 owner/repo/토큰을 모두 입력하세요"); return; }

}

function _ibSlotsHtml(q){
  q=(q||"").trim().toLowerCase(); const c=findClient(_ibCid); if(!c) return ""; let body="";
  TEMPLATE.forEach(b=>{
    const rows=[];
    b.groups.forEach(g=>g.items.forEach(it=>{ if(!q||it.name.toLowerCase().includes(q)) rows.push({id:it.id,name:it.name,note:it.note}); }));
    ((c.extra&&c.extra[b.id])||[]).forEach(ex=>{ if(!q||(ex.name||"").toLowerCase().includes(q)) rows.push({id:ex.id,name:ex.name,note:"추가서류"}); });
    if(!rows.length) return;
    body+=`<div class="ib-sgrp">${esc(b.title)}</div>`;
    rows.forEach(it=>{ const nt=(it.note||"").slice(0,16); body+=`<div class="ib-sitem" data-s="${esc(it.id)}"><span>${esc(it.name)}</span>${nt?`<span class="nt">${esc(nt)}</span>`:""}</div>`; });

async function _ibUploadFile(c, fobj, slot){

async function _ibDoAssign(slot){

function _ibPgBoxSelect(x1,y1){ const g=$("#ibPgGrid"); if(!g)return; const l=Math.min(_ibPgSX,x1),r=Math.max(_ibPgSX,x1),t=Math.min(_ibPgSY,y1),b=Math.max(_ibPgSY,y1);
  _ibSplitSel=new Set(_ibPgBase);
  [...g.children].forEach(c=>{ if(c.classList.contains("done"))return; const p=+c.dataset.p; if(!p)return; const q=c.getBoundingClientRect(); const hit=!(q.right<l||q.left>r||q.bottom<t||q.top>b); if(hit) _ibSplitSel.add(p); });

function _ibSetupPgDrag(g){ if(!g)return;

    if(e.pointerType==="mouse"){ e.preventDefault(); _ibPgPending=true; _ibPgActive=false; _ibPgBase=new Set(_ibSplitSel); document.body.style.userSelect="none"; } };
  g.onpointermove=e=>{ if(!_ibPgPending)return; if(!_ibPgActive){ if(Math.abs(e.clientX-_ibPgSX)<5&&Math.abs(e.clientY-_ibPgSY)<5)return; _ibPgActive=true; } _ibPgDrawBox(e.clientX,e.clientY); _ibPgBoxSelect(e.clientX,e.clientY); };
  if(!window._ibPgUpOn){ window._ibPgUpOn=true; window.addEventListener("pointerup",e=>{
    document.body.style.userSelect="";
    if(_ibPgActive){ _ibPgActive=false; _ibPgPending=false; _ibPgClearBox(); _ibPgDownCell=null; _ibPgDownType=""; return; }
    if(_ibPgDownCell && !_ibPgDownCell.classList.contains("done")){ const dx=Math.abs(e.clientX-_ibPgSX),dy=Math.abs(e.clientY-_ibPgSY); if(dx<12&&dy<12){ const p=+_ibPgDownCell.dataset.p; if(_ibSplitSel.has(p))_ibSplitSel.delete(p); else _ibSplitSel.add(p); _ibPgRefresh(); } }

async function _ibDrawPages(f){ const grid=$("#ibPgGrid"); if(!grid) return; if(!_ibIsPdf(f)){ grid.innerHTML='<div style="padding:20px;color:#777">PDF만 분할할 수 있어요.</div>'; return; }

function _ibAssignSplit(){ if(_ibSplitSel.size===0){ toast("페이지를 먼저 선택하세요"); return; } _ibOpenPick("split"); }
function _ibRangeLabel(pages){ const out=[]; let a=pages[0],prev=pages[0];
  for(let i=1;i<=pages.length;i++){ const p=pages[i]; if(p===prev+1){ prev=p; continue; } out.push(a===prev?String(a):a+"-"+prev); a=p; prev=p; }

async function _ibBuildSplit(slot){

  const pages=[..._ibSplitSel].sort((a,b)=>a-b); if(!pages.length) return;
  _ibBusy=true; toast("PDF 자르는 중…");
  try{
    const PDFLib=await loadPdfLib();
    const ab=await f.file.arrayBuffer();
    const src=await PDFLib.PDFDocument.load(ab,{ignoreEncryption:true});
    const out=await PDFLib.PDFDocument.create();
    const cp=await out.copyPages(src,pages.map(p=>p-1)); cp.forEach(p=>out.addPage(p));
    const bytes=await out.save();
    const buf=await new Blob([bytes],{type:"application/pdf"}).arrayBuffer();
    const b64=arrayBufferToBase64(buf);
    const sName=safeName(itemName(slot,c))||"서류";
    const pieceName=`${sName}_p${_ibRangeLabel(pages)}.pdf`;
    toast("저장 중…");
    const j=await gwUpload(clientFolder(c), pieceName, "application/pdf", b64);
    const s=c.items[slot]; if(!s.files) s.files=[];
    s.files.push({name:pieceName,size:buf.byteLength,driveId:j.id,by:deviceName||"미설정",ts:now()});

async function _ibSaveOriginal(c,f){

function sbNorm(s){ return (s||"").replace(/\s/g,""); }
const SB_NAME2ID={}; TEMPLATE.forEach(b=>b.groups.forEach(g=>g.items.forEach(it=>{ SB_NAME2ID[sbNorm(it.name)]=it.id; })));

/* 케이스허브 status → 화면 항목 상태로 환원.
   ★ 원래 화면 로직 존중: 기본 표시여부(mode=na 등)는 템플릿/소득유형 로직(applyTags)이 정하고,
     여기서는 받음/요청중/보완필요/해당없음만 덮어쓴다. '미요청'은 기본값 그대로(해당없음 숨김 유지). */
function sbApplyStatus(s, status, reason){
  if(status==="해당없음"){ s.mode="na"; return; }
  if(status==="받음"){ s.done=true; s.reqTag="received"; }
  else if(status==="요청중"){ s.reqTag="requesting"; }
  else if(status==="보완필요"){ s.rejected=true; s.rejectReason=reason||""; }
  // '미요청'은 손대지 않음(템플릿 기본 표시여부 유지)
  if((status==="받음"||status==="요청중"||status==="보완필요") && s.mode==="na") s.mode="request"; // 받았는데 숨김이면 보이게
}
/* Supabase 한 줄(clients row) + 그 의뢰인의 체크리스트 줄들 → 화면 client 객체로 재조립 */
function sbBuildClient(row, rows, docs, memos, secret){
  let aj={}; try{ aj=(typeof row.app_json==="string")?JSON.parse(row.app_json):(row.app_json||{}); }catch(_){ aj={}; }
  const c={ id:row.id, name:row.name, caseType:row.case_type||"개인회생", assignee:row.assignee||"",
    caseNo:row.case_no||"", phone:row.phone||"", incomeType:row.income_type||"", housing:aj.housing||"미정",
    assets: row.asset_type ? String(row.asset_type).split(",").map(x=>x.trim()).filter(Boolean) : [],
    pinned:!!row.pinned, urgent:!!row.urgent, archived:!!row.archived,
    stage: SB_STAGE_BACK[row.stage]||"서류수집", deadline: row.court_deadline||null,
    deadlineLabel: row.deadline_kind||"보정기한", amending:!!(row.amending||row.correcting),
    memo:"", items:{}, extra:{}, cert:{files:[],pw:""}, timeline:Array.isArray(aj.timeline)?aj.timeline:[], msgLog:Array.isArray(aj.msgLog)?aj.msgLog:[],
    firm: aj.firm || sbFirmFromOffice(row.office_id) || cfg.firmName, isPublic:!!row.is_public, createdAt: row.created_at, updatedAt: row.updated_at, _sbId: row.id, office_id: row.office_id };
  ensureItems(c);   // 화면 기본 서류목록(템플릿) 깔기
  applyTags(c);     // 소득유형·주거·재산에 따른 기본 표시여부(해당없음 자동 숨김 등) — 원래 앱과 동일
  (rows||[]).forEach(r=>{
    let id = (r.doc_key && ITEM_BY_ID[r.doc_key]) ? r.doc_key : SB_NAME2ID[sbNorm(r.doc_name)];
    if(id && c.items[id]){
      sbApplyStatus(c.items[id], r.status, r.reject_reason);
      if(r.memo) c.items[id].memo=r.memo;
      c.items[id]._sbRow=r.id;
    } else {                       // 템플릿에 없는 서류 → 추가서류(extra)로
      const bid=SB_BUNDLE_BID[r.bundle]||"b5", xid="sb_"+r.id;
      c.items[xid]={ mode:"request", reqTag:"none", done:false, memo:r.memo||"", reqDate:null, recvDate:null, link:"", rejected:false, rejectReason:"", files:[], manual:true, _sbRow:r.id };
      sbApplyStatus(c.items[xid], r.status, r.reject_reason);
      (c.extra[bid]=c.extra[bid]||[]).push({ id:xid, name:r.doc_name||"서류", mode:c.items[xid].mode });
    }
  });
  /* 첨부파일(documents) 붙이기 → 새로고침해도 유지. 케이스허브 전용 '접수'서류는 서류취합 화면에 안 붙임 */
  (docs||[]).forEach(d=>{
    if(d.kind==="접수") return;
    let id=(d.doc_key && c.items[d.doc_key])?d.doc_key:null;
    if(!id){ id="doc_"+d.id; if(!c.items[id]){ c.items[id]={mode:"request",reqTag:"received",done:true,memo:"",reqDate:null,recvDate:d.created_at,link:"",rejected:false,rejectReason:"",files:[],manual:true}; (c.extra["b5"]=c.extra["b5"]||[]).push({id,name:d.file_name||"첨부",mode:"request"}); } }
    const s=c.items[id]; if(!s.files) s.files=[];
    s.files.push({ name:d.file_name, size:0, driveId:d.storage_path, by:d.uploaded_by||"", ts:d.created_at, docId:d.id, is_public:!!d.is_public });
  });
  /* 의뢰인 메모 / 인증서 붙이기 */
  const _memo=(memos||[]).find(x=>x.kind!=="접수")||null; if(_memo){ c.memo=_memo.body||""; c._sbMemoId=_memo.id; }
  if(secret){ c.cert={ files:Array.isArray(secret.cert_files)?secret.cert_files:[], pw:secret.password||"" }; c._sbSecretId=secret.id; }
  /* ②쓰기 기준선: 지금 서버에 있는 값을 기록(이후 바뀐 것만 저장) */
  Object.keys(c.items).forEach(id=>{ try{ c.items[id]._sbSig=sbItemSig(c,id,c.items[id]); }catch(_){} });
  c._sbSig=sbClientSig(c); c._sbMemo=c.memo||""; c._sbCertSig=JSON.stringify({f:(c.cert&&c.cert.files)||[],p:(c.cert&&c.cert.pw)||""});
  return c;
}

/* Supabase에서 전체 읽어와 화면에 표시 (읽기 전용) */
async function pullFromSupabase(silent){

      sb.from("secrets").select("id,client_id,cert_files,password"),
      sb.from("offices").select("id,name"),

    ]);
    if(cRes.error) throw cRes.error;
    if(ciRes.error) throw ciRes.error;
    SB_OFFICES=(oRes&&oRes.data)||[];   // 사무소(이준/블루) 매핑용
    const byClient={}; (ciRes.data||[]).forEach(r=>{ (byClient[r.client_id]=byClient[r.client_id]||[]).push(r); });
    const docBy={}; ((dRes&&dRes.data)||[]).forEach(d=>{ (docBy[d.client_id]=docBy[d.client_id]||[]).push(d); });
    const memoBy={}; ((mRes&&mRes.data)||[]).forEach(m=>{ (memoBy[m.client_id]=memoBy[m.client_id]||[]).push(m); });
    const secBy={}; ((sRes&&sRes.data)||[]).forEach(s=>{ secBy[s.client_id]=s; });
    const clients=(cRes.data||[]).map(row=> sbBuildClient(row, byClient[row.id]||[], docBy[row.id]||[], memoBy[row.id]||[], secBy[row.id]||null) );
    state={ clients, log:(state&&state.log)||[], updatedAt: now(), updatedBy: deviceName||"미설정", _ver:8 };
    saveLocal();
    currentClientId=null; renderDashboard();
    setSync("ok");
    if(!silent) toast("케이스허브에서 불러왔습니다 ✓");
    /* 검증용 콘솔 로그: 화면 완료율 vs 서버(my_progress) 비교 */
    try{ const pg={}; (pRes&&pRes.data||[]).forEach(p=>pg[p.client_id]=p);
      console.log("[읽기검증] 의뢰인 "+clients.length+"명");
      clients.forEach(c=>{ const mine=progress(c), srv=pg[c._sbId]||{};
        console.log("  "+c.name+" | 화면 "+mine.done+"/"+mine.total+"("+mine.pct+"%)  서버 "+(srv.done)+"/"+(srv.total)+"("+srv.pct+"%)"); });
    }catch(_){}
    return true;
  }catch(e){ console.error(e); setSync("error"); showBanner("케이스허브 읽기 오류: "+(e.message||e),"err"); return false; }
}

/* ============================================================

const BID_BUNDLE={b1:"기본서류",b2:"채권자목록",b3:"재산",b4:"수입지출",b5:"기타",b6:"통장거래내역",b7:"경위서"};

function isUuid(v){ return typeof v==="string" && /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(v); }
/* 화면 항목 상태 → 케이스허브 status (데이터매핑 3번 규칙) */
function sbStatusFwd(s){ if(!s) return "미요청"; if(s.mode==="na") return "해당없음"; if(s.rejected) return "보완필요"; if(s.done) return "받음"; if(s.mode==="request"&&s.reqTag==="requesting") return "요청중"; return "미요청"; }
function sbItemMeta(c,id){

function sbItemSig(c,id,s){ const m=sbItemMeta(c,id)||{}; return sbStatusFwd(s)+"|"+(s.rejectReason||"")+"|"+(s.memo||"")+"|"+(m.bundle||"")+"|"+(m.name||""); }
/* 사무소(이준/블루) ↔ office_id 매핑 (SB_OFFICES는 pull에서 채움) */
let SB_OFFICES=[];
function sbFirmFromOffice(oid){ const o=SB_OFFICES.find(x=>x.id===oid); if(!o) return null; const n=o.name||""; if(n.includes("블루")) return "법률사무소 블루"; if(n.includes("이준")) return "법무법인 이준 서초 분사무소"; return n; }
function sbOfficeFromFirm(firm){ const blue=(firm||"").includes("블루"); const o=SB_OFFICES.find(x=> blue ? (x.name||"").includes("블루") : (x.name||"").includes("이준")); return o? o.id : OURS_OFFICE_ID; }
/* 화면 전용 항목(케이스허브 칸 없음)을 보존: 사무소·주거유형·보낸메시지·상담기록 */
function sbAppJson(c){ return { firm:c.firm||null, housing:c.housing||"미정", msgLog:Array.isArray(c.msgLog)?c.msgLog:[], timeline:Array.isArray(c.timeline)?c.timeline:[] }; }
function sbClientPayload(c){ return { name:c.name||"이름없음", case_type:c.caseType||"개인회생", assignee:c.assignee||null,
  stage: SB_STAGE_FWD[clientStage(c)]||"서류취합중", phone:c.phone||null, income_type:c.incomeType||null,
  asset_type:(c.assets&&c.assets.length)?c.assets.join(","):null, court_deadline:c.deadline||null, deadline_kind:c.deadlineLabel||null,
  urgent:!!c.urgent, pinned:!!c.pinned, archived:!!c.archived, amending:!!c.amending, case_no:c.caseNo||null,
  is_public:!!c.isPublic, app_json: sbAppJson(c) }; }
/* office_id는 의뢰인 저장 페이로드에서 제외 — 수정 시 관리자가 정한 사무소를 덮어쓰지 않도록. 신규 생성 때만 아래에서 지정. */
function sbClientSig(c){ return JSON.stringify(sbClientPayload(c)); }

async function sbSyncClient(c){
  const sig=sbClientSig(c);
  const payload=sbClientPayload(c); payload.updated_at=new Date().toISOString();
  if(!isUuid(c.id)){                       // 앱에서 새로 만든 의뢰인 → insert
    payload.office_id = sbOfficeFromFirm(c.firm) || OURS_OFFICE_ID;   // 신규 생성 때만 사무소 지정(수정 시엔 보존)
    const {data,error}=await sb.from("clients").insert(payload).select("id").single();
    if(error) throw error;
    const oldId=c.id; c.id=data.id; if(currentClientId===oldId) currentClientId=c.id;
    c._sbSig=null;                         // 새 의뢰인은 항목 전부 insert
  } else if(c._sbSig!==sig){               // 기존 의뢰인 정보 변경 → update
    const {error}=await sb.from("clients").update(payload).eq("id",c.id);
    if(error) throw error;
  }
  // 체크리스트: 바뀐 줄만
  const jobs=[];
  Object.keys(c.items).forEach(id=>{
    const s=c.items[id]; const meta=sbItemMeta(c,id); if(!meta) return;
    const status=sbStatusFwd(s); const isig=sbItemSig(c,id,s); const dkey=ITEM_BY_ID[id]?id:(s.doc_key||null);
    if(s._sbRow){
      if(s._sbSig!==isig){ jobs.push(sb.from("checklist_items").update({status,reject_reason:s.rejectReason||null,memo:s.memo||null,doc_key:dkey,bundle:meta.bundle,doc_name:meta.name}).eq("id",s._sbRow).then(r=>{ if(r.error) throw r.error; s._sbSig=isig; })); }
    } else {
      jobs.push(sb.from("checklist_items").insert({client_id:c.id,doc_key:dkey,doc_name:meta.name,bundle:meta.bundle,status,reject_reason:s.rejectReason||null,memo:s.memo||null}).select("id").single().then(r=>{ if(r.error) throw r.error; s._sbRow=r.data.id; s._sbSig=isig; }));
    }
  });
  if(jobs.length) await Promise.all(jobs);
  // 첨부파일 메타(documents): 아직 기록 안 된 새 파일만 insert
  const docJobs=[];
  Object.keys(c.items).forEach(id=>{
    const s=c.items[id]; if(!s.files||!s.files.length) return;
    const dkey=ITEM_BY_ID[id]?id:(s.doc_key||id);
    s.files.forEach(f=>{ if(f.driveId && !f.docId){ docJobs.push(sb.from("documents").insert({client_id:c.id,doc_key:dkey,file_name:f.name,storage_path:f.driveId,uploaded_by:f.by||deviceName||"직원",is_public:!!f.is_public,kind:"취합"}).select("id").single().then(r=>{ if(r.error) throw r.error; f.docId=r.data.id; })); } });
  });
  if(docJobs.length) await Promise.all(docJobs);
  // 의뢰인 메모(한 줄로 유지)
  if((c.memo||"")!==(c._sbMemo||"")){
    if(c._sbMemoId){ const {error}=await sb.from("memos").update({body:c.memo||""}).eq("id",c._sbMemoId); if(error) throw error; }
    else if(c.memo){ const {data,error}=await sb.from("memos").insert({client_id:c.id,body:c.memo,author:deviceName||"직원",is_public:false,kind:"취합"}).select("id").single(); if(error) throw error; c._sbMemoId=data.id; }
    c._sbMemo=c.memo||"";
  }
  // 인증서·비번(고보안)
  const certSig=JSON.stringify({f:(c.cert&&c.cert.files)||[],p:(c.cert&&c.cert.pw)||""});
  if(certSig!==(c._sbCertSig||JSON.stringify({f:[],p:""}))){
    const hasCert=c.cert&&((c.cert.pw)||(c.cert.files&&c.cert.files.length));
    if(c._sbSecretId){ const {error}=await sb.from("secrets").update({cert_files:(c.cert&&c.cert.files)||[],password:(c.cert&&c.cert.pw)||null}).eq("id",c._sbSecretId); if(error) throw error; }
    else if(hasCert){ const {data,error}=await sb.from("secrets").insert({client_id:c.id,cert_files:(c.cert.files)||[],password:c.cert.pw||null,staff_only:true}).select("id").single(); if(error) throw error; c._sbSecretId=data.id; }
    c._sbCertSig=certSig;
  }
  c._sbSig=sbClientSig(c);
}

async function pushToSupabase(silent){
  if(!sbInit()||!sbUser) return false;
  setSync("saving");
  try{
    const delUuids=(state.deleted||[]).filter(isUuid);
    if(delUuids.length){ try{ await sb.from("clients").delete().in("id",delUuids); }catch(_){} }
    for(const c of (state.clients||[])){ await sbSyncClient(c); }
    setSync("ok");
    if(!silent) toast("케이스허브에 저장됨 ✓");
    return true;
  }catch(e){ console.error(e); setSync("error"); showBanner("케이스허브 저장 오류: "+(e.message||e),"err"); return false; }
}

function boot(){
  let loaded=false;
  try{ const d=localStorage.getItem(LS_DATA); if(d){ state=JSON.parse(d); loaded=true; } }catch(_){}
  if(!loaded){ // 1차 복구: 직전본
    try{ const b=localStorage.getItem(LS_DATA_BAK); if(b){ state=JSON.parse(b); loaded=true; toast("직전 저장본에서 복구했습니다"); } }catch(_){}
  }
  if(!loaded){ // 2차 복구: 최신 스냅샷
    try{ const snaps=getSnapshots(); if(snaps.length){ state=JSON.parse(snaps[0].data); loaded=true; toast("자동 스냅샷에서 복구했습니다"); } }catch(_){}
  }
  try{ const c=localStorage.getItem(LS_CFG); if(c) cfg=Object.assign(cfg,JSON.parse(c)); }catch(_){}
  if(!state.clients) state.clients=[]; if(!state.log) state.log=[];
  try{ _trimStorage(SNAP_MAX); }catch(_){}   // 시작 시 오래된 자동백업 정리(용량 확보)
  state.clients.forEach(ensureItems);
  if(migrateIfNeeded()) saveLocal();
  updateSyncPill();
  renderDashboard();
  if(location.protocol==="file:"){ showBanner("⚠️ <b>이 파일이 아니라 인터넷 링크(github.io 주소)로 여세요.</b> 파일로 열면 다른 기기와 동기화·자동연결이 되지 않고, 입력이 이 컴퓨터에만 남습니다.","warn"); }
  if(BACKEND==="supabase"){
    if(sbInit()){
      sb.auth.getSession().then(({data})=>{
        if(data && data.session){ sbUser=data.session.user; pullFromSupabase(true); }
        else { showLoginGate(""); }
      }).catch(()=>showLoginGate(""));
    } else { showLoginGate("로그인 모듈 로딩 실패 — 새로고침 해주세요"); }
  } else if(githubReady()){ pullFromGithub(true).then(()=>startPolling()); }
}
window.addEventListener("DOMContentLoaded",boot);
window.addEventListener("beforeunload",()=>{ saveLocal(); });
</script>
