<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>개인회생 서류 취합 시스템</title>
<style>
  :root{
    --bg:#FAF9F7; --panel:#ffffff; --line:#ECE7E1; --ink:#1C1917; --muted:#857D76;
    --brand:#9B1B33; --brand-dark:#7A1427; --brand-soft:#F7E7EB; --green:#059669; --green-soft:#DCF5E8;
    --amber:#D97706; --amber-soft:#FCEFD3; --red:#DC2626; --red-soft:#FCE4E4;
    --gray:#A8A29E; --gray-soft:#F1EDE9; --shadow:0 2px 10px rgba(60,40,30,.05);
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Malgun Gothic","맑은 고딕",-apple-system,"Apple SD Gothic Neo",sans-serif;
    background:var(--bg);color:var(--ink);font-size:15.5px;line-height:1.55;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;font-size:14px;}
  .hidden{display:none !important;}

  /* Header */
  header{background:var(--panel);border-bottom:1px solid var(--line);padding:12px 20px;
    display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:50;}
  header h1{font-size:18px;margin:0;font-weight:900;letter-spacing:-.4px;}
  header .sub{color:var(--muted);font-size:12.5px;}
  .grow{flex:1;}
  .sync-pill{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;
    padding:6px 11px;border-radius:999px;background:var(--gray-soft);color:var(--muted);border:1px solid var(--line);}
  .sync-pill .dot{width:8px;height:8px;border-radius:50%;background:var(--gray);}
  .sync-on{background:var(--green-soft);color:var(--green);border-color:#bfe9d0;}
  .sync-on .dot{background:var(--green);}
  .sync-err{background:var(--red-soft);color:var(--red);border-color:#f2c4c4;}
  .sync-err .dot{background:var(--red);}

  .btn{border:1px solid var(--line);background:#fff;color:var(--ink);padding:8px 13px;border-radius:9px;
    font-weight:700;font-size:13.5px;}
  .btn:hover{background:var(--gray-soft);}
  .btn-primary{background:var(--brand);color:#fff;border-color:var(--brand);box-shadow:0 4px 14px rgba(155,27,51,.22);}
  .btn-primary:hover{background:var(--brand-dark);border-color:var(--brand-dark);}
  .btn-sm{padding:5px 9px;font-size:12.5px;border-radius:9px;}
  .btn-ghost{border-color:transparent;background:transparent;color:var(--muted);box-shadow:none;}
  .btn-danger{color:var(--red);border-color:#f3c9c9;background:var(--red-soft);box-shadow:none;}

  .wrap{max-width:1120px;margin:0 auto;padding:22px 20px 80px;}

  /* Dashboard */
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap;}
  .search{flex:1;min-width:200px;display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);
    border-radius:10px;padding:8px 12px;box-shadow:var(--shadow);}
  .search input{border:none;outline:none;flex:1;font-size:14.5px;background:transparent;}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow);
    cursor:pointer;transition:transform .08s,box-shadow .12s;}
  .card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(60,40,30,.08);}
  .card.arch{opacity:.62;}
  .card-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .card-name{font-size:17px;font-weight:900;letter-spacing:-.4px;}
  .badge{font-size:11.5px;font-weight:800;padding:3px 9px;border-radius:7px;background:var(--brand-soft);color:var(--brand);}
  .badge.회생{background:var(--brand-soft);color:var(--brand);}
  .badge.파산{background:var(--amber-soft);color:var(--amber);}
  .badge.기타{background:var(--gray-soft);color:var(--muted);}
  .meta{font-size:12.5px;color:var(--muted);margin-bottom:12px;}
  .bar{height:9px;border-radius:999px;background:#EBE6E0;overflow:hidden;margin-bottom:6px;}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,#e14b6f,#9B1B33);border-radius:999px;transition:width .5s;}
  .card-stats{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
  .chip{font-size:11.5px;font-weight:700;padding:3px 8px;border-radius:7px;background:var(--gray-soft);color:var(--muted);}
  .chip.req{background:var(--amber-soft);color:var(--amber);}
  .chip.wait{background:var(--brand-soft);color:var(--brand);}
  .chip.miss{background:var(--red-soft);color:var(--red);}
  .chip.ok{background:var(--green-soft);color:var(--green);}
  .empty{text-align:center;color:var(--muted);padding:60px 20px;}
  .empty .big{font-size:48px;margin-bottom:8px;}

  /* Detail */
  .back{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-weight:700;background:none;border:none;
    padding:0;margin-bottom:14px;font-size:14px;}
  .detail-head{display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:8px;}
  .detail-head h2{margin:0;font-size:24px;font-weight:800;letter-spacing:-.4px;}
  .overall{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin:14px 0 18px;box-shadow:var(--shadow);}
  .overall .pct{font-size:30px;font-weight:800;color:var(--green);}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .fbtn{border:1px solid var(--line);background:#fff;color:var(--muted);padding:6px 13px;border-radius:999px;font-size:12.5px;font-weight:700;transition:all .12s;}
  .fbtn:hover{border-color:rgba(155,27,51,.3);}
  .fbtn.active{background:var(--brand);color:#fff;border-color:var(--brand);box-shadow:0 3px 10px rgba(155,27,51,.22);}

  /* ── 상세: 컨트롤바 · 2단 레이아웃 · 묶음 탭 · 목록형 ── */
  .ctrlbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px;background:#fff;border:1px solid var(--line);border-radius:13px;padding:8px 10px;box-shadow:var(--shadow);}
  .iconbtn{border:1px solid var(--line);background:#fff;color:var(--ink);font-weight:700;font-size:13px;padding:8px 13px;border-radius:9px;transition:all .12s;}
  .iconbtn:hover{background:var(--gray-soft);}
  .iconbtn.on{background:var(--brand);color:#fff;border-color:var(--brand);}
  .segview{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;}
  .segview button{border:none;background:#fff;color:var(--muted);font-weight:700;font-size:13px;padding:8px 13px;border-right:1px solid var(--line);}
  .segview button:last-child{border-right:none;}
  .segview button.on{background:var(--ink);color:#fff;}
  .ctrl-sel{border:1px solid var(--line);border-radius:9px;padding:8px 12px;font-weight:700;font-size:13px;background:#fff;color:var(--ink);min-width:120px;}
  .selbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--brand-soft);border:1px solid #ECD2DA;border-radius:13px;padding:10px 13px;margin-bottom:12px;font-size:13.5px;}
  .detail-grid{display:grid;grid-template-columns:236px 1fr;gap:16px;align-items:start;}
  .detail-grid.navclosed{grid-template-columns:1fr;}
  .detail-grid.navclosed .bnav{display:none;}
  .bnav{position:sticky;top:78px;display:flex;flex-direction:column;gap:3px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:7px;box-shadow:var(--shadow);max-height:calc(100vh - 96px);overflow:auto;}
  .bnav-item{display:flex;align-items:center;justify-content:space-between;gap:8px;text-align:left;border:none;background:none;border-radius:10px;padding:9px 10px;font-size:12.5px;font-weight:700;color:var(--ink);cursor:pointer;line-height:1.3;}
  .bnav-item:hover{background:var(--gray-soft);}
  .bnav-item.on{background:var(--brand-soft);color:var(--brand);}
  .bnav-item > span:first-child{display:flex;align-items:center;min-width:0;}
  .bnav-item .bn{display:inline-flex;width:18px;height:18px;border-radius:5px;background:var(--gray-soft);color:var(--muted);align-items:center;justify-content:center;font-size:11px;font-weight:800;margin-right:7px;flex:0 0 auto;}
  .bnav-item.on .bn{background:var(--brand);color:#fff;}
  .bnp{font-size:11.5px;color:var(--muted);font-weight:800;flex:0 0 auto;}
  .bnp.fdone{color:var(--green);}
  .checklist{min-width:0;}
  .bundle-body.listmode{padding:2px 10px 8px;}
  .lrow{display:flex;align-items:center;gap:11px;padding:9px 6px;border-top:1px solid var(--line);}
  .lrow:first-child{border-top:none;}
  .lrow.done{background:#E7F7EC;border-radius:8px;border-top-color:transparent;}
  .lrow.done .chk{background:var(--green);border-color:var(--green);}
  .lname{flex:1;min-width:0;font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .lrow.done .lname{color:#2C6B48;font-weight:700;}
  .lstat{flex:0 0 auto;font-size:12px;font-weight:800;}

  .bundle{background:var(--panel);border:1px solid var(--line);border-radius:14px;margin-bottom:14px;box-shadow:var(--shadow);overflow:hidden;}
  .bundle-head{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;user-select:none;}
  .bundle-head:hover{background:#fafbff;}
  .bnum{width:26px;height:26px;border-radius:8px;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex:0 0 auto;}
  .bundle-title{font-size:16px;font-weight:800;flex:1;letter-spacing:-.2px;}
  .bundle-prog{font-size:12.5px;color:var(--muted);font-weight:700;}
  .caret{color:var(--muted);transition:transform .15s;}
  .bundle.collapsed .caret{transform:rotate(-90deg);}
  .bundle.collapsed .bundle-body{display:none;}
  .bundle-body{padding:4px 14px 12px;}
  .subgroup-title{font-size:12.5px;font-weight:800;color:var(--brand);margin:12px 6px 6px;text-transform:none;}

  .item{border:1px solid var(--line);border-radius:13px;padding:13px 15px;margin:8px 0;background:#fff;transition:background .15s,border-color .15s;}
  .item.st-req{background:#FFF6E5;border-color:#F1DFBC;}      /* 요청중: 은은한 앰버 */
  .item.st-rej{background:#FCEAEA;border-color:#F0CDCD;}      /* 보완필요: 은은한 레드 */
  .item.done,.item.st-recv{background:#E7F7EC;border-color:#C3E9CF;} /* 완료: 은은한 연두/민트 */
  .item.st-na{background:#FAFAF9;opacity:.6;}
  .item-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  /* 토스뱅크형 원형 체크박스 */
  .chk{width:24px;height:24px;border-radius:50%;border:2px solid #D9D3CA;background:#fff;flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:800;line-height:1;
    transition:all .18s cubic-bezier(.2,.8,.2,1);}
  .chk:hover{border-color:var(--green);}
  .item.done .chk{background:var(--green);border-color:var(--green);transform:scale(1);}
  .item-name{flex:1;min-width:140px;font-weight:700;font-size:15.5px;}
  .nm{font-weight:700;}
  .item.done .nm{display:inline-block;background:#1F9D5B;color:#fff;font-weight:800;padding:3px 12px;border-radius:999px;font-size:14.5px;box-shadow:0 2px 6px rgba(31,157,91,.25);}
  .item.st-rej .nm{display:inline-block;background:var(--red);color:#fff;font-weight:800;padding:3px 12px;border-radius:999px;font-size:14.5px;}
  .item-note{font-size:12px;color:var(--muted);margin-top:2px;font-weight:400;}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
  .seg button{border:none;background:#fff;color:var(--muted);padding:5px 10px;font-size:12px;font-weight:700;border-right:1px solid var(--line);}
  .seg button:last-child{border-right:none;}
  .seg button.on-self{background:var(--brand);color:#fff;}
  .seg button.on-req{background:var(--amber);color:#fff;}
  .seg button.on-na{background:var(--gray);color:#fff;}
  .tags{display:inline-flex;gap:6px;}
  .tag{border:1px solid var(--line);background:#fff;color:var(--muted);padding:5px 10px;border-radius:999px;font-size:12px;font-weight:800;}
  .tag.on.t-none{background:var(--gray-soft);color:#586079;border-color:#d5d9e6;}
  .tag.on.t-req{background:var(--amber);color:#fff;border-color:var(--amber);}
  .tag.on.t-recv{background:var(--green);color:#fff;border-color:var(--green);}
  .memo-toggle{font-size:12px;color:var(--brand);font-weight:700;background:none;border:none;padding:4px 2px;}
  .memo-box{margin-top:8px;}
  .memo-box textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px;resize:vertical;min-height:42px;outline:none;}
  .memo-box textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(155,27,51,.12);}
  .additem{margin:8px 0 4px;}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(20,24,45,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;}
  .modal{background:#fff;border-radius:16px;padding:22px;max-width:460px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25);max-height:90vh;overflow:auto;}
  .modal h3{margin:0 0 4px;font-size:19px;}
  .modal p.hint{color:var(--muted);font-size:13px;margin:0 0 16px;}
  .field{margin-bottom:13px;}
  .field label{display:block;font-size:12.5px;font-weight:800;color:var(--muted);margin-bottom:5px;}
  .field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px 11px;outline:none;}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(155,27,51,.15);}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}
  .steps{font-size:13px;color:var(--ink);}
  .steps ol{margin:8px 0;padding-left:20px;}
  .steps li{margin:7px 0;}
  .steps code{background:#f0f2f8;padding:1px 6px;border-radius:5px;font-size:12.5px;}
  .note-warn{background:var(--amber-soft);color:#8a5a00;border-radius:9px;padding:10px 12px;font-size:12.5px;margin-top:10px;}

  /* Log */
  .log-list{background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);overflow:hidden;}
  .log-row{display:flex;gap:12px;padding:10px 14px;border-bottom:1px solid var(--line);font-size:13px;}
  .log-row:last-child{border-bottom:none;}
  .log-ts{color:var(--muted);font-size:12px;flex:0 0 150px;}
  .log-who{font-weight:800;flex:0 0 90px;color:var(--brand);}
  .log-txt{flex:1;}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;
    padding:11px 18px;border-radius:10px;font-weight:700;font-size:13.5px;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.25);opacity:0;transition:opacity .2s;}
  .toast.show{opacity:1;}

  /* 사건 단계 스텝퍼 (토스 스타일) */
  .stage-bar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px;}
  .stage-step{border:1px solid var(--line);background:#fff;color:var(--muted);font-weight:700;font-size:13px;
    padding:8px 14px;border-radius:999px;transition:all .12s;}
  .stage-step:hover{border-color:var(--brand);}
  .stage-step.on{color:#fff;border:1px solid var(--brand);}
  /* 상담 기록 타임라인 */
  .tl{display:flex;flex-direction:column;gap:2px;}
  .tl-row{display:flex;gap:10px;align-items:baseline;padding:7px 0;border-top:1px solid var(--line);font-size:13px;}
  .tl-row:first-child{border-top:none;}
  .tl-date{color:var(--muted);font-size:11.5px;flex:0 0 96px;font-weight:600;}
  .tl-who{color:var(--brand);font-weight:800;flex:0 0 auto;font-size:12px;}
  .tl-txt{flex:1;}
  .tl-del{border:none;background:none;color:var(--gray);cursor:pointer;font-size:16px;line-height:1;flex:0 0 auto;}
  .tl-del:hover{color:var(--red);}

  /* ===== 토스뱅크/와인 스타일 + 반응형 ===== */
  .cards{grid-template-columns:repeat(auto-fill,minmax(300px,1fr));}
  .card{border-radius:18px;}
  .overall{border-radius:18px;}
  .btn{border-radius:11px;}
  header h1{letter-spacing:-.4px;}
  .logo{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;
    background:linear-gradient(145deg,#9B1B33,#C2162A);box-shadow:0 6px 14px rgba(155,27,51,.22);}
  @media(max-width:760px){
    body{font-size:15px;}
    header{padding:10px 14px;gap:8px;flex-wrap:wrap;}
    header h1{font-size:16px;}
    header .sub{display:none;}
    .wrap{padding:14px 12px 90px;}
    .cards{grid-template-columns:1fr;}
    .toolbar{gap:8px;}
    .toolbar .btn, .toolbar select{flex:1 1 calc(50% - 8px);min-width:0;}
    .search{flex:1 1 100%;}
    .detail-head h2{font-size:20px;}
    .detail-head .btn{flex:1 1 calc(50% - 8px);text-align:center;}
    .stage-bar{flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;}
    .stage-step{flex:0 0 auto;}
    .item-row{gap:8px;}
    .seg, .tags{flex:1 1 100%;}
    .seg{justify-content:space-between;}
    .seg button{flex:1;}
    .modal{border-radius:18px 18px 0 0;align-self:flex-end;max-height:94vh;}
    .overlay{align-items:flex-end;padding:0;}
    .tl-date{flex-basis:70px;}
    .detail-grid{grid-template-columns:1fr;}
    .bnav{position:static;max-height:none;flex-direction:row;flex-wrap:wrap;}
    .bnav-item{flex:1 1 calc(50% - 4px);}
    .ctrl-sel{flex:1 1 100%;}
  }
  @media(max-width:560px){
    .detail-head h2{font-size:19px;}
    .pct{font-size:26px !important;}
  }
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:11px">
    <div class="logo"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L20 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></div>
    <div>
      <h1>개인회생 서류 취합 시스템</h1>
      <div class="sub">법무법인 내부용 · 의뢰인별 서류 체크리스트</div>
    </div>
  </div>
  <div class="grow"></div>
  <button class="sync-pill" id="syncPill" onclick="openSettings()"><span class="dot"></span><span id="syncText">로컬 저장</span></button>
  <button class="btn btn-sm" onclick="openLog()">📜 로그</button>
  <button class="btn btn-sm" onclick="openSettings()">⚙️ 설정</button>
</header>

<div class="wrap">
  <!-- DASHBOARD -->
  <section id="view-dashboard">
    <div id="dashHeader"></div>
    <div id="dashStats"></div>
    <div id="dashBoard"></div>
    <div class="toolbar">
      <div class="search">
        <span>🔎</span>
        <input id="searchBox" placeholder="의뢰인 이름·사건번호 검색" oninput="renderDashboard()" />
      </div>
      <select id="statusSel" class="btn" onchange="renderDashboard()" style="font-weight:700;">
        <option value="active">진행중(전체)</option>
        <option value="incomplete">미완료만</option>
        <option value="remind">리마인더 필요</option>
        <option value="rejected">보완필요</option>
        <option value="deadline">마감 임박</option>
        <option value="done">완료</option>
        <option value="archived">📦 보관함</option>
      </select>
      <select id="stageSel" class="btn" onchange="renderDashboard()" style="font-weight:700;">
        <option value="">단계 전체</option>
        <option>상담</option><option>서류수집</option><option>검토</option><option>법원접수</option><option>개시결정</option><option>완료</option>
      </select>
      <select id="assigneeSel" class="btn" onchange="renderDashboard()" style="font-weight:700;">
        <option value="">담당 전체</option>
      </select>

    if(!client.items[it.id]) client.items[it.id]={ mode:it.mode, reqTag:"none", done:false, memo:"", reqDate:null, recvDate:null, link:"", rejected:false, rejectReason:"", files:[] };
    else if(!client.items[it.id].files) client.items[it.id].files=[];
  })));
  if(!client.extra) client.extra={}; // 묶음별 추가 항목
  if(!client.timeline) client.timeline=[]; // 상담/연락 기록
  if(!client.stage) client.stage="서류수집";
  if(client.assignee===undefined) client.assignee="";
  if(client.deadline===undefined) client.deadline=null;
  if(client.deadlineLabel===undefined) client.deadlineLabel="보정기한";
  return client;
}

/* 소득유형에 따라 수입·지출(b4) 묶음 자동 맞춤 */
const INCOME_MAP={ "근로자(월급수령자)":["b4g1","b3g5"], "사업자":["b4g2","b3g6"], "둘 다(겸업)":["b4g1","b4g2","b3g5","b3g6"] };
const INCOME_CONTROLLED=["b4g1","b4g2","b3g5","b3g6"]; // 소득유형에 따라 켜고 끄는 묶음(근로/사업/퇴직/사업용재산)
function applyIncomeType(c){
  const keepArr=INCOME_MAP[c.incomeType]; if(!keepArr) return; // 미정 → 변경 안 함
  const keep=new Set(keepArr);
  TEMPLATE.forEach(b=>b.groups.forEach(g=>{ if(!INCOME_CONTROLLED.includes(g.id)) return; const applic=keep.has(g.id);
    g.items.forEach(it=>{ const s=c.items[it.id]; if(!s) return; if(applic){ if(s.mode==="na") s.mode=it.mode; } else s.mode="na"; }); }));
}
/* 기존 데이터 복원 (한 번만): 공통 묶음이 과거 소득로직으로 '해당없음'에 갇힌 것 되살림 + 옛 소득유형 명칭 변환 */
function migrateV2(){
  const remap={"급여소득자":"근로자(월급수령자)","사업소득자":"사업자","연금수령자":"미정","복합(둘 이상)":"둘 다(겸업)"};
  const controlled=new Set(INCOME_CONTROLLED);
  state.clients.forEach(c=>{ if(!c.items) return;
    if(remap[c.incomeType]) c.incomeType=remap[c.incomeType];
    TEMPLATE.forEach(b=>b.groups.forEach(g=>{ if(controlled.has(g.id)) return; // 공통 묶음만
      g.items.forEach(it=>{ const s=c.items[it.id]; if(s && s.mode==="na" && it.mode!=="na") s.mode=it.mode; }); }));
    applyIncomeType(c); // 근로/사업 묶음 정합성 재적용
  });
}
function migrateIfNeeded(){ if(state._ver>=2) return false; state.clients.forEach(ensureItems); migrateV2(); state._ver=2; return true; }

/* 완료율 계산 */
function progress(client){
  let total=0, done=0, requesting=0, notReq=0, missing=0, rejected=0;
  const all=[];
  TEMPLATE.forEach(b=>b.groups.forEach(g=>g.items.forEach(it=>all.push(it.id))));
  Object.keys(client.extra||{}).forEach(bid=>(client.extra[bid]||[]).forEach(ex=>all.push(ex.id)));
  all.forEach(id=>{
    const s=client.items[id]; if(!s) return;
    if(s.mode==="na") return;
    total++;
    if(s.rejected) rejected++;
    if(s.done){ done++; }
    else { missing++;
      if(s.mode==="request"){ if(s.reqTag==="requesting") requesting++; else if(s.reqTag!=="received") notReq++; }
    }
  });
  return { total, done, pct: total? Math.round(done/total*100):0, requesting, notReq, missing, rejected };
}
function dDay(c){ if(!c.deadline) return null; const d=Math.ceil((new Date(c.deadline).getTime()-Date.now())/86400000); return d; }

function getItemState(client,id){ return client.items[id]; }
function findClient(id){ return state.clients.find(c=>c.id===id); }

/* ---------- 4. 저장 (로컬 + 깃헙) ---------- */
/* 1단계: 로컬 즉시 저장 (+ 직전본을 이중 보관) */
function saveLocal(){
  try{
    const json=JSON.stringify(state);
    const prev=localStorage.getItem(LS_DATA);
    if(prev && prev.length>2) localStorage.setItem(LS_DATA_BAK, prev); // 직전본 백업(파손 대비)
    localStorage.setItem(LS_DATA, json);
  }catch(e){ console.error("로컬 저장 실패",e); toast("⚠️ 로컬 저장 실패 — 저장공간을 확인하세요"); }
}
function saveCfg(){ try{ localStorage.setItem(LS_CFG, JSON.stringify(cfg)); }catch(_){}}

/* 2단계: 자동 스냅샷 (변경 이력 롤링 보관 → 실수/파손 시 되돌리기) */
let _lastSnapMin=null;
function pushSnapshot(){
  try{
    let snaps=[]; try{ snaps=JSON.parse(localStorage.getItem(LS_SNAP)||"[]"); }catch(_){ snaps=[]; }
    const minKey=(state.updatedAt||now()).slice(0,16); // 분 단위 — 같은 분이면 최신으로 교체
    const entry={ ts:now(), by:state.updatedBy||deviceName||"?", note:(state.log[0]&&state.log[0].text)||"변경", clients:(state.clients||[]).length, data:JSON.stringify(state) };
    if(snaps.length && _lastSnapMin===minKey){ snaps[0]=entry; } else { snaps.unshift(entry); }
    _lastSnapMin=minKey;
    if(snaps.length>SNAP_MAX) snaps.length=SNAP_MAX;
    localStorage.setItem(LS_SNAP, JSON.stringify(snaps));
  }catch(e){ console.warn("스냅샷 저장 건너뜀",e); }
}
function getSnapshots(){ try{ return JSON.parse(localStorage.getItem(LS_SNAP)||"[]"); }catch(_){ return []; } }

function addLog(text){
  state.log.unshift({ ts:now(), who:deviceName||"미설정", text });
  if(state.log.length>1000) state.log.length=1000;
}

/* 변경 발생 시 호출: 로컬 즉시 저장 + 깃헙 디바운스 저장 */
function touch(logText){
  state.updatedAt=now(); state.updatedBy=deviceName||"미설정";
  if(logText) addLog(logText);
  saveLocal();      // 1단계
  pushSnapshot();   // 2단계
  scheduleSync();   // 3단계
}
function scheduleSync(){
  if(!githubReady()) return;
  setSync("saving");
  clearTimeout(syncTimer);
  syncTimer=setTimeout(pushToGithub, 1500); // 1.5초 후 한 번에 업로드
}

function githubReady(){ return cfg.owner && cfg.repo && cfg.token; }
function ghUrl(){ return `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${cfg.path}`; }
function ghHeaders(){ return { "Authorization":"Bearer "+cfg.token, "Accept":"application/vnd.github+json" }; }

function setSync(s,msg){
  syncStatus=s;
  const pill=$("#syncPill"), txt=$("#syncText");
  pill.className="sync-pill";
  if(s==="local"){ txt.textContent="로컬 저장"; }
  else if(s==="ok"){ pill.classList.add("sync-on"); txt.textContent="동기화됨 ✓"; }
  else if(s==="saving"){ pill.classList.add("sync-on"); txt.textContent="저장 중…"; }
  else if(s==="error"){ pill.classList.add("sync-err"); txt.textContent="동기화 오류"; }
}

async function pullFromGithub(silent){
  if(!githubReady()) return false;
  try{
    const r=await fetch(ghUrl()+"?ref="+encodeURIComponent(cfg.branch)+"&t="+Date.now(),{headers:ghHeaders()});
    if(r.status===404){ // 파일 없음 → 최초 업로드
      remoteSha=null; await pushToGithub(true); return true;
    }
    if(!r.ok) throw new Error("HTTP "+r.status);
    const j=await r.json();
    remoteSha=j.sha;
    const remote=JSON.parse(b64decode(j.content));
    // 원격이 더 최신이면 반영
    if(!state.updatedAt || (remote.updatedAt && remote.updatedAt > state.updatedAt)){
      if(isEditing()){ setSync("ok"); return true; } // 입력 중에는 덮어쓰지 않음(메모 보호)
      state=remote;
      if(!state.clients) state.clients=[]; if(!state.log) state.log=[];
      state.clients.forEach(ensureItems);
      const migrated=migrateIfNeeded(); // 클라우드 데이터도 한 번 복원
      saveLocal();
      if(migrated){ setSync("ok"); pushToGithub(true); }
      if(!silent){ rerender(); toast("다른 기기의 변경을 불러왔습니다"); }
      else rerender();
    }
    setSync("ok");
    return true;
  }catch(e){ console.warn(e); setSync("error"); return false; }
}

async function pushToGithub(silent){
  if(!githubReady()) return;
  setSync("saving");
  try{
    // 먼저 최신본 확인 (충돌·데이터손실 최소화)
    let remoteClients=null;
    try{
      const chk=await fetch(ghUrl()+"?ref="+encodeURIComponent(cfg.branch)+"&t="+Date.now(),{headers:ghHeaders()});
      if(chk.ok){ const cj=await chk.json();
        const remote=JSON.parse(b64decode(cj.content));
        remoteSha=cj.sha; remoteClients=(remote.clients||[]).length;
      } else if(chk.status===404){ remoteSha=null; }
    }catch(_){}
    // 안전장치: 클라우드에 자료가 있는데 지금 화면이 비어있으면 덮어쓰지 않음 (데이터 보호)
    if(remoteClients>0 && (state.clients||[]).length===0){
      setSync("error"); if(!silent) toast("⚠️ 안전장치 작동: 빈 데이터로 클라우드를 덮어쓰지 않았습니다");
      return;
    }
    const body={ message:`update ${state.updatedBy||"?"} @ ${fmt(state.updatedAt)} (${(state.log[0]&&state.log[0].text)||"변경"})`,
      content:b64encode(JSON.stringify(state,null,1)), branch:cfg.branch };
    if(remoteSha) body.sha=remoteSha;
    const r=await fetch(ghUrl(),{method:"PUT",headers:Object.assign({"Content-Type":"application/json"},ghHeaders()),body:JSON.stringify(body)});
    if(!r.ok){ const t=await r.text(); throw new Error("HTTP "+r.status+" "+t.slice(0,120)); }
    const j=await r.json(); remoteSha=j.content.sha;
    state._base=state.updatedAt;
    setSync("ok");
    if(!silent) toast("깃헙에 저장됨 ✓");
    maybeDailyBackup(); // 3단계+: 하루 1회 클라우드 날짜별 백업본
  }catch(e){ console.error(e); setSync("error"); if(!silent) toast("깃헙 저장 실패: "+e.message); }
}

/* 3단계+: 깃헙 저장소에 하루 1회 날짜별 백업본(backups/data-YYYY-MM-DD.json) 보관 */
async function maybeDailyBackup(){
  if(!githubReady()) return;
  const day=now().slice(0,10);
  if(cfg.lastBackupDay===day) return; // 오늘 이미 백업함
  try{
    const path=`backups/data-${day}.json`;
    const url=`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${path}`;
    let sha=null;
    try{ const chk=await fetch(url+"?ref="+encodeURIComponent(cfg.branch)+"&t="+Date.now(),{headers:ghHeaders()}); if(chk.ok){ sha=(await chk.json()).sha; } }catch(_){}
    const body={ message:`daily backup ${day}`, content:b64encode(JSON.stringify(state,null,1)), branch:cfg.branch };
    if(sha) body.sha=sha;
    const r=await fetch(url,{method:"PUT",headers:Object.assign({"Content-Type":"application/json"},ghHeaders()),body:JSON.stringify(body)});
    if(r.ok){ cfg.lastBackupDay=day; saveCfg(); }
  }catch(e){ console.warn("일일 백업 건너뜀",e); }
}

function startPolling(){
  clearInterval(pollTimer);
  if(githubReady()) pollTimer=setInterval(()=>{ if(syncStatus!=="saving" && !isEditing()) pullFromGithub(true); }, 20000); // 20초마다 확인 (입력 중엔 건너뜀)
}

/* ---------- 5. 렌더 ---------- */
function rerender(){
  if(currentClientId && findClient(currentClientId)) renderDetail(currentClientId);
  else { currentClientId=null; renderDashboard(); }
}
function showDashboard(){ currentClientId=null; $("#view-detail").classList.add("hidden"); $("#view-dashboard").classList.remove("hidden"); renderDashboard(); }

function isRemindNeeded(c){
  let need=false;
  const check=(s)=>{ if(s && s.mode==="request" && s.reqTag==="requesting" && !s.done){ const da=daysAgo(s.reqDate); if(da===null||da>=5) need=true; } };
  TEMPLATE.forEach(b=>b.groups.forEach(g=>g.items.forEach(it=>check(c.items[it.id]))));
  Object.keys(c.extra||{}).forEach(bid=>(c.extra[bid]||[]).forEach(ex=>check(c.items[ex.id])));
  return need;
}
function rejectedList(c){ const arr=[]; const chk=(id,name)=>{ const s=c.items[id]; if(s&&s.rejected) arr.push({id,name,reason:s.rejectReason||""}); };
  TEMPLATE.forEach(b=>b.groups.forEach(g=>g.items.forEach(it=>chk(it.id,it.name)))); Object.keys(c.extra||{}).forEach(bid=>(c.extra[bid]||[]).forEach(ex=>chk(ex.id,ex.name))); return arr; }
function renderDashHeaderStatsBoard(){
  const hdr=$("#dashHeader"), stat=$("#dashStats"), board=$("#dashBoard");
  const active=state.clients.filter(c=>!c.archived);
  if(active.length===0){ if(hdr)hdr.innerHTML=""; if(stat)stat.innerHTML=""; if(board)board.innerHTML=""; return; }
  let tReq=0,tNot=0,tRej=0,avg=0,inProg=0,dueSoon=0;
  active.forEach(c=>{ const p=progress(c); tReq+=p.requesting; tNot+=p.notReq; tRej+=p.rejected; avg+=p.pct; if(p.pct<100)inProg++; const d=dDay(c); if(d!==null&&d<=7)dueSoon++; });
  avg=Math.round(avg/active.length);
  // 동적 헤더
  const today=new Date().toLocaleDateString("ko-KR",{year:"numeric",month:"long",day:"numeric",weekday:"short"});
  let msg = tRej>0 ? `오늘 <b style="color:var(--red)">보완 ${tRej}건</b>을 처리해 주세요`
          : dueSoon>0 ? `<b style="color:var(--amber)">마감 임박 ${dueSoon}명</b>을 먼저 챙기세요`
          : tNot>0 ? `아직 <b style="color:var(--red)">요청 안 한 서류 ${tNot}건</b>이 있어요`
          : tReq>0 ? `회신 대기 중인 <b style="color:var(--amber)">요청 ${tReq}건</b>이 있어요`
          : `모든 의뢰인이 안정 상태예요 ✓`;
  if(hdr) hdr.innerHTML=`<div style="margin-bottom:14px">
    <div style="font-size:12px;color:var(--muted);font-weight:800;letter-spacing:.5px">${today}</div>
    <div style="font-size:22px;font-weight:800;letter-spacing:-.4px;margin-top:2px">${msg}</div>
    <div style="font-size:12.5px;color:var(--muted);font-weight:600;margin-top:3px">전체 ${active.length}명 · 진행중 ${inProg}명 · 평균 완료 ${avg}%</div></div>`;
  // 통계 카드 5종
  const card=(label,val,color)=>`<div class="card" style="cursor:default;flex:1;min-width:110px;padding:12px 14px"><div style="font-size:12px;color:var(--muted);font-weight:700">${label}</div><div style="font-size:22px;font-weight:800;color:${color||'var(--ink)'}">${val}</div></div>`;
  if(stat) stat.innerHTML=`<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px">
    ${card("의뢰인", active.length+"명")}
    ${card("평균 완료율", avg+"%","var(--green)")}
    ${card("요청중", tReq+"건","var(--amber)")}
    ${card("미요청", tNot+"건","var(--red)")}
    ${card("보완필요", tRej+"건","var(--red)")}
  </div>`;
  // 오늘 할 일 보드: 보완필요 / 마감임박 / 오래된 요청중
  const rejRows=[]; active.forEach(c=>rejectedList(c).forEach(r=>rejRows.push({c,r})));
  const dueRows=active.filter(c=>{ const d=dDay(c); return d!==null && d<=7; }).sort((a,b)=>dDay(a)-dDay(b));
  const remindRows=active.filter(c=>isRemindNeeded(c));
  let boardHtml="";
  if(rejRows.length||dueRows.length||remindRows.length){
    boardHtml+=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-bottom:16px">`;
    if(rejRows.length) boardHtml+=`<div class="card" style="cursor:default;padding:0;overflow:hidden"><div style="background:var(--red-soft);color:var(--red);font-weight:800;font-size:13px;padding:10px 13px">⚠ 보완 필요 ${rejRows.length}건</div><div style="max-height:200px;overflow:auto">${rejRows.map(({c,r})=>`<div onclick="openDetail('${c.id}')" style="cursor:pointer;padding:8px 13px;border-top:1px solid var(--line);font-size:13px"><b>${esc(c.name)}</b> · ${esc(r.name)}${r.reason?`<div style="font-size:11.5px;color:var(--red)">↳ ${esc(r.reason)}</div>`:""}</div>`).join("")}</div></div>`;
    if(dueRows.length) boardHtml+=`<div class="card" style="cursor:default;padding:0;overflow:hidden"><div style="background:var(--amber-soft);color:var(--amber);font-weight:800;font-size:13px;padding:10px 13px">⏳ 마감 임박 ${dueRows.length}명</div><div style="max-height:200px;overflow:auto">${dueRows.map(c=>{const d=dDay(c);return `<div onclick="openDetail('${c.id}')" style="cursor:pointer;padding:8px 13px;border-top:1px solid var(--line);font-size:13px;display:flex;justify-content:space-between"><span><b>${esc(c.name)}</b> · ${esc(c.deadlineLabel||"마감")}</span><span style="font-weight:800;color:${d<0?'var(--red)':'var(--amber)'}">${d<0?`${-d}일 지남`:d===0?"D-DAY":"D-"+d}</span></div>`;}).join("")}</div></div>`;
    if(remindRows.length) boardHtml+=`<div class="card" style="cursor:default;padding:0;overflow:hidden"><div style="background:var(--brand-soft);color:var(--brand);font-weight:800;font-size:13px;padding:10px 13px">⏰ 리마인더 필요 ${remindRows.length}명</div><div style="max-height:200px;overflow:auto">${remindRows.map(c=>`<div onclick="openDetail('${c.id}')" style="cursor:pointer;padding:8px 13px;border-top:1px solid var(--line);font-size:13px"><b>${esc(c.name)}</b> · 오래된 요청중 서류</div>`).join("")}</div></div>`;
    boardHtml+=`</div>`;
  }
  if(board) board.innerHTML=boardHtml;
}
function renderDashboard(){
  // 담당자 필터 옵션 채우기
  const assignees=[...new Set(state.clients.map(c=>c.assignee).filter(Boolean))].sort((a,b)=>a.localeCompare(b,"ko"));
  const aSel=$("#assigneeSel");
  if(aSel){ const cur=aSel.value; aSel.innerHTML='<option value="">담당 전체</option>'+assignees.map(a=>`<option ${cur===a?"selected":""}>${esc(a)}</option>`).join(""); }
  const q=($("#searchBox").value||"").trim().toLowerCase();
  const sort=$("#sortSel").value;
  const statusF=($("#statusSel")&&$("#statusSel").value)||"active";
  const stageF=($("#stageSel")&&$("#stageSel").value)||"";
  const assigneeF=($("#assigneeSel")&&$("#assigneeSel").value)||"";
  const catF=($("#catSel")&&$("#catSel").value)||"";
  const incF=($("#incomeSel")&&$("#incomeSel").value)||"";
  let list=state.clients.map(ensureItems).filter(c=>{
    if(q && !((c.name||"").toLowerCase().includes(q) || (c.caseNo||"").toLowerCase().includes(q) || (c.assignee||"").toLowerCase().includes(q))) return false;
    if(statusF==="archived"){ if(!c.archived) return false; }
    else { if(c.archived) return false;
      const p=progress(c);
      if(statusF==="incomplete" && p.pct>=100) return false;
      if(statusF==="done" && p.pct<100) return false;
      if(statusF==="remind" && !isRemindNeeded(c)) return false;
      if(statusF==="rejected" && p.rejected===0) return false;
      if(statusF==="deadline"){ const d=dDay(c); if(d===null||d>7) return false; }
    }
    if(stageF && clientStage(c)!==stageF) return false;
    if(assigneeF && (c.assignee||"")!==assigneeF) return false;
    if(catF && (c.caseType||"개인회생")!==catF) return false;
    if(incF && (c.incomeType||"미정")!==incF) return false;
    return true;
  });
  list.sort((a,b)=>{
    if((b.pinned?1:0)!==(a.pinned?1:0)) return (b.pinned?1:0)-(a.pinned?1:0);
    if(sort==="name") return (a.name||"").localeCompare(b.name||"","ko");
    if(sort==="progress") return progress(a).pct - progress(b).pct;
    if(sort==="deadline"){ const da=dDay(a), db=dDay(b); return (da===null?99999:da)-(db===null?99999:db); }
    return (b.updatedAt||"").localeCompare(a.updatedAt||"");
  });
  renderDashHeaderStatsBoard();
  const root=$("#cards");
  if(list.length===0){
    root.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="big">🗂️</div>
      <div style="font-weight:800;font-size:17px;margin-bottom:4px">${q?"검색 결과가 없습니다":"등록된 의뢰인이 없습니다"}</div>
      <div>오른쪽 위 <b>+ 의뢰인 추가</b> 버튼으로 시작하세요.</div></div>`;
    return;
  }
  root.innerHTML=list.map(c=>{
    const p=progress(c);
    const kind=(c.caseType||"개인회생").includes("파산")?"파산":(c.caseType||"").includes("회생")&&!(c.caseType||"").includes("개인")?"회생":(c.caseType||"기타");
    const badgeClass = c.caseType?.includes("파산")?"파산":(c.caseType?.includes("회생")?"회생":"기타");
    const remind=isRemindNeeded(c);
    const stg=clientStage(c); const stgColor=STAGE_COLOR[stg];
    const d=dDay(c);
    return `<div class="card ${c.archived?'arch':''}" onclick="openDetail('${c.id}')">
      <div class="card-top"><span class="card-name">${c.pinned?'📌 ':''}${esc(c.name||"이름 없음")}</span>
        <span class="badge ${badgeClass}">${esc(c.caseType||"개인회생")}</span>
        <span class="badge" style="background:${stgColor}1a;color:${stgColor}">${stg}</span></div>
      <div class="meta">${c.assignee?("담당 "+esc(c.assignee)+" · "):""}${c.caseNo?("사건 "+esc(c.caseNo)+" · "):""}${(c.incomeType&&c.incomeType!=="미정")?(esc(c.incomeType)+" · "):""}수정 ${fmt(c.updatedAt)}</div>
      <div class="bar"><i style="width:${p.pct}%;background:${p.rejected>0?'linear-gradient(90deg,#f87171,#dc2626)':(p.pct===100?'#059669':'linear-gradient(90deg,#e14b6f,#9B1B33)')}"></i></div>
      <div style="display:flex;justify-content:space-between;font-size:12.5px;color:var(--muted);font-weight:700">
        <span>${p.done}/${p.total} 확보</span><span style="color:var(--green)">${p.pct}%</span></div>
      <div class="card-stats">
        ${p.rejected>0?`<span class="chip miss">⚠ 보완 ${p.rejected}</span>`:""}
        ${d!==null&&d<=7?`<span class="chip" style="background:var(--amber-soft);color:var(--amber)">${d<0?`마감 ${-d}일 지남`:d===0?"D-DAY":"D-"+d}</span>`:""}
        ${remind?`<span class="chip miss">⏰ 리마인더</span>`:""}
        ${p.requesting?`<span class="chip wait">요청중 ${p.requesting}</span>`:""}
        ${p.notReq?`<span class="chip req">미요청 ${p.notReq}</span>`:""}
        ${p.missing===0&&p.rejected===0?`<span class="chip ok">전부 확보 ✓</span>`:""}
      </div>
      ${c.phone?`<div style="margin-top:8px"><a href="tel:${esc(c.phone)}" onclick="event.stopPropagation()" style="font-size:12px;color:var(--brand);font-weight:700;text-decoration:none">📞 ${esc(c.phone)}</a></div>`:""}
      </div>`;
  }).join("");
}

function openDetail(id){ currentClientId=id; renderDetail(id); window.scrollTo(0,0); }
function renderDetail(id){
  const c=ensureItems(findClient(id)); if(!c) return showDashboard();
  $("#view-dashboard").classList.add("hidden");
  const v=$("#view-detail"); v.classList.remove("hidden");
  const p=progress(c);
  let html=`<button class="back" onclick="showDashboard()">← 의뢰인 목록</button>
    <div class="detail-head">
      <h2>${esc(c.name||"이름 없음")}</h2>
      <span class="badge ${c.caseType?.includes('파산')?'파산':(c.caseType?.includes('회생')?'회생':'기타')}">${esc(c.caseType||"개인회생")}</span>
      <div class="grow"></div>
      <button class="btn btn-sm btn-primary" onclick="openRequestMsg('${c.id}')">📨 요청 메시지</button>
      <button class="btn btn-sm" onclick="openReminder('${c.id}')">⏰ 리마인더</button>
      <button class="btn btn-sm" onclick="copySummary('${c.id}')">📋 진행상황 복사</button>
      <button class="btn btn-sm" onclick="printChecklist('${c.id}')">🖨️ 인쇄/PDF</button>
      <button class="btn btn-sm" onclick="togglePin('${c.id}')">${c.pinned?'📌 고정해제':'📌 고정'}</button>
      <button class="btn btn-sm" onclick="toggleArchive('${c.id}')">${c.archived?'📦 보관해제':'📦 보관'}</button>
      <button class="btn btn-sm" onclick="openClientModal('${c.id}')">✏️ 정보수정</button>
      <button class="btn btn-sm btn-danger" onclick="deleteClient('${c.id}')">삭제</button>
    </div>
    <div class="meta" style="margin-bottom:10px">${c.assignee?("담당 "+esc(c.assignee)+" · "):""}${c.caseNo?("사건번호 "+esc(c.caseNo)+" · "):""}${c.phone?(`<a href="tel:${esc(c.phone)}" style="color:var(--brand);font-weight:700;text-decoration:none">☎ ${esc(c.phone)}</a> · `):""}수정 ${fmt(c.updatedAt)}</div>`;

  // 사건 단계 스텝퍼
  html+=`<div class="stage-bar">`+STAGES.map(s=>{const on=clientStage(c)===s; return `<button class="stage-step ${on?'on':''}" style="${on?`background:${STAGE_COLOR[s]};border-color:${STAGE_COLOR[s]}`:''}" onclick="setStage('${c.id}','${s}')">${s}</button>`;}).join("")+`</div>`;

  // 종합 박스
  const dd=dDay(c);
  html+=`<div class="overall">
      <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
        <div><div class="pct" style="color:${p.rejected>0?'var(--red)':'var(--green)'}">${p.pct}%</div><div style="font-size:12px;color:var(--muted);font-weight:700">${p.done}/${p.total} 확보</div></div>
        <div style="flex:1;min-width:160px"><div class="bar" style="height:12px"><i style="width:${p.pct}%;background:${p.rejected>0?'linear-gradient(90deg,#f87171,#dc2626)':(p.pct===100?'#059669':'linear-gradient(90deg,#e14b6f,#9B1B33)')}"></i></div>
          <div class="card-stats">
            ${p.rejected?`<span class="chip miss">⚠ 보완 ${p.rejected}</span>`:""}
            ${p.requesting?`<span class="chip wait">요청중 ${p.requesting}</span>`:""}
            ${p.notReq?`<span class="chip req">미요청 ${p.notReq}</span>`:""}
            ${p.missing===0&&p.rejected===0?`<span class="chip ok">전부 확보 ✓</span>`:""}
          </div></div>
        ${dd!==null?`<div style="text-align:center"><div style="font-size:20px;font-weight:800;color:${dd<0?'var(--red)':dd<=7?'var(--amber)':'var(--ink)'}">${dd<0?`+${-dd}일`:dd===0?"D-DAY":"D-"+dd}</div><div style="font-size:11.5px;color:var(--muted);font-weight:700">${esc(c.deadlineLabel||"마감")} ${c.deadline?fmtD(c.deadline):""}</div></div>`:""}
      </div>
      <div class="field" style="margin:12px 0 0">
        <label>📝 의뢰인 메모 (상황·특이사항)</label>
        <textarea id="clientMemo" rows="2" placeholder="예: 배우자 명의 차량 있음 / 전세보증금 확인 필요 / 사업자 폐업"
          oninput="onClientMemo('${c.id}')">${esc(c.memo||"")}</textarea>
      </div>
    </div>`;

  // 상담/연락 기록 타임라인
  html+=`<div class="overall" style="margin-top:-6px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <label style="font-size:12.5px;font-weight:800;color:var(--muted)">🗓️ 상담·연락 기록</label>
        <button class="btn btn-sm" onclick="addTimeline('${c.id}')">+ 기록 추가</button>
      </div>
      ${(c.timeline&&c.timeline.length)?`<div class="tl">`+c.timeline.map((t,i)=>`<div class="tl-row"><span class="tl-date">${fmt(t.ts)}</span><span class="tl-who">${esc(t.by||'')}</span><span class="tl-txt">${esc(t.text)}</span><button class="tl-del" onclick="delTimeline('${c.id}',${i})">×</button></div>`).join("")+`</div>`:`<div style="font-size:12.5px;color:var(--muted)">아직 기록이 없습니다. "+기록 추가"로 상담·통화 내용을 남기세요.</div>`}
    </div>`;

  // 컨트롤 바 (묶음탭·보기·필터·선택)
  const filtOpts=[["all","전체 보기"],["missing","미확보만"],["request","요청 서류"],["requesting","요청중"],["received","받음"],["rejected","보완필요"],["self","직접발급"],["haslink","링크있음"],["hasmemo","메모있음"]];
  html+=`<div class="ctrlbar">
    <button class="iconbtn ${navOpen?'on':''}" onclick="toggleNav()">☰ 묶음</button>
    <div class="segview">
      <button class="${viewMode==='card'?'on':''}" onclick="setView('card')">🗂 카드</button>
      <button class="${viewMode==='list'?'on':''}" onclick="setView('list')">☰ 목록</button>
    </div>
    <select class="ctrl-sel" onchange="setFilter(this.value)">
      ${filtOpts.map(f=>`<option value="${f[0]}" ${detailFilter===f[0]?'selected':''}>${f[1]}</option>`).join("")}
    </select>
    <div class="grow"></div>
    <button class="iconbtn ${selMode?'on':''}" onclick="toggleSelMode('${c.id}')">☑ 선택</button>
  </div>`;
  if(selMode){
    html+=`<div class="selbar">
      <b>선택 ${selSet.size}개</b>
      <button class="btn btn-sm" onclick="selAllVisible('${c.id}')">표시 전체 선택</button>
      <button class="btn btn-sm" onclick="selClear('${c.id}')">해제</button>
      <div class="grow"></div>
      <button class="btn btn-sm" onclick="batchSel('${c.id}','requesting')">요청중</button>
      <button class="btn btn-sm" onclick="batchSel('${c.id}','received')">받음</button>
      <button class="btn btn-sm" onclick="batchSel('${c.id}','reject')">⚠ 보완</button>
      <button class="btn btn-sm" onclick="batchSel('${c.id}','none')">미요청</button>
    </div>`;
  }

  // 2단 레이아웃: 좌측 묶음 탭 + 우측 체크리스트
  html+=`<div class="detail-grid ${navOpen?'':'navclosed'}">`;
  html+=`<aside class="bnav">
    <button class="bnav-item ${focusBundle===''?'on':''}" onclick="focusBundleSet('')"><span>📋 전체 보기</span><span class="bnp">${p.done}/${p.total}</span></button>`;
  TEMPLATE.forEach((b,bi)=>{ const bp=bundleProgress(c,b); const full=bp.total>0&&bp.done===bp.total;
    html+=`<button class="bnav-item ${focusBundle===b.id?'on':''}" onclick="focusBundleSet('${b.id}')"><span><span class="bn">${bi+1}</span>${esc(b.title)}</span><span class="bnp ${full?'fdone':''}">${bp.done}/${bp.total}</span></button>`; });
  html+=`</aside>`;

  html+=`<div class="checklist">`;
  TEMPLATE.forEach((b,bi)=>{
    if(focusBundle && focusBundle!==b.id) return;
    const showItem=(id)=>{ const s=c.items[id]; if(!s) return false; if(s.mode==="na" && !showNa) return false; if(detailFilter!=="all" && !passFilter(s)) return false; return true; };
    let naHidden=0; collectBundleItems(c,b).forEach(it=>{ const s=c.items[it.id]; if(s && s.mode==="na" && !showNa && (detailFilter==="all"||passFilter(s))) naHidden++; });
    const anyVis = collectBundleItems(c,b).some(it=>showItem(it.id));
    const hasNa = collectBundleItems(c,b).some(it=>{ const s=c.items[it.id]; return s && s.mode==="na"; });
    const bp = bundleProgress(c,b);
    const isCol = collapsed[c.id+b.id];
    if(!anyVis && naHidden===0) return; // 보일 것도, 더보기할 것도 없으면 숨김
    html+=`<div class="bundle ${isCol?'collapsed':''}">
      <div class="bundle-head" onclick="toggleBundle('${c.id}','${b.id}')">
        <div class="bnum">${bi+1}</div>
        <div class="bundle-title">${esc(b.title)}</div>
        <div class="bundle-prog">${bp.done}/${bp.total}</div>
        <div class="caret">▾</div>
      </div>
      <div class="bundle-body ${viewMode==='list'?'listmode':''}">`;
    b.groups.forEach(g=>{
      const gItems=g.items.filter(it=>showItem(it.id));
      if(gItems.length===0) return;
      if(g.title) html+=`<div class="subgroup-title">— ${esc(g.title)}</div>`;
      gItems.forEach(it=>{ html+=(viewMode==='list'?itemRow(c,it,false):itemHtml(c,it,false)); });
    });
    (c.extra[b.id]||[]).filter(ex=>showItem(ex.id)).forEach(ex=>{ html+=(viewMode==='list'?itemRow(c,ex,true,b.id):itemHtml(c,ex,true,b.id)); });
    if(naHidden>0) html+=`<button class="btn btn-sm btn-ghost" style="margin:5px 2px;color:var(--muted)" onclick="toggleShowNa()">＋ 해당없음 ${naHidden}개 더보기</button>`;
    else if(showNa && hasNa) html+=`<button class="btn btn-sm btn-ghost" style="margin:5px 2px;color:var(--muted)" onclick="toggleShowNa()">해당없음 숨기기</button>`;
    if(viewMode==='card') html+=`<div class="additem"><button class="btn btn-sm btn-ghost" onclick="addExtra('${c.id}','${b.id}')">+ 이 묶음에 서류 추가</button></div>`;
    html+=`</div></div>`;
  });
  html+=`</div></div>`; // .checklist + .detail-grid

  v.innerHTML=html;
}

function collectBundleItems(c,b){ let arr=[]; b.groups.forEach(g=>g.items.forEach(it=>arr.push(it))); (c.extra[b.id]||[]).forEach(ex=>arr.push(ex)); return arr; }
function bundleProgress(c,b){ let total=0,done=0; collectBundleItems(c,b).forEach(it=>{ const s=c.items[it.id]; if(!s||s.mode==="na")return; total++; if(s.done)done++; }); return {total,done}; }
function passFilter(s){
  if(!s) return true;
  if(detailFilter==="all") return true;
  if(detailFilter==="missing") return s.mode!=="na" && !s.done;
  if(detailFilter==="request") return s.mode==="request";
  if(detailFilter==="requesting") return s.mode==="request" && s.reqTag==="requesting";
  if(detailFilter==="received") return s.done;
  if(detailFilter==="rejected") return !!s.rejected;
  if(detailFilter==="self") return s.mode==="self";
  if(detailFilter==="haslink") return !!s.link;
  if(detailFilter==="hasmemo") return !!(s.memo && s.memo.trim());
  return true;
}
function setFilter(f){ detailFilter=f; renderDetail(currentClientId); }
function setView(m){ viewMode=m; renderDetail(currentClientId); }
function toggleShowNa(){ showNa=!showNa; renderDetail(currentClientId); }
function toggleNav(){ navOpen=!navOpen; renderDetail(currentClientId); }
function focusBundleSet(bid){ focusBundle=bid; if(window.innerWidth<=760) navOpen=false; renderDetail(currentClientId); window.scrollTo({top:0,behavior:"smooth"}); }
function toggleBundle(cid,bid){ collapsed[cid+bid]=!collapsed[cid+bid]; renderDetail(cid); }

/* 목록형(컴팩트) 행 — 텍스트 체크리스트 */
function itemRow(c,it,isExtra,bid){
  const s=c.items[it.id]||{mode:"request",reqTag:"none",done:false,rejected:false};
  let label="미요청", col="var(--muted)";
  if(s.rejected){ label="보완필요"; col="var(--red)"; }
  else if(s.done){ label="받음"; col="var(--green)"; }
  else if(s.mode==="na"){ label="해당없음"; col="var(--gray)"; }
  else if(s.mode==="self"){ label="직접발급"; col="var(--brand)"; }
  else if(s.reqTag==="requesting"){ label="요청중"; col="var(--amber)"; }
  const stClass=s.rejected?"st-rej":(s.done?"st-recv":(s.mode==="na"?"st-na":(s.reqTag==="requesting"?"st-req":"")));
  return `<div class="lrow ${s.done&&!s.rejected?'done':''} ${stClass}">
    ${selMode?`<button class="chk" style="border-radius:50%;${selSet.has(it.id)?'background:var(--brand);border-color:var(--brand)':''}" onclick="toggleSel('${it.id}')">${selSet.has(it.id)?CHECK:''}</button>`:""}
    <button class="chk" onclick="toggleDone('${c.id}','${it.id}')">${s.done&&!s.rejected?CHECK:''}</button>
    <span class="lname">${esc(it.name)}${(s.files&&s.files.length)?` <span style="color:var(--brand)">📎${s.files.length}</span>`:""}${s.memo?` <span style="color:var(--muted)">📝</span>`:""}</span>
    <span class="lstat" style="color:${col}">${label}</span>
  </div>`;
}

function passFilterReject(s){ return s && s.rejected; }
function itemHtml(c,it,isExtra,bid){
  const s=c.items[it.id]||{mode:"request",reqTag:"none",done:false,memo:"",link:"",rejected:false};
  const showTags = s.mode==="request";
  const stClass = s.rejected?"st-rej":(s.done?"st-recv":(s.mode==="na"?"st-na":(s.reqTag==="requesting"?"st-req":"")));
  return `<div class="item ${s.done&&!s.rejected?'done':''} ${stClass}">
    <div class="item-row">
      ${selMode?`<button class="chk" style="border-radius:50%;${selSet.has(it.id)?'background:var(--brand);border-color:var(--brand)':''}" onclick="toggleSel('${it.id}')" title="선택">${selSet.has(it.id)?CHECK:''}</button>`:""}
      <button class="chk" onclick="toggleDone('${c.id}','${it.id}')">${s.done&&!s.rejected?CHECK:''}</button>
      <div class="item-name"><span class="nm">${esc(it.name)}</span>
        ${s.rejected?`<div class="item-note" style="color:var(--red);font-weight:700">⚠ 보완필요${s.rejectReason?` — ${esc(s.rejectReason)}`:""}</div>`:""}
        ${it.note?`<div class="item-note">${esc(it.note)}</div>`:""}
        ${WHERE[it.id]?`<div class="item-note">📍 ${esc(WHERE[it.id])}</div>`:""}
        ${s.link?`<div class="item-note"><a href="${esc(s.link)}" target="_blank" rel="noopener" style="color:var(--brand);font-weight:700">🔗 링크 열기</a></div>`:""}
        ${(s.files&&s.files.length)?`<div class="item-note">${s.files.map((f,fi)=>`📎 <a href="#" onclick="event.preventDefault();event.stopPropagation();openFile('${c.id}','${it.id}',${fi})" style="color:var(--brand);font-weight:700">${esc(f.name)}</a> <span style="color:var(--gray)">${fileSizeStr(f.size)}</span> <button onclick="event.stopPropagation();removeFile('${c.id}','${it.id}',${fi})" style="border:none;background:none;color:var(--red);cursor:pointer;font-size:14px">×</button>`).join("<br>")}</div>`:""}
        ${(function(){ let d=[]; if(s.reqDate&&!s.done) d.push(`요청 ${fmtD(s.reqDate)}${daysAgo(s.reqDate)>=3?` · ${daysAgo(s.reqDate)}일 경과`:''}`); if(s.recvDate&&s.done) d.push(`받음 ${fmtD(s.recvDate)}`); return d.length?`<div class="item-note" style="color:${(!s.done&&daysAgo(s.reqDate)>=7)?'var(--red)':'var(--brand)'}">🕒 ${d.join(" · ")}</div>`:""; })()}
        ${isExtra?`<button class="btn-ghost btn-sm" style="font-size:11px;color:var(--red);padding:2px 4px" onclick="removeExtra('${c.id}','${bid}','${it.id}')">삭제</button>`:""}
      </div>
      <div class="seg">
        <button class="${s.mode==='self'?'on-self':''}" onclick="setMode('${c.id}','${it.id}','self')">직접발급</button>
        <button class="${s.mode==='request'?'on-req':''}" onclick="setMode('${c.id}','${it.id}','request')">의뢰인요청</button>
        <button class="${s.mode==='na'?'on-na':''}" onclick="setMode('${c.id}','${it.id}','na')">해당없음</button>
      </div>
      ${showTags?`<div class="tags">
        <button class="tag ${s.reqTag==='none'?'on t-none':''}" onclick="setTag('${c.id}','${it.id}','none')">미요청</button>
        <button class="tag ${s.reqTag==='requesting'?'on t-req':''}" onclick="setTag('${c.id}','${it.id}','requesting')">요청중</button>
        <button class="tag ${s.reqTag==='received'?'on t-recv':''}" onclick="setTag('${c.id}','${it.id}','received')">받음</button>
      </div>`:""}
      <button class="memo-toggle" onclick="attachFiles('${c.id}','${it.id}')">📎 파일${(s.files&&s.files.length)?` ${s.files.length}`:""}</button>
      <button class="memo-toggle" onclick="setLink('${c.id}','${it.id}')">${s.link?'🔗 링크':'＋ 링크'}</button>
      <button class="memo-toggle" onclick="toggleMemo('${it.id}')">${s.memo?'📝 메모':'＋ 메모'}</button>
      <button class="memo-toggle" style="color:${s.rejected?'var(--red)':'var(--muted)'};font-weight:${s.rejected?'800':'400'}" onclick="toggleReject('${c.id}','${it.id}')">${s.rejected?'⚠ 보완해제':'⚠ 보완'}</button>
    </div>

/* ---------- 6b. 서류 파일 첨부 (깃헙 저장소 동기화) ---------- */
function fileSizeStr(n){ return n<1024*1024 ? Math.max(1,Math.round(n/1024))+"KB" : (n/1048576).toFixed(1)+"MB"; }
function arrayBufferToBase64(buf){ const bytes=new Uint8Array(buf); let bin=""; const chunk=0x8000;
  for(let i=0;i<bytes.length;i+=chunk){ bin+=String.fromCharCode.apply(null,bytes.subarray(i,i+chunk)); } return btoa(bin); }
function ghContentsUrl(path){ return `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${path.split("/").map(encodeURIComponent).join("/")}`; }
function attachFiles(cid,id){
  if(!githubReady()){ toast("파일 첨부는 ⚙️설정에서 깃헙 연결 후 가능합니다 (기기 간 공유를 위해)"); return; }
  const inp=document.createElement("input"); inp.type="file"; inp.multiple=true;
  inp.onchange=async()=>{
    const files=[...inp.files]; if(!files.length) return;
    const c=findClient(cid); const s=c.items[id]; if(!s.files) s.files=[];
    let okN=0;
    for(const f of files){
      if(f.size>100*1024*1024){ toast(`${f.name}: 100MB 초과 — 건너뜀`); continue; }
      if(f.size>25*1024*1024 && !confirm(`${f.name} (${fileSizeStr(f.size)})는 큰 파일이라 업로드가 느리거나 실패할 수 있어요. 계속할까요? (큰 파일은 🔗링크 권장)`)) continue;
      setSync("saving"); toast(`${f.name} 업로드 중…`);
      try{
        const buf=await f.arrayBuffer(); const b64=arrayBufferToBase64(buf);
        const safe=(f.name||"file").replace(/[^\w.\-가-힣]/g,"_");
        const path=`files/${cid}/${id}/${Date.now()}_${safe}`;
        const r=await fetch(ghContentsUrl(path),{method:"PUT",headers:Object.assign({"Content-Type":"application/json"},ghHeaders()),
          body:JSON.stringify({message:`attach ${f.name}`,content:b64,branch:cfg.branch})});
        if(!r.ok){ const t=await r.text(); throw new Error("HTTP "+r.status+" "+t.slice(0,80)); }
        const j=await r.json();
        s.files.push({name:f.name,size:f.size,path,sha:j.content.sha,by:deviceName||"미설정",ts:now()});
        okN++;
      }catch(e){ console.error(e); toast(`${f.name} 업로드 실패: ${e.message}`); setSync("error"); }
    }
    if(okN){ touch(`[${c.name}] '${itemName(id,c)}' 파일 ${okN}개 첨부`); toast(`${okN}개 첨부 완료 ✓`); }
    renderDetail(cid);
  };
  inp.click();
}
async function openFile(cid,id,idx){
  const c=findClient(cid); const f=(c.items[id].files||[])[idx]; if(!f) return;
  if(!githubReady()){ toast("깃헙 연결 후 첨부파일을 열 수 있습니다"); return; }
  toast("파일 여는 중…");
  try{
    const r=await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/git/blobs/${f.sha}`,{headers:ghHeaders()});
    if(!r.ok) throw new Error("HTTP "+r.status);
    const j=await r.json(); const bin=atob((j.content||"").replace(/\n/g,""));
    const bytes=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
    const blob=new Blob([bytes]); const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download=f.name; document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),15000);
  }catch(e){ console.error(e); toast("파일 열기 실패: "+e.message); }
}
async function removeFile(cid,id,idx){
  const c=findClient(cid); const f=(c.items[id].files||[])[idx]; if(!f) return;
  if(!confirm(`'${f.name}' 첨부를 삭제할까요?`)) return;
  if(githubReady()){ try{ await fetch(ghContentsUrl(f.path),{method:"DELETE",headers:Object.assign({"Content-Type":"application/json"},ghHeaders()),
    body:JSON.stringify({message:`delete ${f.name}`,sha:f.sha,branch:cfg.branch})}); }catch(e){ console.warn(e); } }

}

function renderMsgModal(){

      <input type="checkbox" id="msgHow" checked onchange="_msgCtx.how=this.checked;regenMsg()"> 발급처·발급방법 안내 포함</label>
    <div class="field"><label>미리보기 (직접 수정 가능)</label>
      <textarea id="msgText" rows="9" style="font-size:13px;line-height:1.6"></textarea></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">닫기</button>
      <button class="btn" onclick="copyRequestMsg(false)">복사만</button>
      <button class="btn btn-primary" onclick="copyRequestMsg(true)">복사 + 요청중 표시</button>

function toggleMsgSel(id){ if(_msgCtx.sel.has(id)) _msgCtx.sel.delete(id); else _msgCtx.sel.add(id);
  const cnt=$("#msgCount"); if(cnt) cnt.textContent=_msgCtx.sel.size; regenMsg(); }
function buildRequestText(){
  const c=findClient(_msgCtx.cid);
  const firm=(cfg.firmName||"법무법인").trim();
  const name=(c.name||"").trim();
  const items=_msgCtx.list.filter(x=>_msgCtx.sel.has(x.id));
  const how=_msgCtx.how;
  if(items.length===0) return "(포함할 서류를 1개 이상 선택하세요)";
  const remind = _msgCtx.kind==="reminder";
  let t="";
  if(_msgCtx.tone==="formal"){
    t+= remind
      ? `[${firm}] 안녕하세요, ${name}님.\n지난번에 요청드린 아래 서류가 아직 도착하지 않아 다시 안내드립니다. 번거로우시겠지만 준비되는 대로 보내주시면 감사하겠습니다.\n\n`
      : `[${firm}] 안녕하세요, ${name}님.\n개인회생 사건 진행을 위해 아래 서류가 필요합니다. 준비되는 대로 보내주시면 감사하겠습니다.\n\n`;
    items.forEach((x,i)=>{ t+=`${i+1}. ${x.name}\n`; if(how && WHERE[x.id]) t+=`   ↳ ${WHERE[x.id]}\n`; });
    t+=`\n사진 또는 파일(PDF)로 보내주시면 됩니다. 문의사항은 편하게 연락 주세요.\n감사합니다.`;
  } else if(_msgCtx.tone==="simple"){
    t+= remind ? `${name}님, 지난번 요청드린 서류 중 아직 못 받은 항목입니다.\n\n` : `${name}님, 개인회생 진행에 필요한 서류입니다.\n\n`;
    items.forEach(x=>{ t+=`- ${x.name}`; if(how && WHERE[x.id]) t+=` (${WHERE[x.id]})`; t+=`\n`; });
    t+=`\n준비되는 대로 보내주세요. 감사합니다. - ${firm}`;
  } else { // kakao
    t+= remind ? `${name}님 안녕하세요 😊\n지난번에 부탁드린 서류 중 아직 안 온 것들이에요! 확인 부탁드려요 🙏\n\n` : `${name}님 안녕하세요 😊\n개인회생 준비로 아래 서류가 필요해요!\n\n`;
    items.forEach(x=>{ t+=`✅ ${x.name}`; if(how && WHERE[x.id]) t+=`\n   → ${WHERE[x.id]}`; t+=`\n`; });
    t+=`\n준비되면 사진이나 파일로 보내주시면 됩니다 🙏\n- ${firm}`;
  }
  return t;
}
function regenMsg(){ const ta=$("#msgText"); if(ta) ta.value=buildRequestText(); }
function copyRequestMsg(mark){
  const ta=$("#msgText"); const text=ta?ta.value:"";
  copyText(text).then(ok=>{
    if(mark){
      const c=findClient(_msgCtx.cid); let n=0;
      _msgCtx.sel.forEach(id=>{ const s=c.items[id]; if(s && s.reqTag!=="received"){ s.reqTag="requesting"; if(!s.reqDate) s.reqDate=now(); n++; } });
      touch(`[${c.name}] ${_msgCtx.kind==="reminder"?"리마인더":"요청 메시지"} 발송 (${n}건 요청중)`);
      renderDetail(_msgCtx.cid);
    }
    closeModal();
    toast(ok?(mark?"복사 완료 · 요청중으로 표시했습니다 ✓":"메시지를 복사했습니다 ✓"):"복사 실패 — 메시지를 직접 선택해 복사하세요");
  });
}
function copySummary(cid){
  const c=ensureItems(findClient(cid)); const p=progress(c);
  const buckets={recv:[],reqing:[],notreq:[],self:[]};
  const push=(it)=>{ const s=c.items[it.id]; if(!s||s.mode==="na") return;
    if(s.done) buckets.recv.push(it.name);
    else if(s.mode==="request"){ if(s.reqTag==="requesting") buckets.reqing.push(it.name); else buckets.notreq.push(it.name); }
    else buckets.self.push(it.name); };
  TEMPLATE.forEach(b=>b.groups.forEach(g=>g.items.forEach(push)));
  Object.keys(c.extra||{}).forEach(bid=>(c.extra[bid]||[]).forEach(push));
  let t=`[${c.name}] 개인회생 서류 진행상황 (${fmtD(now())})\n`;
  t+=`사건: ${c.caseType||"개인회생"}${c.caseNo?(" "+c.caseNo):""}\n`;
  t+=`확보 ${p.done}/${p.total} (${p.pct}%)\n\n`;
  if(buckets.reqing.length) t+=`■ 요청중(회신 대기): ${buckets.reqing.join(", ")}\n`;
  if(buckets.notreq.length) t+=`■ 미요청(요청 필요): ${buckets.notreq.join(", ")}\n`;
  if(buckets.self.length) t+=`■ 직접발급 예정: ${buckets.self.join(", ")}\n`;
  if(buckets.recv.length) t+=`■ 확보 완료: ${buckets.recv.join(", ")}\n`;
  if(c.memo) t+=`\n[메모] ${c.memo}\n`;
  copyText(t).then(ok=>toast(ok?"진행상황을 복사했습니다 ✓ (노션·시트에 붙여넣기)":"복사 실패"));
}

/* ---------- 7d. 인쇄 / PDF 출력 ---------- */
function printChecklist(cid){
  const c=ensureItems(findClient(cid)); const p=progress(c);
  const stTxt=(s)=>{ if(s.done) return "☑ 확보완료"+(s.recvDate?` (${fmtD(s.recvDate)})`:""); if(s.mode==="na") return "— 해당없음"; if(s.mode==="self") return "☐ 직접발급"; if(s.reqTag==="requesting") return "☐ 요청중"+(s.reqDate?` (${fmtD(s.reqDate)})`:""); return "☐ 요청필요"; };
  let rows="";
  TEMPLATE.forEach((b,bi)=>{
    rows+=`<tr class="bh"><td colspan="3">${bi+1}. ${esc(b.title)}</td></tr>`;
    b.groups.forEach(g=>{ if(g.title) rows+=`<tr class="gh"><td colspan="3">— ${esc(g.title)}</td></tr>`;
      g.items.forEach(it=>{ const s=c.items[it.id]; if(!s) return; rows+=`<tr><td>${esc(it.name)}</td><td>${stTxt(s)}</td><td>${esc(s.memo||"")}</td></tr>`; }); });
    (c.extra[b.id]||[]).forEach(ex=>{ const s=c.items[ex.id]; if(!s) return; rows+=`<tr><td>${esc(ex.name)} (추가)</td><td>${stTxt(s)}</td><td>${esc(s.memo||"")}</td></tr>`; });
  });
  const w=window.open("","_blank"); if(!w){ toast("팝업이 차단되었습니다. 팝업 허용 후 다시 시도하세요"); return; }
  w.document.write(`<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8"><title>${esc(c.name)} 서류 체크리스트</title>
   <style>body{font-family:"Malgun Gothic","맑은 고딕",sans-serif;padding:24px;color:#1f2540}h1{font-size:20px;margin:0 0 4px}.sub{color:#555;font-size:13px;margin-bottom:6px}table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:10px}td,th{border:1px solid #c5c9d6;padding:6px 9px;vertical-align:top;text-align:left}tr.bh td{background:#3b5bdb;color:#fff;font-weight:800}tr.gh td{background:#eef0f6;font-weight:700;color:#2f49bf}th{background:#f0f2f8}@media print{.noprint{display:none}}</style></head>
   <body><h1>${esc(c.name)} — 개인회생 서류 체크리스트</h1>
   <div class="sub">${esc(c.caseType||"개인회생")}${c.caseNo?(" · "+esc(c.caseNo)):""}${(c.incomeType&&c.incomeType!=="미정")?(" · "+esc(c.incomeType)):""} · 확보 ${p.done}/${p.total} (${p.pct}%) · 출력일 ${fmtD(now())}</div>
   ${c.memo?`<div class="sub">메모: ${esc(c.memo)}</div>`:""}
   <button class="noprint" onclick="window.print()" style="margin:10px 0;padding:9px 16px;font-size:14px;font-weight:700;border:1px solid #3b5bdb;background:#3b5bdb;color:#fff;border-radius:8px;cursor:pointer">🖨️ 인쇄 / PDF로 저장</button>
   <table><thead><tr><th style="width:45%">서류</th><th style="width:25%">상태</th><th>메모</th></tr></thead><tbody>${rows}</tbody></table></body></html>`);
  w.document.close();
  setTimeout(()=>{ try{ w.focus(); w.print(); }catch(_){} }, 500);
}

/* ---------- 7c. 데이터 백업 / 복원 ---------- */
function exportData(){
  const blob=new Blob([JSON.stringify(state,null,1)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="서류취합_백업_"+fmtD(now()).replace("/","-")+".json"; a.click();
  toast("백업 파일을 내려받았습니다");
}
function importData(){
  const inp=document.createElement("input"); inp.type="file"; inp.accept=".json,application/json";
  inp.onchange=()=>{ const f=inp.files[0]; if(!f) return; const r=new FileReader();
    r.onload=()=>{ try{ const d=JSON.parse(r.result);
      if(!confirm("현재 데이터를 이 백업으로 교체할까요? (되돌릴 수 없습니다)")) return;
      state=d; if(!state.clients)state.clients=[]; if(!state.log)state.log=[]; state.clients.forEach(ensureItems);
      touch("백업 파일에서 데이터 복원"); showDashboard(); toast("복원 완료 ✓");
    }catch(e){ toast("올바른 백업 파일이 아닙니다"); } };
    r.readAsText(f); };
  inp.click();
}

function openSnapshots(){
  const snaps=getSnapshots();
  const rows=snaps.length? snaps.map((s,i)=>`<div class="log-row">
    <div class="log-ts">${fmt(s.ts)}</div>
    <div class="log-who">${esc(s.by||'?')}</div>
    <div class="log-txt">${esc(s.note||'')} <span style="color:var(--muted)">· 의뢰인 ${s.clients}명</span></div>
    <button class="btn btn-sm" onclick="restoreSnapshot(${i})">되돌리기</button></div>`).join("")
    : `<div class="log-row"><div class="log-txt" style="color:var(--muted)">아직 스냅샷이 없습니다.</div></div>`;
  modal(`<h3>🕘 스냅샷에서 되돌리기</h3>
    <p class="hint">변경할 때마다 자동 저장된 시점입니다. 실수로 지웠거나 잘못 바꿨을 때 그 시점으로 되돌립니다.</p>
    <div class="log-list" style="max-height:55vh;overflow:auto">${rows}</div>
    <div class="modal-actions"><button class="btn" onclick="openSettings()">← 설정</button><button class="btn" onclick="closeModal()">닫기</button></div>`,660);
}
function restoreSnapshot(i){
  const snaps=getSnapshots(); const s=snaps[i]; if(!s) return;
  if(!confirm(`${fmt(s.ts)} 시점(의뢰인 ${s.clients}명)으로 되돌릴까요? 지금 내용은 스냅샷에 백업됩니다.`)) return;
  pushSnapshot();
  try{ state=JSON.parse(s.data); }catch(e){ toast("스냅샷 복구 실패"); return; }
  if(!state.clients)state.clients=[]; if(!state.log)state.log=[]; state.clients.forEach(ensureItems);
  touch("스냅샷 복구: "+fmt(s.ts)); showDashboard(); toast("되돌렸습니다 ✓");
}

async function connectGithub(){
  deviceName=$("#s_device").value.trim(); localStorage.setItem(LS_DEVICE,deviceName);
  cfg.firmName=$("#s_firm").value.trim()||"법무법인";
  cfg.owner=$("#s_owner").value.trim(); cfg.repo=$("#s_repo").value.trim();
  cfg.branch=$("#s_branch").value.trim()||"main"; cfg.token=$("#s_token").value.trim();
  saveCfg();
  if(!githubReady()){ updateSyncPill(); toast("저장됨 · 깃헙 동기화는 owner/repo/토큰을 모두 입력하세요"); return; }
  setSync("saving"); toast("연결 확인 중…");
  const ok=await pullFromGithub(false);
  if(ok){ await pushToGithub(true); startPolling(); closeModal(); toast("깃헙 연결 완료 ✓"); }
  else { toast("연결 실패 — 입력값/권한을 확인하세요"); }
  updateSyncPill();
}
function disconnectGithub(){ cfg={repo:"",owner:"",branch:"main",token:"",path:"data.json",firmName:cfg.firmName||"법무법인"}; saveCfg(); clearInterval(pollTimer); setSync("local"); closeModal(); toast("연결을 해제했습니다 (로컬 저장)"); }
function updateSyncPill(){ setSync(githubReady()?(syncStatus==="error"?"error":"ok"):"local"); }

/* ---------- 9. 로그 ---------- */
function openLog(){
  const rows=state.log.length? state.log.map(l=>`<div class="log-row">
    <div class="log-ts">${fmt(l.ts)}</div><div class="log-who">${esc(l.who)}</div><div class="log-txt">${esc(l.text)}</div></div>`).join("")
    : `<div class="log-row"><div class="log-txt" style="color:var(--muted)">아직 기록이 없습니다.</div></div>`;
  modal(`
    <h3>📜 활동 로그 (${state.log.length})</h3>
    <p class="hint">누가·언제·무엇을 바꿨는지 자동 기록됩니다. 깃헙 연결 시 저장소 커밋 내역에도 영구 보관됩니다.</p>
    <div class="log-list" style="max-height:55vh;overflow:auto">${rows}</div>
    <div class="modal-actions">
      <button class="btn" onclick="exportLog()">📥 로그 내려받기(.csv)</button>
      <button class="btn" onclick="closeModal()">닫기</button>
    </div>`,640);
}
function exportLog(){
  const csv="시각,사용자,내용\n"+state.log.map(l=>`"${l.ts}","${(l.who||'').replace(/"/g,'""')}","${(l.text||'').replace(/"/g,'""')}"`).join("\n");
  const blob=new Blob(["﻿"+csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="활동로그.csv"; a.click();
}

/* ---------- 10. 모달 ---------- */
function modal(html,maxw){ $("#modalRoot").innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal" style="${maxw?'max-width:'+maxw+'px':''}">${html}</div></div>`; }
function closeModal(){ $("#modalRoot").innerHTML=""; }

/* ---------- 11. 시작 ---------- */
function boot(){
  let loaded=false;
  try{ const d=localStorage.getItem(LS_DATA); if(d){ state=JSON.parse(d); loaded=true; } }catch(_){}
  if(!loaded){ // 1차 복구: 직전본
    try{ const b=localStorage.getItem(LS_DATA_BAK); if(b){ state=JSON.parse(b); loaded=true; toast("직전 저장본에서 복구했습니다"); } }catch(_){}
  }
  if(!loaded){ // 2차 복구: 최신 스냅샷
    try{ const snaps=getSnapshots(); if(snaps.length){ state=JSON.parse(snaps[0].data); loaded=true; toast("자동 스냅샷에서 복구했습니다"); } }catch(_){}
  }
  try{ const c=localStorage.getItem(LS_CFG); if(c) cfg=Object.assign(cfg,JSON.parse(c)); }catch(_){}
  if(!state.clients) state.clients=[]; if(!state.log) state.log=[];
  state.clients.forEach(ensureItems);
  if(migrateIfNeeded()) saveLocal();
  updateSyncPill();
  renderDashboard();
  if(githubReady()){ pullFromGithub(true).then(()=>startPolling()); }
}
window.addEventListener("DOMContentLoaded",boot);
window.addEventListener("beforeunload",()=>{ saveLocal(); });
</script>
</body>
