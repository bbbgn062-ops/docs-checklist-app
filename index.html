<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>이준 회생서류 취합 시스템</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#FAF9F7; --panel:#ffffff; --line:#ECE7E1; --ink:#1C1917; --muted:#857D76;
    --brand:#9B1B33; --brand-dark:#7A1427; --brand-soft:#F7E7EB; --green:#059669; --green-soft:#DCF5E8;
    --amber:#D97706; --amber-soft:#FCEFD3; --red:#DC2626; --red-soft:#FCE4E4;
    --gray:#A8A29E; --gray-soft:#F1EDE9; --shadow:0 2px 10px rgba(60,40,30,.05);
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Pretendard","Pretendard Variable","Malgun Gothic","맑은 고딕",-apple-system,"Apple SD Gothic Neo",sans-serif;
    background:var(--bg);color:var(--ink);font-size:15.5px;line-height:1.55;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;font-size:14px;}
  .hidden{display:none !important;}

  /* Header */
  header{background:var(--panel);border-bottom:1px solid var(--line);padding:12px 20px;
    display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:50;}
  header h1{font-size:18px;margin:0;font-weight:900;letter-spacing:-.4px;}
  header .sub{color:var(--muted);font-size:12.5px;}
  .grow{flex:1;}
  .sync-pill{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;
    padding:6px 11px;border-radius:999px;background:var(--gray-soft);color:var(--muted);border:1px solid var(--line);}
  .sync-pill .dot{width:8px;height:8px;border-radius:50%;background:var(--gray);}
  .sync-on{background:var(--green-soft);color:var(--green);border-color:#bfe9d0;}
  .sync-on .dot{background:var(--green);}
  .sync-err{background:var(--red-soft);color:var(--red);border-color:#f2c4c4;}
  .sync-err .dot{background:var(--red);}

  .btn{border:1px solid var(--line);background:#fff;color:var(--ink);padding:8px 13px;border-radius:9px;
    font-weight:700;font-size:13.5px;}
  .btn:hover{background:var(--gray-soft);}
  .btn-primary{background:var(--brand);color:#fff;border-color:var(--brand);box-shadow:0 4px 14px rgba(155,27,51,.22);}
  .btn-primary:hover{background:var(--brand-dark);border-color:var(--brand-dark);}
  .btn-sm{padding:5px 9px;font-size:12.5px;border-radius:9px;}
  .btn-ghost{border-color:transparent;background:transparent;color:var(--muted);box-shadow:none;}
  .btn-danger{color:var(--red);border-color:#f3c9c9;background:var(--red-soft);box-shadow:none;}

  .wrap{max-width:1120px;margin:0 auto;padding:22px 20px 80px;}

  /* Dashboard */
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap;}
  .search{flex:1;min-width:200px;display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);
    border-radius:10px;padding:8px 12px;box-shadow:var(--shadow);}
  .search input{border:none;outline:none;flex:1;font-size:14.5px;background:transparent;}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow);
    cursor:pointer;transition:transform .08s,box-shadow .12s;}
  .card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(60,40,30,.08);}
  .card.arch{opacity:.62;}
  .card-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .card-name{font-size:17px;font-weight:900;letter-spacing:-.4px;}
  .badge{font-size:11.5px;font-weight:800;padding:3px 9px;border-radius:7px;background:var(--brand-soft);color:var(--brand);}
  .badge.회생{background:var(--brand-soft);color:var(--brand);}
  .badge.파산{background:var(--amber-soft);color:var(--amber);}
  .badge.기타{background:var(--gray-soft);color:var(--muted);}
  .meta{font-size:12.5px;color:var(--muted);margin-bottom:12px;}
  .bar{height:9px;border-radius:999px;background:#EBE6E0;overflow:hidden;margin-bottom:6px;}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,#e14b6f,#9B1B33);border-radius:999px;transition:width .5s;}
  .card-stats{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
  .chip{font-size:11.5px;font-weight:700;padding:3px 8px;border-radius:7px;background:var(--gray-soft);color:var(--muted);}
  .chip.req{background:var(--amber-soft);color:var(--amber);}
  .chip.wait{background:var(--brand-soft);color:var(--brand);}
  .chip.miss{background:var(--red-soft);color:var(--red);}
  .chip.ok{background:var(--green-soft);color:var(--green);}
  .empty{text-align:center;color:var(--muted);padding:60px 20px;}
  .empty .big{font-size:48px;margin-bottom:8px;}

  /* Detail */
  .back{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-weight:700;background:none;border:none;
    padding:0;margin-bottom:14px;font-size:14px;}
  .detail-head{display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:8px;}
  .detail-head h2{margin:0;font-size:24px;font-weight:800;letter-spacing:-.4px;}
  .overall{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin:14px 0 18px;box-shadow:var(--shadow);}
  .overall .pct{font-size:30px;font-weight:800;color:var(--green);}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .fbtn{border:1px solid var(--line);background:#fff;color:var(--muted);padding:6px 13px;border-radius:999px;font-size:12.5px;font-weight:700;transition:all .12s;}
  .fbtn:hover{border-color:rgba(155,27,51,.3);}
  .fbtn.active{background:var(--brand);color:#fff;border-color:var(--brand);box-shadow:0 3px 10px rgba(155,27,51,.22);}

  /* ── 상세: 컨트롤바 · 2단 레이아웃 · 묶음 탭 · 목록형 ── */
  .ctrlbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px;background:#fff;border:1px solid var(--line);border-radius:13px;padding:8px 10px;box-shadow:var(--shadow);}
  .iconbtn{border:1px solid var(--line);background:#fff;color:var(--ink);font-weight:700;font-size:13px;padding:8px 13px;border-radius:9px;transition:all .12s;}
  .iconbtn:hover{background:var(--gray-soft);}
  .iconbtn.on{background:var(--brand);color:#fff;border-color:var(--brand);}
  .segview{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;}
  .segview button{border:none;background:#fff;color:var(--muted);font-weight:700;font-size:13px;padding:8px 13px;border-right:1px solid var(--line);}
  .segview button:last-child{border-right:none;}
  .segview button.on{background:var(--ink);color:#fff;}
  .ctrl-sel{border:1px solid var(--line);border-radius:9px;padding:8px 12px;font-weight:700;font-size:13px;background:#fff;color:var(--ink);min-width:120px;}
  .selbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--brand-soft);border:1px solid #ECD2DA;border-radius:13px;padding:10px 13px;margin-bottom:12px;font-size:13.5px;}
  .detail-grid{display:grid;grid-template-columns:236px 1fr;gap:16px;align-items:start;}
  .detail-grid.navclosed{grid-template-columns:1fr;}
  .detail-grid.navclosed .bnav{display:none;}
  .bnav{position:sticky;top:78px;display:flex;flex-direction:column;gap:3px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:7px;box-shadow:var(--shadow);max-height:calc(100vh - 96px);overflow:auto;}
  .bnav-item{display:flex;align-items:center;justify-content:space-between;gap:8px;text-align:left;border:none;background:none;border-radius:10px;padding:9px 10px;font-size:12.5px;font-weight:700;color:var(--ink);cursor:pointer;line-height:1.3;}
  .bnav-item:hover{background:var(--gray-soft);}
  .bnav-item.on{background:var(--brand-soft);color:var(--brand);}
  .bnav-item > span:first-child{display:flex;align-items:center;min-width:0;}
  .bnav-item .bn{display:inline-flex;width:18px;height:18px;border-radius:5px;background:var(--gray-soft);color:var(--muted);align-items:center;justify-content:center;font-size:11px;font-weight:800;margin-right:7px;flex:0 0 auto;}
  .bnav-item.on .bn{background:var(--brand);color:#fff;}
  .bnp{font-size:11.5px;color:var(--muted);font-weight:800;flex:0 0 auto;}
  .bnp.fdone{color:var(--green);}
  .checklist{min-width:0;}
  .bundle-body.listmode{padding:2px 10px 8px;}
  .lrow{display:flex;align-items:center;gap:11px;padding:9px 6px;border-top:1px solid var(--line);}
  .lrow:first-child{border-top:none;}
  .lrow.done{background:#E7F7EC;border-radius:8px;border-top-color:transparent;}
  .lrow.done .chk{background:var(--green);border-color:var(--green);}
  .lname{flex:1;min-width:0;font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .lrow.done .lname{color:#2C6B48;font-weight:700;}
  .lstat{flex:0 0 auto;font-size:12px;font-weight:800;}

  /* 빠른 버튼 / 태그칩 / CTA / 검색 */
  .qbtn{border:1px solid var(--line);background:#fff;color:var(--brand);font-weight:700;font-size:11.5px;padding:5px 10px;border-radius:8px;}
  .qbtn:hover{background:var(--brand-soft);}
  .tagchip{font-size:11.5px;font-weight:700;background:var(--gray-soft);color:var(--ink);padding:4px 10px;border-radius:999px;}
  .cta{display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,#FFF5F7,#FFFDF8);border:1px solid #F0DDE3;border-radius:14px;padding:13px 16px;margin-bottom:12px;}
  .cta b{font-size:14.5px;}
  .docsearch{display:flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line);border-radius:9px;padding:6px 10px;}
  .docsearch input{border:none;outline:none;font-size:13px;width:130px;background:transparent;}

  .bnav-title{font-size:11px;font-weight:800;color:var(--muted);padding:6px 10px 5px;letter-spacing:.3px;}
  /* 드로어 backdrop (모바일 바텀시트용) — 데스크톱에선 숨김 */
  .drawer-back{position:fixed;inset:0;background:rgba(20,16,14,.4);z-index:80;display:none;}

  /* 인터랙션: 카드 등장/누름 */
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .card{animation:fadeUp .28s ease both;}
  .card:active{transform:scale(.99);}
  .btn:active,.qbtn:active,.fbtn:active,.iconbtn:active,.stage-step:active{transform:scale(.97);}
  .bnav-item:active{transform:scale(.99);}

  .bundle{background:var(--panel);border:1px solid var(--line);border-radius:14px;margin-bottom:14px;box-shadow:var(--shadow);overflow:hidden;}
  .bundle-head{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;user-select:none;}
  .bundle-head:hover{background:#fafbff;}
  .bnum{width:26px;height:26px;border-radius:8px;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;flex:0 0 auto;}
  .bundle-title{font-size:16px;font-weight:600;flex:1;letter-spacing:-.2px;}
  .tbar{height:4px;border-radius:999px;background:#EBE6E0;overflow:hidden;}
  .tbar > i{display:block;height:100%;background:linear-gradient(90deg,#e14b6f,#9B1B33);border-radius:999px;transition:width .4s;}
  .bundle-prog{font-size:12.5px;color:var(--muted);font-weight:700;}
  .caret{color:var(--muted);transition:transform .15s;}
  .bundle.collapsed .caret{transform:rotate(-90deg);}
  .bundle.collapsed .bundle-body{display:none;}
  .bundle-body{padding:4px 14px 12px;}
  .subgroup-title{font-size:12.5px;font-weight:800;color:var(--brand);margin:12px 6px 6px;text-transform:none;}

  .item{border:1px solid var(--line);border-radius:14px;padding:15px 17px;margin:9px 0;background:#fff;transition:background .15s,border-color .15s;}
  .item.st-req{background:#FFF6E5;border-color:#F1DFBC;}      /* 요청중: 은은한 앰버 */
  .item.st-rej{background:#FCEAEA;border-color:#F0CDCD;}      /* 보완필요: 은은한 레드 */
  .item.done,.item.st-recv{background:#E7F7EC;border-color:#C3E9CF;} /* 완료: 은은한 연두/민트 */
  .item.st-na{background:#FAFAF9;opacity:.6;}
  .item-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  /* 토스뱅크형 원형 체크박스 */
  .chk{width:24px;height:24px;border-radius:50%;border:2px solid #D9D3CA;background:#fff;flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:800;line-height:1;
    transition:all .18s cubic-bezier(.2,.8,.2,1);}
  .chk:hover{border-color:var(--green);}
  .item.done .chk{background:var(--green);border-color:var(--green);transform:scale(1);}
  .item-name{flex:1;min-width:140px;font-weight:600;font-size:15.5px;letter-spacing:-.2px;}
  .nm{font-weight:600;}
  .item.done .nm{display:inline-block;background:#1F9D5B;color:#fff;font-weight:800;padding:3px 12px;border-radius:999px;font-size:14.5px;box-shadow:0 2px 6px rgba(31,157,91,.25);}
  .item.st-rej .nm{display:inline-block;background:var(--red);color:#fff;font-weight:800;padding:3px 12px;border-radius:999px;font-size:14.5px;}
  .item-note{font-size:12px;color:var(--muted);margin-top:2px;font-weight:400;}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
  .seg button{border:none;background:#fff;color:var(--muted);padding:5px 10px;font-size:12px;font-weight:700;border-right:1px solid var(--line);}
  .seg button:last-child{border-right:none;}
  .seg button.on-self{background:var(--brand);color:#fff;}
  .seg button.on-req{background:var(--amber);color:#fff;}
  .seg button.on-na{background:var(--gray);color:#fff;}
  .tags{display:inline-flex;gap:6px;}
  .tag{border:1px solid var(--line);background:#fff;color:var(--muted);padding:5px 10px;border-radius:999px;font-size:12px;font-weight:800;}
  .tag.on.t-none{background:var(--gray-soft);color:#586079;border-color:#d5d9e6;}
  .tag.on.t-req{background:var(--amber);color:#fff;border-color:var(--amber);}
  .tag.on.t-recv{background:var(--green);color:#fff;border-color:var(--green);}
  .memo-toggle{font-size:12px;color:var(--brand);font-weight:700;background:none;border:none;padding:4px 2px;}
  .sw{position:relative;display:inline-block;width:40px;height:22px;vertical-align:middle;cursor:pointer}.sw input{opacity:0;width:0;height:0}
  .sw span{position:absolute;inset:0;background:#cfcac3;border-radius:99px;transition:.2s}.sw span:before{content:"";position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
  .sw input:checked + span{background:#0A7D3C}.sw input:checked + span:before{transform:translateX(18px)}
  .memo-box{margin-top:8px;}
  .memo-box textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px;resize:vertical;min-height:42px;outline:none;}
  .memo-box textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(155,27,51,.12);}
  /* 의뢰인 메모 — 항상 펼침 + 자동확장(연노란 배경·주황 점선 테두리) */
  .memo-always label{display:block;font-size:12.5px;font-weight:800;color:var(--muted);margin-bottom:6px;}
  .memo-always textarea{width:100%;border:1.5px dashed var(--amber);border-radius:10px;background:#FFFBE9;
    padding:10px 12px;font:inherit;font-size:14px;line-height:1.6;color:var(--ink);
    resize:none;overflow:hidden;outline:none;min-height:44px;box-sizing:border-box;}
  .memo-always textarea:focus{border-color:#B45309;box-shadow:0 0 0 3px rgba(217,119,6,.15);}
  .memo-always textarea::placeholder{color:#bfa66a;}
  .additem{margin:8px 0 4px;}

  /* ── 토스식 컴팩트 서류 행 (한 줄 + 탭하면 펼침) ── */
  .item-head{display:flex;align-items:center;gap:12px;cursor:pointer;}
  .item-head .item-name{flex:1;min-width:0;}
  .item-src{font-size:12.5px;color:var(--muted);margin-top:3px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .status-pill{flex:0 0 auto;font-size:12px;font-weight:600;padding:5px 12px;border-radius:999px;line-height:1;}
  .item-caret{flex:0 0 auto;color:var(--gray);font-style:normal;font-size:14px;transition:transform .15s;}
  .item.open .item-caret{transform:rotate(180deg);}
  .item-body{margin-top:11px;padding-top:11px;border-top:1px solid var(--line);}
  .item-controls{display:flex;gap:8px;flex-wrap:wrap;margin:4px 0 8px;}
  .item-tools{display:flex;gap:5px;flex-wrap:wrap;}
  .item.done .nm{background:none;color:var(--ink);font-weight:600;padding:0;box-shadow:none;border-radius:0;font-size:15.5px;}
  .item.st-rej .nm{background:none;color:var(--red);font-weight:600;padding:0;border-radius:0;font-size:15.5px;}
  .item.done .item-src{color:#3A8F63;}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(20,24,45,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;}
  .modal{position:relative;background:#fff;border-radius:18px;padding:22px;max-width:460px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25);max-height:90vh;overflow:auto;}
  .modal-x{position:absolute;top:13px;right:13px;width:30px;height:30px;border:none;background:none;color:var(--muted);font-size:16px;cursor:pointer;border-radius:8px;line-height:1;z-index:2;}
  .modal-x:hover{background:var(--gray-soft);}
  .modal h3{margin:0 0 4px;font-size:18px;font-weight:600;padding-right:30px;}
  .modal p.hint{color:var(--muted);font-size:13px;margin:0 0 16px;}
  .field{margin-bottom:13px;}
  .field label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:5px;}
  .field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px 11px;outline:none;}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(155,27,51,.15);}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}
  .pgcard{position:relative;background:#fff;border:1px solid var(--line);border-radius:13px;padding:12px 11px 9px;width:212px;box-shadow:var(--shadow);transition:border-color .12s,box-shadow .12s;}
  .pgcard:hover{border-color:var(--gray);box-shadow:0 5px 16px rgba(60,40,30,.10);}
  .pgnum{position:absolute;top:10px;left:13px;color:var(--muted);font-size:11.5px;font-weight:800;background:rgba(255,255,255,.82);padding:1px 6px;border-radius:6px;z-index:1;}
  .pgthumb{height:262px;width:190px;display:flex;align-items:center;justify-content:center;overflow:hidden;margin:2px auto 0;}
  .pgctrl{display:flex;gap:1px;width:100%;justify-content:center;align-items:center;margin-top:7px;opacity:.55;transition:opacity .12s;}
  .pgcard:hover .pgctrl{opacity:1;}
  .pgbtn{border:none;background:none;color:var(--gray);font-size:15px;line-height:1;padding:6px;border-radius:8px;cursor:pointer;transition:background .12s,color .12s;}
  .pgbtn:hover{background:var(--gray-soft);color:var(--brand);}
  .pgbtn:disabled{opacity:.22;cursor:default;}
  .pgbtn:disabled:hover{background:none;color:var(--gray);}
  .pgx{position:absolute;top:7px;right:7px;border:none;background:rgba(255,255,255,.7);color:var(--gray);width:24px;height:24px;border-radius:8px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .12s;z-index:2;}
  .pgcard:hover .pgx{opacity:1;}
  .pgx:hover{background:var(--red-soft);color:var(--red);}
  @media(hover:none){ .pgctrl{opacity:1;} .pgx{opacity:1;} }
  .steps{font-size:13px;color:var(--ink);}
  .steps ol{margin:8px 0;padding-left:20px;}
  .steps li{margin:7px 0;}
  .steps code{background:#f0f2f8;padding:1px 6px;border-radius:5px;font-size:12.5px;}
  .note-warn{background:var(--amber-soft);color:#8a5a00;border-radius:9px;padding:10px 12px;font-size:12.5px;margin-top:10px;}

  /* Log */

const TAG_GROUPS={

};
const TAG_CONTROLLED=["b4g1","b4g2","b3g5","b3g6","b3g1","b3g2","b3g4"];
const ASSET_OPTS=["자가","임차보증금","차량","토지","사업용재산","기타재산"];

function firmShort(f){ if(!f) return "사무소"; if(f.includes("블루")) return "블루"; if(f.includes("이준")) return "이준"; return f.length>6?f.slice(0,6):f; }

function activeGroups(c){ const set=new Set();
  (TAG_GROUPS.income[c.incomeType]||[]).forEach(g=>set.add(g));
  (TAG_GROUPS.housing[c.housing]||[]).forEach(g=>set.add(g));
  (c.assets||[]).forEach(a=>(TAG_GROUPS.assets[a]||[]).forEach(g=>set.add(g)));
  return set; }
function applyTags(c){
  const anyTag = !!TAG_GROUPS.income[c.incomeType] || !!TAG_GROUPS.housing[c.housing] || ((c.assets||[]).length>0) || (c.housing==="무상거주");
  if(anyTag){ const active=activeGroups(c);
    TEMPLATE.forEach(b=>b.groups.forEach(g=>{ if(!TAG_CONTROLLED.includes(g.id)) return; const on=active.has(g.id);
      g.items.forEach(it=>{ const s=c.items[it.id]; if(!s||s.manual) return; if(on){ if(s.mode==="na") s.mode=it.mode; } else s.mode="na"; }); }));

/* 기존 데이터 복원 (한 번만): 공통 묶음이 과거 소득로직으로 '해당없음'에 갇힌 것 되살림 + 옛 소득유형 명칭 변환 */
function migrateV2(){
  const remap={"급여소득자":"직장인","사업소득자":"자영업자","연금수령자":"미정","복합(둘 이상)":"이중소득",
    "근로자(월급수령자)":"직장인","사업자":"자영업자","둘 다(겸업)":"이중소득"};
  const controlled=new Set(TAG_CONTROLLED);
  state.clients.forEach(c=>{ if(!c.items) return;
    if(remap[c.incomeType]) c.incomeType=remap[c.incomeType];
    TEMPLATE.forEach(b=>b.groups.forEach(g=>{ if(controlled.has(g.id)) return; // 공통 묶음만
      g.items.forEach(it=>{ const s=c.items[it.id]; if(s && !s.manual && s.mode==="na" && it.mode!=="na") s.mode=it.mode; }); }));
    applyTags(c); // 상황태그 정합성 재적용
  });
}
function migrateIfNeeded(){ let changed=false;
  if(state._ver<5){ state.clients.forEach(ensureItems); migrateV2(); state._ver=5; changed=true; }
  if(state._ver<6){ state.clients.forEach(ensureItems); migrateHideOptional(); state._ver=6; changed=true; }
  if(state._ver<8){ state.clients.forEach(ensureItems); migrateInsuranceRequired(); state._ver=8; changed=true; }
  if(changed){ state.updatedAt=now(); state.updatedBy=deviceName||state.updatedBy||"미설정"; }

/* 보험서류(내보험찾기·해약환급금)를 항상 필수로 복구 — 과거 '해당없음'에 갇혔던 기존 의뢰인 데이터 되살림.
   내보험찾기(b3-6)=직접발급, 해약환급금(b3-7)=의뢰인 요청. 직원이 수동 변경(manual)한 건은 존중. */
function migrateInsuranceRequired(){
  (state.clients||[]).forEach(c=>{ if(!c.items) return;
    const s6=c.items["b3-6"]; if(s6 && !s6.manual && s6.mode==="na") s6.mode="self";
    const s7=c.items["b3-7"]; if(s7 && !s7.manual && (s7.mode==="na" || s7.mode==="self")) s7.mode="request";
  });
}
/* 접수 시 선택서류 10종을 기본 '해당없음(숨김)'으로 — 단, 이미 손댄 항목(받음·요청중·파일·수동변경·보완)은 그대로 둠 */
function migrateHideOptional(){
  const OPT=["b4-6","b3-12","b6-1","b6-2","b5-2","b3-1","b3-8","b2-7","b2-6"];
  (state.clients||[]).forEach(c=>{ if(!c.items) return; OPT.forEach(id=>{ const s=c.items[id]; if(!s) return;
    const untouched = !s.manual && !s.done && !(s.files&&s.files.length) && s.reqTag!=="received" && s.reqTag!=="requesting" && !s.rejected && !(s.memo&&String(s.memo).trim()) && !(s.link&&String(s.link).trim());
    if(untouched) s.mode="na";
  }); });
}

/* 완료율 계산 */
function progress(client){
  let total=0, done=0, requesting=0, notReq=0, missing=0, rejected=0;
  const all=[];
  TEMPLATE.forEach(b=>b.groups.forEach(g=>g.items.forEach(it=>all.push(it.id))));
  Object.keys(client.extra||{}).forEach(bid=>(client.extra[bid]||[]).forEach(ex=>all.push(ex.id)));
  all.forEach(id=>{
    const s=client.items[id]; if(!s) return;
    if(s.mode==="na") return;
    total++;
    if(s.rejected) rejected++;
    if(s.done){ done++; }
    else { missing++;
      if(s.mode==="request"){ if(s.reqTag==="requesting") requesting++; else if(s.reqTag!=="received") notReq++; }
    }
  });
  return { total, done, pct: total? Math.round(done/total*100):0, requesting, notReq, missing, rejected };
}

    let snaps=[]; try{ snaps=JSON.parse(localStorage.getItem(LS_SNAP)||"[]"); }catch(_){ snaps=[]; }
    const minKey=(state.updatedAt||now()).slice(0,16); // 분 단위 — 같은 분이면 최신으로 교체
    const entry={ ts:now(), by:state.updatedBy||deviceName||"?", note:(state.log[0]&&state.log[0].text)||"변경", clients:(state.clients||[]).length, data:JSON.stringify(state) };
    if(snaps.length && _lastSnapMin===minKey){ snaps[0]=entry; } else { snaps.unshift(entry); }
    _lastSnapMin=minKey;
    if(snaps.length>SNAP_MAX) snaps.length=SNAP_MAX;
    localStorage.setItem(LS_SNAP, JSON.stringify(snaps));
  }catch(e){ console.warn("스냅샷 저장 건너뜀",e); }
}

async function gwPost(payload){
  payload.secret=cfg.gwSecret; let last;
  for(let a=0;a<2;a++){ try{
    const r=await fetch(cfg.gwUrl,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)});
    if(!r.ok) throw new Error("문지기 HTTP "+r.status);
    const j=await r.json(); if(!j||!j.ok) throw new Error((j&&j.error)||"문지기 오류"); return j;
  }catch(e){ last=e; if(a===0) await new Promise(rs=>setTimeout(rs,800)); } }
  throw last;
}
async function gwGet(params){
  const q=Object.assign({secret:cfg.gwSecret},params);
  const u=cfg.gwUrl+"?"+Object.keys(q).map(k=>encodeURIComponent(k)+"="+encodeURIComponent(q[k])).join("&");
  let last;
  for(let a=0;a<2;a++){ try{
    const r=await fetch(u); if(!r.ok) throw new Error("문지기 HTTP "+r.status);
    const j=await r.json(); if(!j||!j.ok) throw new Error((j&&j.error)||"문지기 오류"); return j;
  }catch(e){ last=e; if(a===0) await new Promise(rs=>setTimeout(rs,800)); } }
  throw last;
}
/* 파일 저장소: 케이스허브 모드면 Supabase Storage(docs 버킷), 아니면 드라이브 문지기.
   업로드는 {id: 저장경로} 를 돌려주므로, 호출부는 기존처럼 file.driveId 에 저장경로를 담는다(코드 재사용). */
function b64ToBytes(b64){ const bin=atob((b64||"").replace(/\n/g,"")); const a=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) a[i]=bin.charCodeAt(i); return a; }
async function gwUpload(folder,name,mime,b64){
  if(BACKEND==="supabase"){
    if(!sbInit()) throw new Error("저장소 미연결");
    // ★ 저장소 키는 영문만 허용(한글 불가). 실제 파일명은 documents.file_name에 한글 그대로 보관됨.
    const dir=String(folder||"").replace(/[^\w\-]/g,"")||"uploads";
    const ni=String(name||"").lastIndexOf("."); const ext=ni>0?String(name).slice(ni).replace(/[^.\w]/g,"").slice(0,10):"";
    const path="u/"+dir+"/"+Date.now()+"_"+Math.random().toString(36).slice(2,8)+ext;
    const {error}=await sb.storage.from("docs").upload(path, b64ToBytes(b64), {contentType:mime||"application/octet-stream", upsert:false});
    if(error) throw error;
    return { id: path };
  }
  return gwPost({action:"upload",folder:folder,name:name,mime:mime,content:b64,user:deviceName||"미설정"});
}
async function gwDelete(id){
  if(BACKEND==="supabase"){ if(!sbInit()) return; const {error}=await sb.storage.from("docs").remove([id]); if(error) throw error; return {ok:true}; }
  return gwPost({action:"delete",id:id,user:deviceName||"미설정"});
}
async function gwFetchBytes(id){
  if(BACKEND==="supabase"){
    if(!sbInit()) throw new Error("저장소 미연결");
    const {data,error}=await sb.storage.from("docs").download(id); if(error) throw error;
    return new Uint8Array(await data.arrayBuffer());
  }
  const j=await gwGet({action:"file",id:id});
  const bin=atob((j.content||"").replace(/\n/g,""));
  const bytes=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i); return bytes;
}

/* 두 저장본을 '의뢰인 단위로 합치기' (어느 쪽도 사라지지 않게).
   - 같은 의뢰인(id)이 양쪽에 있으면, 의뢰인별 수정시각(updatedAt)이 더 최신인 것을 채택
   - 한쪽에만 있는 의뢰인은 그대로 보존(union)
   - 삭제는 deleted(묘비) 목록으로 전파 → 한쪽에서 지우면 합쳐도 되살아나지 않음 */
function mergeStates(a, b){
  a=a||{}; b=b||{};
  const del = new Set([...(a.deleted||[]), ...(b.deleted||[])]);
  const aMap={}, bMap={};
  (a.clients||[]).forEach(c=>{ if(c&&c.id) aMap[c.id]=c; });
  (b.clients||[]).forEach(c=>{ if(c&&c.id) bMap[c.id]=c; });
  const ids = new Set([...Object.keys(aMap), ...Object.keys(bMap)]);
  const clients=[];
  ids.forEach(id=>{
    if(del.has(id)) return;            // 삭제된 의뢰인은 제외
    const ca=aMap[id], cb=bMap[id];
    if(ca && cb){ const ta=ca.updatedAt||"", tb=cb.updatedAt||""; clients.push(ta>=tb?ca:cb); }
    else clients.push(ca||cb);          // 한쪽에만 있으면 보존
  });
  const aNewer = (a.updatedAt||"") >= (b.updatedAt||"");
  const base = aNewer ? a : b;          // 전역 항목(사무소명 등)은 더 최신 쪽 기준
  const merged = Object.assign({}, base);
  merged.clients = clients;
  merged.deleted = [...del];
  // 로그 합치기(시각 기준 중복 제거, 최근 1000개)
  const seen=new Set();
  merged.log = [...(a.log||[]), ...(b.log||[])]
    .sort((x,y)=>String(y.ts||"").localeCompare(String(x.ts||"")))
    .filter(l=>{ const k=(l.ts||"")+"|"+(l.text||""); if(seen.has(k)) return false; seen.add(k); return true; })
    .slice(0,1000);
  merged.updatedAt = aNewer ? a.updatedAt : b.updatedAt;
  merged._ver = Math.max(a._ver||0, b._ver||0);
  return merged;
}

async function pullFromGithub(silent){
  if(!githubReady()) return false;
  try{
    const r=await fetch(ghUrl()+"?ref="+encodeURIComponent(cfg.branch)+"&t="+Date.now(),{headers:ghHeaders()});
    if(r.status===404){ // 파일 없음 → 최초 업로드
      remoteSha=null; await pushToGithub(true); return true;
    }
    if(r.status===401 || r.status===403){ tokenError(); setSync("error"); return false; }
    if(!r.ok) throw new Error("HTTP "+r.status);
    const j=await r.json();
    remoteSha=j.sha;
    const remote=JSON.parse(b64decode(j.content));
    if(isEditing()){ setSync("ok"); return true; } // 입력 중에는 건드리지 않음(메모 보호)
    const remoteIds=(remote.clients||[]).map(x=>x.id).sort().join(",");
    const beforeIds=(state.clients||[]).map(x=>x.id).sort().join(",");
    const beforeU=state.updatedAt||"";
    state = mergeStates(state, remote);   // 통째 교체 대신 '의뢰인별 합치기'(데이터 보존)
    if(!state.clients) state.clients=[]; if(!state.log) state.log=[];
    state.clients.forEach(ensureItems);
    const migrated=migrateIfNeeded();     // 클라우드 데이터도 한 번 복원
    saveLocal();
    const mergedIds=(state.clients||[]).map(x=>x.id).sort().join(",");
    const changed = (mergedIds!==beforeIds) || (state.updatedAt!==beforeU);
    // 합치는 과정에서 원격에 없던 의뢰인을 살렸거나, 로컬이 더 최신(마이그레이션 포함)이면 원격에도 올려 양쪽을 맞춤
    if(mergedIds!==remoteIds || migrated || (state.updatedAt||"") > (remote.updatedAt||"")){ pushToGithub(true); }
    if(changed){ rerender(); if(!silent && mergedIds!==beforeIds) toast("다른 기기의 변경을 불러왔습니다"); }
    clearBanner();
    setSync("ok");
    return true;
  }catch(e){ console.warn(e); setSync("error"); return false; }
}

async function pushToGithub(silent){
  if(!githubReady()) return;
  setSync("saving");
  try{
    // 충돌(409) 시 자동 재시도: 매번 원격을 다시 읽어 '합치기' 후 저장(데이터 보존 + 자가치유)
    for(let attempt=1; attempt<=3; attempt++){
      let mergedAdded=false;
      try{
        const chk=await fetch(ghUrl()+"?ref="+encodeURIComponent(cfg.branch)+"&t="+Date.now(),{headers:ghHeaders()});
        if(chk.status===401||chk.status===403){ tokenError(); setSync("error"); return; }
        if(chk.ok){ const cj=await chk.json();
          const remote=JSON.parse(b64decode(cj.content));
          remoteSha=cj.sha;
          const beforeIds=(state.clients||[]).map(x=>x.id).sort().join(",");
          state = mergeStates(state, remote);     // 원격에만 있는 의뢰인도 보존
          if(!state.clients) state.clients=[]; if(!state.log) state.log=[];
          state.clients.forEach(ensureItems);
          saveLocal();
          mergedAdded = ((state.clients||[]).map(x=>x.id).sort().join(",")!==beforeIds);
        } else if(chk.status===404){ remoteSha=null; }
      }catch(_){}
      if(mergedAdded && !isEditing()) rerender();   // 합치며 들어온 의뢰인 화면 반영
      const body={ message:`update ${state.updatedBy||"?"} @ ${fmt(state.updatedAt)} (${(state.log[0]&&state.log[0].text)||"변경"})`,
        content:b64encode(JSON.stringify(state,null,1)), branch:cfg.branch };
      if(remoteSha) body.sha=remoteSha;
      const r=await fetch(ghUrl(),{method:"PUT",headers:Object.assign({"Content-Type":"application/json"},ghHeaders()),body:JSON.stringify(body)});
      if(r.status===401||r.status===403){ tokenError(); setSync("error"); return; }
      if(r.status===409){ remoteSha=null; await new Promise(rs=>setTimeout(rs,300+attempt*300)); continue; } // 다른 기기가 먼저 저장 → 다시 합쳐 재시도
      if(!r.ok){ const t=await r.text(); throw new Error("HTTP "+r.status+" "+t.slice(0,120)); }
      const j=await r.json(); remoteSha=j.content.sha;
      state._base=state.updatedAt;
      clearBanner();
      setSync("ok");
      if(!silent) toast("깃헙에 저장됨 ✓");
      maybeDailyBackup(); // 3단계+: 하루 1회 클라우드 날짜별 백업본
      return; // 성공
    }
    setSync("error"); if(!silent) toast("동기화가 잠시 혼잡합니다 — 잠시 후 자동 재시도됩니다");
  }catch(e){ console.error(e); setSync("error"); if(!silent) toast("깃헙 저장 실패: "+e.message); }
}

/* 3단계+: 깃헙 저장소에 하루 1회 날짜별 백업본(backups/data-YYYY-MM-DD.json) 보관 */
async function maybeDailyBackup(){
  if(!githubReady()) return;
  const day=now().slice(0,10);
  if(cfg.lastBackupDay===day) return; // 오늘 이미 백업함
  try{
    const path=`backups/data-${day}.json`;
    const url=`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${path}`;
    let sha=null;
    try{ const chk=await fetch(url+"?ref="+encodeURIComponent(cfg.branch)+"&t="+Date.now(),{headers:ghHeaders()}); if(chk.ok){ sha=(await chk.json()).sha; } }catch(_){}
    const body={ message:`daily backup ${day}`, content:b64encode(JSON.stringify(state,null,1)), branch:cfg.branch };
    if(sha) body.sha=sha;
    const r=await fetch(url,{method:"PUT",headers:Object.assign({"Content-Type":"application/json"},ghHeaders()),body:JSON.stringify(body)});
    if(r.ok){ cfg.lastBackupDay=day; saveCfg(); }
  }catch(e){ console.warn("일일 백업 건너뜀",e); }
}

function dbMonth(el){ const ro=document.getElementById("dbMonthRO"); if(!ro)return; ro.style.color="var(--ink)"; ro.textContent=el.dataset.l+" 접수: 이준 "+el.dataset.j+"건 · 블루 "+el.dataset.b+"건 · 합계 "+((+el.dataset.j)+(+el.dataset.b))+"건"; }
function renderFirmChips(){
  const el=document.getElementById("firmChips"); if(!el) return;
  const act=state.clients.filter(c=>!c.archived);
  const nAll=act.length, nJun=act.filter(c=>firmShort(c.firm)==="이준").length, nBlue=act.filter(c=>firmShort(c.firm)==="블루").length;

  if(nBlue===0 && firmF===""){ el.innerHTML=""; el.style.display="none"; return; }
  // 시안 3: 세그먼트 컨트롤 (전체/이준/블루 연결형, 활성 칸은 사무소 색)

  const seg=(val,label,n,color,first)=>{const on=firmF===val;return `<button onclick="setFirmF('${val}')" style="cursor:pointer;font-size:13px;border:none;${first?'':'border-left:0.5px solid var(--line);'}padding:7px 15px;font-weight:700;background:${on?color:'#fff'};color:${on?'#fff':'var(--ink)'}">${label} ${n}</button>`;};
  el.innerHTML = seg("","전체",nAll,"#5b524c",true) + seg("이준","이준",nJun,"#9B1B33",false) + seg("블루","블루",nBlue,"#2563EB",false);
}
function renderDashboard(){
  // 담당자 필터 옵션 채우기
  const assignees=[...new Set(state.clients.map(c=>c.assignee).filter(Boolean))].sort((a,b)=>a.localeCompare(b,"ko"));
  const aSel=$("#assigneeSel");
  if(aSel){ const cur=aSel.value; aSel.innerHTML='<option value="">담당 전체</option>'+assignees.map(a=>`<option ${cur===a?"selected":""}>${esc(a)}</option>`).join(""); }
  const q=($("#searchBox").value||"").trim().toLowerCase();
  const sort=$("#sortSel").value;
  const statusF=($("#statusSel")&&$("#statusSel").value)||"active";
  const stageF=($("#stageSel")&&$("#stageSel").value)||"";
  const assigneeF=($("#assigneeSel")&&$("#assigneeSel").value)||"";
  const catF=($("#catSel")&&$("#catSel").value)||"";
  const incF=($("#incomeSel")&&$("#incomeSel").value)||"";
  let list=state.clients.map(ensureItems).filter(c=>{
    if(q && !((c.name||"").toLowerCase().includes(q) || (c.caseNo||"").toLowerCase().includes(q) || (c.assignee||"").toLowerCase().includes(q))) return false;
    if(statusF==="archived"){ if(!c.archived) return false; }
    else { if(c.archived) return false;
      const p=progress(c);
      if(statusF==="incomplete" && p.pct>=100) return false;
      if(statusF==="done" && p.pct<100) return false;
      if(statusF==="remind" && !isRemindNeeded(c)) return false;
      if(statusF==="rejected" && p.rejected===0) return false;
      if(statusF==="deadline"){ const d=dDay(c); if(d===null||d>7) return false; }
    }
    if(stageF && clientStage(c)!==stageF) return false;
    if(stageFilter && stageFilter!=="전체" && clientStage(c)!==stageFilter) return false;
    if(assigneeF && (c.assignee||"")!==assigneeF) return false;
    if(catF && (c.caseType||"개인회생")!==catF) return false;
    if(incF && (c.incomeType||"미정")!==incF) return false;
    if(firmF && firmShort(c.firm)!==firmF) return false;
    return true;
  });
  list.sort((a,b)=>{
    if((b.pinned?1:0)!==(a.pinned?1:0)) return (b.pinned?1:0)-(a.pinned?1:0);
    if(sort==="name") return (a.name||"").localeCompare(b.name||"","ko");
    if(sort==="progress_desc") return progress(b).pct - progress(a).pct;
    if(sort==="progress") return progress(a).pct - progress(b).pct;
    if(sort==="deadline"){ const da=dDay(a), db=dDay(b); return (da===null?99999:da)-(db===null?99999:db); }
    return (b.updatedAt||"").localeCompare(a.updatedAt||"");
  });
  renderDashHeaderStatsBoard();
  renderFirmChips();
  renderStagePills();
  renderQuickLinks();
  const root=$("#cards");
  if(list.length===0){
    root.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="big">🗂️</div>
      <div style="font-weight:800;font-size:17px;margin-bottom:4px">${q?"검색 결과가 없습니다":"등록된 의뢰인이 없습니다"}</div>
      <div>오른쪽 위 <b>+ 의뢰인 추가</b> 버튼으로 시작하세요.</div></div>`;
    return;
  }
  root.innerHTML=list.map(c=>{
    const p=progress(c);
    const kind=(c.caseType||"개인회생").includes("파산")?"파산":(c.caseType||"").includes("회생")&&!(c.caseType||"").includes("개인")?"회생":(c.caseType||"기타");
    const badgeClass = c.caseType?.includes("파산")?"파산":(c.caseType?.includes("회생")?"회생":"기타");
    const remind=isRemindNeeded(c);
    const stg=clientStage(c); const stgColor=STAGE_COLOR[stg];
    const d=dDay(c);
    const chips=[];
    if(p.rejected>0) chips.push(`<span class="chip miss">보완 ${p.rejected}</span>`);
    if(d!==null&&d<=7) chips.push(`<span class="chip" style="background:var(--amber-soft);color:var(--amber)">${d<0?`마감 ${-d}일 지남`:d===0?"D-DAY":"D-"+d}</span>`);
    if(remind) chips.push(`<span class="chip miss">리마인더</span>`);
    if(p.requesting) chips.push(`<span class="chip wait">요청중 ${p.requesting}</span>`);
    if(p.notReq) chips.push(`<span class="chip req">미요청 ${p.notReq}</span>`);
    if(p.missing===0&&p.rejected===0) chips.push(`<span class="chip ok">전부 확보 ✓</span>`);
    const chipHtml=chips.slice(0,2).join("")+(chips.length>2?`<span class="chip" style="background:var(--gray-soft);color:var(--muted)">+${chips.length-2}</span>`:"");
    return `<div class="card ${c.archived?'arch':''}" onclick="openDetail('${c.id}')">
      <div class="card-top">
        <span class="card-name">${c.pinned?'📌 ':''}${esc(c.name||"이름 없음")}</span>
        <span style="flex:1"></span>
        ${urgentToggle(c)}
        <span class="badge" style="background:${firmColor(c.firm)};color:#fff;margin-left:6px">${esc(firmShort(c.firm))}</span> <label class="sw" title="원사무실 공개" onclick="event.stopPropagation()"><input type="checkbox" ${c.isPublic?"checked":""} onchange="togglePublic('${c.id}')"><span></span></label><span style="font-size:11px;color:var(--muted);margin-left:4px;vertical-align:3px">${c.isPublic?"공개":"비공개"}</span></div>
      <div class="meta">${esc(c.caseType||"개인회생")} · <span style="color:${stgColor};font-weight:700">${stg}</span>${c.assignee?(" · 담당 "+esc(c.assignee)):""}${c.caseNo?(" · "+esc(c.caseNo)):""} · 수정 ${fmt(c.updatedAt)}</div>
      <div class="bar"><i style="width:${p.pct}%;background:${p.rejected>0?'linear-gradient(90deg,#f87171,#dc2626)':(p.pct===100?'#059669':'linear-gradient(90deg,#e14b6f,#9B1B33)')}"></i></div>
      <div style="display:flex;justify-content:space-between;font-size:12.5px;color:var(--muted);font-weight:700;margin-top:6px">
        <span>${p.done}/${p.total} 확보</span><span style="color:${p.pct===100?'var(--green)':'var(--ink)'}">${p.pct}%</span></div>
      ${chipHtml?`<div class="card-stats">${chipHtml}</div>`:""}
      <div style="display:flex;align-items:center;gap:6px;margin-top:10px;flex-wrap:wrap">
        ${c.phone?`<a href="tel:${esc(c.phone)}" onclick="event.stopPropagation()" style="font-size:12px;color:var(--brand);font-weight:700;text-decoration:none">📞 ${esc(c.phone)}</a>`:""}<span style="flex:1"></span>
        <button class="qbtn" onclick="event.stopPropagation();openRequestMsg('${c.id}')">📨 요청</button>
        <button class="qbtn" onclick="event.stopPropagation();openReminder('${c.id}')">⏰ 리마인더</button>
      </div>
      </div>`;
  }).join("");
}

  const showItem=(id)=>{ const s=c.items[id]; if(!s) return false; if(s.mode==="na" && !showNa) return false; if(detailFilter!=="all" && !passFilter(s)) return false; if(docSearch && !itemName(id,c).toLowerCase().includes(docSearch.toLowerCase())) return false; return true; };

  if(groupMode==='site'){
    // ── 발급처별 보기: 같은 사이트 서류를 한 묶음으로 ──
    html+=`<aside class="bnav">
      <div class="bnav-title">📍 발급처</div>
      <button class="bnav-item ${focusSite===''?'on':''}" onclick="focusSiteSet('')"><span>📋 전체 보기</span><span class="bnp">${p.done}/${p.total}</span></button>`;
    SITES.forEach(st=>{ const sp=siteProgress(c,st); if(sp.total===0) return; const full=sp.done===sp.total;
      html+=`<button class="bnav-item ${focusSite===st.key?'on':''}" onclick="focusSiteSet('${st.key}')"><span><span class="bn" style="${focusSite===st.key?`background:${st.color};color:#fff`:''}">${esc(st.icon)}</span>${esc(st.name)}</span><span class="bnp ${full?'fdone':''}">${sp.done}/${sp.total}</span></button>`; });
    html+=`</aside>`;

    html+=`<div class="checklist">`;
    SITES.forEach(st=>{
      if(focusSite && focusSite!==st.key) return;
      const items=collectSiteItems(c,st);
      const visItems=items.filter(it=>showItem(it.id));
      let naHidden=0; items.forEach(it=>{ const s=c.items[it.id]; if(s && s.mode==="na" && !showNa && (detailFilter==="all"||passFilter(s))) naHidden++; });
      if(visItems.length===0 && naHidden===0) return;
      const sp=siteProgress(c,st);
      const isCol=collapsed[c.id+'site'+st.key];
      const spct=sp.total?Math.round(sp.done/sp.total*100):0;
      html+=`<div class="bundle ${isCol?'collapsed':''}">
        <div class="bundle-head" style="flex-direction:column;align-items:stretch;gap:9px" onclick="toggleSiteBundle('${c.id}','${st.key}')">
          <div style="display:flex;align-items:center;gap:11px">
            <div class="bnum" style="background:${st.color}">${esc(st.icon)}</div>
            <div class="bundle-title">${esc(st.name)}</div>
            <div class="bundle-prog">${sp.done}/${sp.total}</div>
            <div class="caret">▾</div>
          </div>
          <div class="tbar"><i style="width:${spct}%;background:${st.color}"></i></div>
        </div>
        <div class="bundle-body ${viewMode==='list'?'listmode':''}">`;
      if(st.url||true) html+=`<div style="padding:5px 4px 9px;display:flex;gap:7px;flex-wrap:wrap">${st.url?`<a href="${st.url}" target="_blank" rel="noopener" class="qbtn" style="text-decoration:none">🔗 사이트 열기</a>`:""}<button class="qbtn" onclick="copySiteMsg('${c.id}','${st.key}')">📋 이 발급처 서류목록 복사</button></div>`;
      visItems.forEach(it=>{ html+=(viewMode==='list'?itemRow(c,it,false):itemHtml(c,it,false)); });
      if(naHidden>0) html+=`<button class="btn btn-sm btn-ghost" style="margin:5px 2px;color:var(--muted)" onclick="toggleShowNa()">＋ 해당없음 ${naHidden}개 더보기</button>`;
      html+=`</div></div>`;
    });
    html+=`</div>`;
  } else {
    // ── 서류 묶음별 보기(기존) ──
    html+=`<aside class="bnav">
      <div class="bnav-title">📂 서류 묶음</div>
      <button class="bnav-item ${focusBundle===''?'on':''}" onclick="focusBundleSet('')"><span>📋 전체 보기</span><span class="bnp">${p.done}/${p.total}</span></button>`;
    TEMPLATE.forEach((b,bi)=>{ const bp=bundleProgress(c,b); const full=bp.total>0&&bp.done===bp.total;
      html+=`<button class="bnav-item ${focusBundle===b.id?'on':''}" onclick="focusBundleSet('${b.id}')"><span><span class="bn">${bi+1}</span>${esc(b.title)}</span><span class="bnp ${full?'fdone':''}">${bp.done}/${bp.total}</span></button>`; });
    html+=`</aside>`;

    html+=`<div class="checklist">`;
    TEMPLATE.forEach((b,bi)=>{
      if(focusBundle && focusBundle!==b.id) return;
      let naHidden=0; collectBundleItems(c,b).forEach(it=>{ const s=c.items[it.id]; if(s && s.mode==="na" && !showNa && (detailFilter==="all"||passFilter(s))) naHidden++; });
      const anyVis = collectBundleItems(c,b).some(it=>showItem(it.id));
      const hasNa = collectBundleItems(c,b).some(it=>{ const s=c.items[it.id]; return s && s.mode==="na"; });
      const bp = bundleProgress(c,b);
      const isCol = collapsed[c.id+b.id];
      if(!anyVis && naHidden===0) return; // 보일 것도, 더보기할 것도 없으면 숨김
      const bpct=bp.total?Math.round(bp.done/bp.total*100):0;
      html+=`<div class="bundle ${isCol?'collapsed':''}">
        <div class="bundle-head" style="flex-direction:column;align-items:stretch;gap:9px" onclick="toggleBundle('${c.id}','${b.id}')">
          <div style="display:flex;align-items:center;gap:11px">
            <div class="bnum" style="background:var(--brand-soft);color:var(--brand)">${bi+1}</div>
            <div class="bundle-title">${esc(b.title)}</div>
            <div class="bundle-prog">${bp.done}/${bp.total}</div>
            <div class="caret">▾</div>
          </div>
          <div class="tbar"><i style="width:${bpct}%"></i></div>
        </div>
        <div class="bundle-body ${viewMode==='list'?'listmode':''}">`;
      b.groups.forEach(g=>{
        const gItems=g.items.filter(it=>showItem(it.id));
        if(gItems.length===0) return;
        if(g.title) html+=`<div class="subgroup-title">— ${esc(g.title)}</div>`;
        gItems.forEach(it=>{ html+=(viewMode==='list'?itemRow(c,it,false):itemHtml(c,it,false)); });
      });
      (c.extra[b.id]||[]).filter(ex=>showItem(ex.id)).forEach(ex=>{ html+=(viewMode==='list'?itemRow(c,ex,true,b.id):itemHtml(c,ex,true,b.id)); });
      if(naHidden>0) html+=`<button class="btn btn-sm btn-ghost" style="margin:5px 2px;color:var(--muted)" onclick="toggleShowNa()">＋ 해당없음 ${naHidden}개 더보기</button>`;
      else if(showNa && hasNa) html+=`<button class="btn btn-sm btn-ghost" style="margin:5px 2px;color:var(--muted)" onclick="toggleShowNa()">해당없음 숨기기</button>`;
      if(viewMode==='card') html+=`<div class="additem"><button class="btn btn-sm btn-ghost" onclick="addExtra('${c.id}','${b.id}')">+ 이 묶음에 서류 추가</button></div>`;
      html+=`</div></div>`;
    });
    html+=`</div>`;
  }
  html+=`</div>`; // .detail-grid

  v.innerHTML=html;
  { const _m=document.getElementById('clientMemo'); if(_m) autoGrowMemo(_m); } // 메모 내용에 맞춰 칸 높이 자동 맞춤
}

function collectBundleItems(c,b){ let arr=[]; b.groups.forEach(g=>g.items.forEach(it=>arr.push(it))); (c.extra[b.id]||[]).forEach(ex=>arr.push(ex)); return arr; }
function bundleProgress(c,b){ let total=0,done=0; collectBundleItems(c,b).forEach(it=>{ const s=c.items[it.id]; if(!s||s.mode==="na")return; total++; if(s.done)done++; }); return {total,done}; }
function passFilter(s){
  if(!s) return true;
  if(detailFilter==="all") return true;
  if(detailFilter==="missing") return s.mode!=="na" && !s.done;
  if(detailFilter==="request") return s.mode==="request";
  if(detailFilter==="requesting") return s.mode==="request" && s.reqTag==="requesting";
  if(detailFilter==="received") return s.done;
  if(detailFilter==="rejected") return !!s.rejected;
  if(detailFilter==="self") return s.mode==="self";
  if(detailFilter==="haslink") return !!s.link;
  if(detailFilter==="hasmemo") return !!(s.memo && s.memo.trim());
  return true;
}
function setFilter(f){ detailFilter=f; renderDetail(currentClientId); }
function setView(m){ viewMode=m; renderDetail(currentClientId); }
function toggleShowNa(){ showNa=!showNa; renderDetail(currentClientId); }
let _docSearchTimer=null, _docComposing=false;
function onDocSearch(v){ docSearch=v; if(_docComposing) return; clearTimeout(_docSearchTimer); _docSearchTimer=setTimeout(_doDocSearchRender,200); }
function _doDocSearchRender(){ if(_docComposing){ clearTimeout(_docSearchTimer); _docSearchTimer=setTimeout(_doDocSearchRender,200); return; } renderDetail(currentClientId); const el=$("#docSearchInput"); if(el){ el.focus(); const L=el.value.length; try{ el.setSelectionRange(L,L); }catch(_){} } }
function toggleNav(){ navOpen=!navOpen; renderDetail(currentClientId); }
function focusBundleSet(bid){ focusBundle=bid; if(window.innerWidth<=760) navOpen=false; renderDetail(currentClientId); window.scrollTo({top:0,behavior:"smooth"}); }
function toggleBundle(cid,bid){ collapsed[cid+bid]=!collapsed[cid+bid]; renderDetail(cid); }

/* 목록형(컴팩트) 행 — 텍스트 체크리스트 */
function itemRow(c,it,isExtra,bid){
  const s=c.items[it.id]||{mode:"request",reqTag:"none",done:false,rejected:false};
  let label="미요청", col="var(--muted)";
  if(s.rejected){ label="보완필요"; col="var(--red)"; }
  else if(s.done){ label="받음"; col="var(--green)"; }
  else if(s.mode==="na"){ label="해당없음"; col="var(--gray)"; }
  else if(s.mode==="self"){ label="직접발급"; col="var(--brand)"; }
  else if(s.reqTag==="requesting"){ label="요청중"; col="var(--amber)"; }
  const stClass=s.rejected?"st-rej":(s.done?"st-recv":(s.mode==="na"?"st-na":(s.reqTag==="requesting"?"st-req":"")));
  return `<div class="lrow ${s.done&&!s.rejected?'done':''} ${stClass}">
    ${selMode?`<button class="chk" style="border-radius:50%;${selSet.has(it.id)?'background:var(--brand);border-color:var(--brand)':''}" onclick="toggleSel('${it.id}')">${selSet.has(it.id)?CHECK:''}</button>`:""}
    <button class="chk" onclick="toggleDone('${c.id}','${it.id}')">${s.done&&!s.rejected?CHECK:''}</button>
    <span class="lname">${esc(it.name)}${(s.files&&s.files.length)?` <span style="color:var(--brand)">📎${s.files.length}</span>`:""}${s.memo?` <span style="color:var(--muted)">📝</span>`:""}</span>
    <span class="lstat" style="color:${col}">${label}</span>
  </div>`;
}

function passFilterReject(s){ return s && s.rejected; }

      <button class="chk" onclick="event.stopPropagation();toggleDone('${c.id}','${it.id}')">${s.done&&!s.rejected?CHECK:''}</button>
      <div class="item-name">

        ${s.rejected?`<div class="item-src" style="color:var(--red);font-weight:700">⚠ 보완필요${s.rejectReason?` — ${esc(s.rejectReason)}`:""}</div>`:(src?`<div class="item-src">${esc(src)}</div>`:"")}
      </div>

          <button class="tag ${s.reqTag==='requesting'?'on t-req':''}" onclick="setTag('${c.id}','${it.id}','requesting')">요청중</button>
          <button class="tag ${s.reqTag==='received'?'on t-recv':''}" onclick="setTag('${c.id}','${it.id}','received')">받음</button>
        </div>`:""}
      </div>
      <div class="item-tools">
        <button class="memo-toggle" onclick="attachFiles('${c.id}','${it.id}')">📎 파일${fc?` ${fc}`:""}</button>
        <button class="memo-toggle" onclick="setLink('${c.id}','${it.id}')">${s.link?'🔗 링크':'＋ 링크'}</button>
        <button class="memo-toggle" onclick="toggleMemo('${it.id}')">${s.memo?'📝 메모':'＋ 메모'}</button>
        <button class="memo-toggle" style="color:${s.rejected?'var(--red)':'var(--muted)'};font-weight:${s.rejected?'800':'400'}" onclick="toggleReject('${c.id}','${it.id}')">${s.rejected?'⚠ 보완해제':'⚠ 보완'}</button>
        ${isExtra?`<button class="btn-ghost btn-sm" style="font-size:11px;color:var(--red);padding:2px 6px" onclick="removeExtra('${c.id}','${bid}','${it.id}')">삭제</button>`:""}
      </div>
      <div class="memo-box ${s.memo?'':'hidden'}" id="memo-${it.id}">

      </div>
    </div>
  </div>`;
}

/* ---------- 6. 항목 조작 ---------- */
function toggleDone(cid,id){ const c=findClient(cid); const s=c.items[id]; s.done=!s.done;
  if(s.done){ s.recvDate=now(); if(s.mode==="request") s.reqTag="received"; } else { s.recvDate=null; if(s.reqTag==="received") s.reqTag="requesting"; }
  touch(`[${c.name}] '${itemName(id,c)}' ${s.done?"확보 완료":"미확보로 변경"}`); renderDetail(cid); }
function setMode(cid,id,mode){ const c=findClient(cid); c.items[id].mode=mode; c.items[id].manual=true; // 수동 변경 → 재산유형 저장 시에도 유지(자동으로 안 덮어씀)
  touch(`[${c.name}] '${itemName(id,c)}' 구분→${mode==='self'?'직접발급':mode==='request'?'의뢰인요청':'해당없음'}`); renderDetail(cid); }
function setTag(cid,id,tag){ const c=findClient(cid); const s=c.items[id]; s.reqTag=tag;
  if(tag==="received"){ s.done=true; s.recvDate=now(); }
  else { if(s.done) s.done=false; s.recvDate=null; if(tag==="requesting" && !s.reqDate) s.reqDate=now(); if(tag==="none") s.reqDate=null; }
  touch(`[${c.name}] '${itemName(id,c)}' 요청태그→${tag==='none'?'미요청':tag==='requesting'?'요청중':'받음'}`); renderDetail(cid); }
function toggleMemo(id){ const el=$("#memo-"+id); if(el) el.classList.toggle("hidden"); }
function setLink(cid,id){ const c=findClient(cid); const s=c.items[id];
  const url=prompt("스캔본/파일 링크를 붙여넣으세요 (구글드라이브·노션 등). 비우면 삭제됩니다.", s.link||"");
  if(url===null) return; s.link=url.trim();
  touch(`[${c.name}] '${itemName(id,c)}' 링크 ${s.link?"등록":"삭제"}`); renderDetail(cid); }

/* ---------- 6b. 서류 파일 첨부 (깃헙 저장소 동기화) ---------- */
function fileSizeStr(n){ return n<1024*1024 ? Math.max(1,Math.round(n/1024))+"KB" : (n/1048576).toFixed(1)+"MB"; }
function arrayBufferToBase64(buf){ const bytes=new Uint8Array(buf); let bin=""; const chunk=0x8000;
  for(let i=0;i<bytes.length;i+=chunk){ bin+=String.fromCharCode.apply(null,bytes.subarray(i,i+chunk)); } return btoa(bin); }
function ghContentsUrl(path){ return `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${path.split("/").map(encodeURIComponent).join("/")}`; }
/* 업로드 전 사진 자동압축: 큰 폰 사진을 화질 유지하며 용량↓ → 업로드 빨라짐.
   - 이미지(jpg/png)만 대상, 까다로운 포맷(heic/gif/webp)·작은 파일은 원본 그대로
   - 긴 변 2200px로 축소 + JPEG 품질 0.75 (서류 글자 또렷하게 유지) */
function _loadImg(file){ return new Promise((res,rej)=>{ const u=URL.createObjectURL(file); const img=new Image(); img.onload=()=>res({img,u}); img.onerror=()=>{ try{URL.revokeObjectURL(u);}catch(_){ } rej(new Error("img load")); }; img.src=u; }); }
async function compressImage(file, maxDim=2200, quality=0.75){
  try{
    const nm=file.name||"";
    if(!/^image\//.test(file.type||"") && !/\.(jpe?g|png)$/i.test(nm)) return file;     // 이미지 아님
    if(/\.(gif|webp|bmp|heic|heif)$/i.test(nm)) return file;                              // 변환 까다로운 포맷
    if(file.size < 400*1024) return file;                                                 // 이미 작으면 그대로
    const {img,u}=await _loadImg(file);
    const scale=Math.min(1, maxDim/Math.max(img.width,img.height));
    const cw=Math.max(1,Math.round(img.width*scale)), ch=Math.max(1,Math.round(img.height*scale));
    const cv=document.createElement("canvas"); cv.width=cw; cv.height=ch;
    const ctx=cv.getContext("2d"); ctx.fillStyle="#fff"; ctx.fillRect(0,0,cw,ch); ctx.drawImage(img,0,0,cw,ch);
    try{URL.revokeObjectURL(u);}catch(_){}
    const blob=await new Promise(r=>cv.toBlob(r,"image/jpeg",quality));
    if(!blob || blob.size>=file.size) return file;                                        // 안 줄면 원본 유지
    const base=nm.replace(/\.[^.]+$/,"")||"사진";
    return new File([blob], base+".jpg", {type:"image/jpeg"});
  }catch(e){ return file; }
}
function attachFiles(cid,id){
  if(!filesReady()){ toast("파일 첨부는 ⚙️설정에서 구글 드라이브 연결 후 가능합니다 (기기 간 공유를 위해)"); return; }
  const c=findClient(cid);
  const inp=document.createElement("input"); inp.type="file"; inp.multiple=true;
  inp.onchange=async()=>{
    const picked=[...inp.files]; if(!picked.length) return;
    const s=c.items[id]; if(!s.files) s.files=[];
    const valid=[];
    for(const f of picked){

    canvas.style.width=(base.width*scale)+"px"; canvas.style.maxWidth="100%"; canvas.style.height="auto";
    canvas.style.display="block"; canvas.style.margin="0 auto 10px"; canvas.style.borderRadius="6px"; canvas.style.background="#fff";

/* ---------- 6b-4. PDF 페이지 편집(삭제·순서변경·회전) — 적용 시 원본을 편집본으로 교체 ---------- */
let _pdfEdit=null; // {cid,id,idx,name,srcBytes, pages:[{i,rot,del,thumb}]}
async function openPdfEditor(cid,id,idx){
  if(!filesReady()){ toast("드라이브 연결 후 편집 가능합니다"); return; }
  const c=findClient(cid); const f=(c.items[id].files||[])[idx]; if(!f) return;
  if(extOf(f.name).toLowerCase()!==".pdf"){ toast("PDF 파일만 편집할 수 있어요"); return; }
  toast("PDF 편집기 여는 중…");
  let pdfjsLib, bytes;
  try{ pdfjsLib=await loadPdfJs(); bytes=await fetchFileBytes(f); }
  catch(e){ toast("열기 실패: "+(e.message||e)); return; }
  let pdf;
  try{ const data=(bytes instanceof Uint8Array)?bytes.slice(0):new Uint8Array(bytes); pdf=await pdfjsLib.getDocument({data}).promise; }
  catch(e){ toast("PDF 읽기 실패: "+(e.message||e)); return; }
  const n=pdf.numPages;
  _pdfEdit={cid,id,idx,name:f.name,srcBytes:bytes, pages:Array.from({length:n},(_,k)=>({i:k,rot:0,del:false,thumb:null}))};
  modal(`<h3>PDF 페이지 편집</h3>
    <p class="hint" style="margin:0 0 14px;line-height:1.6"><b style="color:var(--ink);font-weight:700">${esc(f.name)}</b><br>페이지에 마우스를 올리면 도구가 나타납니다 · <b>×</b> 삭제 · <b>↺↻</b> 회전 · <b>◀▶</b> 또는 드래그로 순서 변경.</p>
    <div id="pdfEditBody" style="max-height:62vh;overflow:auto;background:var(--gray-soft);border:1px solid var(--line);border-radius:14px;padding:14px"><div style="color:var(--muted);padding:28px;text-align:center;font-size:13.5px">페이지 불러오는 중… (${n}쪽)</div></div>
    <div class="modal-actions" style="margin-top:14px">
      <button class="btn" onclick="closePdfEdit()">취소</button>
      <button class="btn btn-primary" id="pdfEditApply" onclick="applyPdfEdit()" disabled>적용</button>
    </div>`,900);
  // 썸네일 렌더링(작게) — 순서 바뀌어도 다시 안 그리도록 dataURL로 보관
  const dpr=Math.min(2,window.devicePixelRatio||1);
  for(let k=0;k<n;k++){
    try{
      const page=await pdf.getPage(k+1);
      const base=page.getViewport({scale:1});
      const scale=Math.min(2.2,300/base.width);
      const vp=page.getViewport({scale:scale*dpr});
      const cv=document.createElement("canvas"); cv.width=vp.width; cv.height=vp.height;
      await page.render({canvasContext:cv.getContext("2d"),viewport:vp}).promise;
      _pdfEdit.pages[k].thumb=cv.toDataURL("image/jpeg",0.82);
    }catch(_){ _pdfEdit.pages[k].thumb=null; }
    if(k===0 || k===n-1 || k%3===0) renderPdfEditGrid();
  }
  renderPdfEditGrid();
  const ab=document.getElementById("pdfEditApply"); if(ab) ab.disabled=false;
}
function renderPdfEditGrid(){
  const E=_pdfEdit; const body=document.getElementById("pdfEditBody"); if(!E||!body) return;
  const keep=E.pages.filter(p=>!p.del).length;
  const cards=E.pages.map((p,di)=>{
    const num=di+1;
    if(p.del){
      return `<div class="pgcard pdfpg" style="background:var(--red-soft);border-color:var(--brand);box-shadow:none;display:flex;flex-direction:column;align-items:center;gap:9px">
        <div class="pgnum" style="color:var(--brand)">${num} · 삭제됨</div>
        <div class="pgthumb" style="color:var(--brand);font-size:26px;opacity:.4">✕</div>
        <button class="btn btn-sm" onclick="pdfPgDel(${di},false)" style="width:100%">↩ 되돌리기</button>
      </div>`;
    }
    const tf=(p.rot===90||p.rot===270)?`rotate(${p.rot}deg) scale(.72)`:`rotate(${p.rot}deg)`;
    const thumb=p.thumb? `<img src="${p.thumb}" style="max-width:190px;max-height:262px;display:block;border-radius:3px;box-shadow:0 1px 6px rgba(60,40,30,.18);transform:${tf};transition:transform .15s">`
                        : `<span style="color:var(--gray);font-size:11px">로딩…</span>`;
    const rotBadge=p.rot? ` <span style="color:var(--brand);font-weight:700">· ${p.rot}°</span>`:"";
    return `<div class="pgcard pdfpg" draggable="true" style="cursor:grab"
        ondragstart="pdfPgDrag(${di})" ondragover="event.preventDefault()" ondrop="event.preventDefault();pdfPgDrop(${di})">
      <div class="pgnum">${num}${rotBadge}</div>
      <button class="pgx" title="이 페이지 삭제" onclick="pdfPgDel(${di},true)">✕</button>
      <div class="pgthumb">${thumb}</div>
      <div class="pgctrl">
        <button class="pgbtn" title="앞으로 이동" onclick="pdfPgMove(${di},-1)" ${di===0?'disabled':''}>◀</button>
        <button class="pgbtn" title="왼쪽으로 회전" onclick="pdfPgRot(${di},-90)">↺</button>
        <button class="pgbtn" title="오른쪽으로 회전" onclick="pdfPgRot(${di},90)">↻</button>
        <button class="pgbtn" title="뒤로 이동" onclick="pdfPgMove(${di},1)" ${di===E.pages.length-1?'disabled':''}>▶</button>
      </div>
    </div>`;
  }).join("");
  body.innerHTML=`<div style="font-size:12.5px;color:var(--muted);margin-bottom:13px">총 ${E.pages.length}쪽 · 남는 페이지 <b style="color:var(--green)">${keep}</b>쪽${keep===0?' <span style="color:var(--red);font-weight:700">— 최소 1쪽은 남겨야 저장돼요</span>':''}</div>
    <div style="display:flex;flex-wrap:wrap;gap:13px;justify-content:center">${cards}</div>`;
}
let _pdfDragFrom=null;
function pdfPgDrag(di){ _pdfDragFrom=di; }
function pdfPgDrop(di){ const from=_pdfDragFrom; _pdfDragFrom=null; if(from==null||from===di||!_pdfEdit) return;
  const arr=_pdfEdit.pages; const m=arr.splice(from,1)[0]; arr.splice(di,0,m); renderPdfEditGrid(); }
function pdfPgRot(di,deg){ if(!_pdfEdit) return; const p=_pdfEdit.pages[di]; p.rot=((p.rot+deg)%360+360)%360; renderPdfEditGrid(); }
function pdfPgMove(di,dir){ if(!_pdfEdit) return; const arr=_pdfEdit.pages; const j=di+dir; if(j<0||j>=arr.length) return; const t=arr[di]; arr[di]=arr[j]; arr[j]=t; renderPdfEditGrid(); }
function pdfPgDel(di,on){ if(!_pdfEdit) return; _pdfEdit.pages[di].del=!!on; renderPdfEditGrid(); }
function closePdfEdit(){ _pdfEdit=null; _pdfDragFrom=null; closeModal(); }
async function applyPdfEdit(){
  const E=_pdfEdit; if(!E) return;
  const keep=E.pages.filter(p=>!p.del);
  if(!keep.length){ toast("최소 1페이지는 남겨야 해요"); return; }
  const same=(keep.length===E.pages.length) && keep.every((p,k)=>p.i===k && p.rot===0);
  if(same){ toast("변경된 내용이 없습니다"); return; }
  let PDFLib; try{ PDFLib=await loadPdfLib(); }catch(e){ toast("PDF 라이브러리 로드 실패: "+(e.message||e)); return; }
  toast("편집본 저장 중…"); setSync("saving");
  try{
    const src=await PDFLib.PDFDocument.load(E.srcBytes,{ignoreEncryption:true});
    const out=await PDFLib.PDFDocument.create();
    const copied=await out.copyPages(src, keep.map(p=>p.i));
    copied.forEach((pg,k)=>{
      let baseAngle=0; try{ baseAngle=pg.getRotation().angle||0; }catch(_){ }
      const rot=((baseAngle+keep[k].rot)%360+360)%360;
      try{ pg.setRotation(PDFLib.degrees(rot)); }catch(_){ }
      out.addPage(pg);
    });
    const outBytes=await out.save();
    const buf=await new Blob([outBytes],{type:"application/pdf"}).arrayBuffer();
    const b64=arrayBufferToBase64(buf);
    const c=findClient(E.cid); const f=(c.items[E.id].files||[])[E.idx]; if(!f){ closePdfEdit(); return; }
    const base=(f.name||"문서").replace(/\.[^.]+$/,""); const newName=base.replace(/_편집$/,"")+"_편집.pdf";
    const j=await gwUpload(clientFolder(c), newName, "application/pdf", b64);
    const oldF=f;
    c.items[E.id].files[E.idx]={name:newName,size:buf.byteLength,driveId:j.id,by:deviceName||"미설정",ts:now()};
    try{ if(oldF.driveId) await gwDelete(oldF.driveId);
         else if(githubReady() && oldF.path) await fetch(ghContentsUrl(oldF.path),{method:"DELETE",headers:Object.assign({"Content-Type":"application/json"},ghHeaders()),body:JSON.stringify({message:`delete original ${oldF.name}`,sha:oldF.sha,branch:cfg.branch})}); }catch(_){ }
    touch(`[${c.name}] '${itemName(E.id,c)}' PDF 페이지 편집본으로 교체`);
    closePdfEdit(); renderDetail(E.cid); toast("편집본으로 저장했습니다 ✓");
  }catch(e){ console.error(e); toast("저장 실패: "+(e.message||e)); setSync("error"); }
}

let _dlCtx=null;
function loadPdfLib(){ return new Promise((res,rej)=>{ if(window.PDFLib) return res(window.PDFLib);
  const s=document.createElement("script"); s.src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js";
  s.onload=()=>res(window.PDFLib); s.onerror=()=>rej(new Error("PDF 라이브러리 로드 실패(인터넷 필요)")); document.head.appendChild(s); }); }
const _byteCache=new Map(); // 같은 파일 다시 열 때 즉시(드라이브 재요청 안 함)
async function fetchFileBytes(f){
  const key=f.driveId||f.sha;
  if(key && _byteCache.has(key)) return _byteCache.get(key);
  let bytes;
  if(f.driveId){ bytes=await gwFetchBytes(f.driveId); }
  else {
    const r=await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/git/blobs/${f.sha}`,{headers:ghHeaders()});
    if(!r.ok) throw new Error("HTTP "+r.status);
    const j=await r.json(); const bin=atob((j.content||"").replace(/\n/g,""));
    bytes=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  }
  if(key && bytes){ try{ _byteCache.set(key,bytes); }catch(_){} }
  return bytes;
}
function extOf(name){ const i=(name||"").lastIndexOf("."); return i>0?name.slice(i):""; }
function safeName(s){ return (s||"").replace(/[^\w가-힣().\- ]/g,"").trim().replace(/\s+/g,"_"); }
function dlBlockLabel(bid,btitle){ const m={b1:"기본서류",b2:"채권자목록 소명자료",b3:"재산 소명자료",b4:"수입지출 소명자료",b5:"기타서류",b6:"통장 거래내역",b7:"채무증대 경위서"}; return m[bid]||(btitle||"").replace(/^채무자\s*/,""); }
function dlItemLabel(n){ return (n||"").replace(/^채무자\s*/,""); }
function dlBlob(blob,filename){ const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download=filename; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),20000); }
function fileGroups(c){
  const out=[];
  TEMPLATE.forEach((b,bi)=>{ const items=[];
    const collect=(id,name)=>{ const s=c.items[id]; if(s&&s.files&&s.files.length) items.push({id,name,files:s.files.map((f,idx)=>({f,idx}))}); };
    b.groups.forEach(g=>g.items.forEach(it=>collect(it.id,it.name)));
    (c.extra[b.id]||[]).forEach(ex=>collect(ex.id,ex.name));
    if(items.length) out.push({bid:b.id,btitle:b.title,bi,items});
  });
  return out;
}

function dlDragOver(e,i){ e.preventDefault(); e.dataTransfer.dropEffect="move"; }
function dlDragEnd(e){ _dlDragIdx=null; }
function dlDrop(e,i){ e.preventDefault(); const from=_dlDragIdx; if(from===null||from===i) return; if(_dlCtx.rows[from].bid!==_dlCtx.rows[i].bid){ _dlDragIdx=null; toast("순서 변경은 같은 묶음 안에서만 돼요"); return; } const r=_dlCtx.rows.splice(from,1)[0]; _dlCtx.rows.splice(i,0,r); _dlDragIdx=null; renderDownloadModal(); }
function addImageA4(doc,img){ const SHORT=595.28,LONG=841.89; const land=img.width>img.height; const A4W=land?LONG:SHORT, A4H=land?SHORT:LONG; const sc=Math.min(A4W/img.width, A4H/img.height); const w=img.width*sc, h=img.height*sc; const pg=doc.addPage([A4W,A4H]); pg.drawImage(img,{x:(A4W-w)/2, y:(A4H-h)/2, width:w, height:h}); } /* 이미지 모양에 맞춰 A4 세로/가로 자동 선택 · A4 비율에 비율유지 최대한 크게(잘림없음) · 가운데 정렬 */
function loadJSZip(){ return new Promise((res,rej)=>{ if(window.JSZip) return res(window.JSZip);
  const s=document.createElement("script"); s.src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js";
  s.onload=()=>res(window.JSZip); s.onerror=()=>rej(new Error("ZIP 라이브러리 로드 실패(인터넷 필요)")); document.head.appendChild(s); }); }
/* 출력물 내려주기: 묶음(번들)별로 1개씩 — PDF 또는 그 묶음만의 ZIP */
async function deliverEach(outs){
  if(!outs.length){ toast("받을 파일이 없습니다"); return; }
  for(let i=0;i<outs.length;i++){ dlBlob(outs[i].blob, outs[i].name); if(i<outs.length-1) await new Promise(r=>setTimeout(r,600)); }
  toast(`${outs.length}개 받기 완료 ✓${outs.length>1?" (브라우저가 '여러 파일 허용?' 물으면 허용)":""}`);
}
async function doDownload(){
  const c=findClient(_dlCtx.cid); const nm=safeName(c.name||"의뢰인")||"의뢰인";
  const _bm={}, picked=[];
  (_dlCtx.rows||[]).forEach(r=>{ if(!_dlCtx.sel.has(r.k)) return;
    let g=_bm[r.bid]; if(!g){ g={bid:r.bid,btitle:r.btitle,bi:r.bi,items:[],_im:{}}; _bm[r.bid]=g; picked.push(g); }
    let it=g._im[r.id]; if(!it){ it={id:r.id,name:r.name,files:[]}; g._im[r.id]=it; g.items.push(it); }
    it.files.push(r.fo); });
  if(picked.length===0){ toast("선택된 파일이 없습니다"); return; }
  const mode=_dlCtx.mode; closeModal(); toast("다운로드 준비 중…");
  try{
    const outs=[]; // {name, blob} — 순서대로
    if(mode==="pdf"){
      const PDFLib=await loadPdfLib();
      for(const g of picked){
        const doc=await PDFLib.PDFDocument.create(); const leftovers=[];
        for(const it of g.items){ let i=0; for(const fo of it.files){ i++; const bytes=await fetchFileBytes(fo.f); const ext=extOf(fo.f.name).toLowerCase();
          try{
            if(ext===".pdf"){ const src=await PDFLib.PDFDocument.load(bytes,{ignoreEncryption:true}); const ps=await doc.copyPages(src,src.getPageIndices()); ps.forEach(p=>doc.addPage(p)); }
            else if(ext===".jpg"||ext===".jpeg"){ const img=await doc.embedJpg(bytes); addImageA4(doc,img); }
            else if(ext===".png"){ const img=await doc.embedPng(bytes); addImageA4(doc,img); }
            else leftovers.push({it,fo,bytes,i});
          }catch(e){ console.warn("PDF 합치기 건너뜀",fo.f.name,e); leftovers.push({it,fo,bytes,i}); }
        } }
        const label=safeName(dlBlockLabel(g.bid,g.btitle));
        const pdfBytes=doc.getPageCount()>0 ? await doc.save() : null;
        if(leftovers.length===0){
          if(pdfBytes) outs.push({name:nm+"_"+label+".pdf", blob:new Blob([pdfBytes],{type:"application/pdf"})});
        } else {
          const JSZip=await loadJSZip(); const zip=new JSZip(); const used={};
          const addZ=(name,blob)=>{ let n=name; while(used[n]) n=n.replace(/(\.[^.]+)$/,"_"+Math.random().toString(36).slice(2,4)+"$1"); used[n]=1; zip.file(n,blob); };
          if(pdfBytes) addZ(nm+"_"+label+".pdf", new Blob([pdfBytes],{type:"application/pdf"}));
          for(const lo of leftovers){ const suffix=lo.it.files.length>1?("_"+lo.i):""; addZ(nm+"_"+safeName(dlItemLabel(lo.it.name))+suffix+extOf(lo.fo.f.name), new Blob([lo.bytes])); }
          const zblob=await zip.generateAsync({type:"blob"});
          outs.push({name:nm+"_"+label+".zip", blob:zblob});
        }
      }
    } else if(mode==="eachpdf"){
      const PDFLib=await loadPdfLib();
      for(const g of picked){ for(const it of g.items){ let i=0; for(const fo of it.files){ i++; const bytes=await fetchFileBytes(fo.f);
        const ext=extOf(fo.f.name).toLowerCase(); const suffix=it.files.length>1?("_"+i):""; const base=nm+"_"+safeName(dlItemLabel(it.name))+suffix;
        try{
          if(ext===".pdf"){ outs.push({name:base+".pdf", blob:new Blob([bytes],{type:"application/pdf"})}); }
          else if(ext===".jpg"||ext===".jpeg"||ext===".png"){
            const doc=await PDFLib.PDFDocument.create();
            const img=(ext===".png")?await doc.embedPng(bytes):await doc.embedJpg(bytes);
            addImageA4(doc,img);
            const out=await doc.save(); outs.push({name:base+".pdf", blob:new Blob([out],{type:"application/pdf"})});
          }
          else { outs.push({name:base+ext, blob:new Blob([bytes])}); }
        }catch(e){ console.warn("PDF 변환 건너뜀",fo.f.name,e); outs.push({name:base+ext, blob:new Blob([bytes])}); }
      } } }
    } else {
      for(const g of picked){ for(const it of g.items){ let i=0; for(const fo of it.files){ i++; const bytes=await fetchFileBytes(fo.f);
        const suffix=it.files.length>1?("_"+i):""; outs.push({name:nm+"_"+safeName(dlItemLabel(it.name))+suffix+extOf(fo.f.name), blob:new Blob([bytes])}); } } }
    }
    await deliverEach(outs);
  }catch(e){ console.error(e); toast("다운로드 실패: "+e.message); }
}

function autoGrowMemo(t){ if(!t) return; t.style.height='auto'; t.style.height=(t.scrollHeight+2)+'px'; }
function debounceLogSync(){ clearTimeout(saveTimer); saveTimer=setTimeout(()=>{ state.updatedBy=deviceName||"미설정"; pushSnapshot(); scheduleSync(); }, 1200); }
function isEditing(){ const a=document.activeElement; return !!(a && (a.tagName==="TEXTAREA" || a.tagName==="INPUT" || a.isContentEditable)); }
function itemName(id,c){ let n=null; TEMPLATE.forEach(b=>b.groups.forEach(g=>g.items.forEach(it=>{if(it.id===id)n=it.name;}))); if(!n){ Object.values(c.extra||{}).forEach(arr=>arr.forEach(ex=>{if(ex.id===id)n=ex.name;})); } return n||id; }

function removeExtra(cid,bid,id){

}

function attachCertFiles(cid){
  if(!filesReady()){ toast("인증서 파일 첨부는 드라이브 연결 후 가능합니다"); return; }
  const inp=document.createElement("input"); inp.type="file"; inp.multiple=true;
  inp.onchange=async()=>{ const files=[...inp.files]; if(!files.length) return; const c=findClient(cid); if(!c.cert)c.cert={files:[],pw:""};
    for(const f of files){ if(f.size>100*1024*1024){ toast(`${f.name}: 100MB 초과`); continue; }
      setSync("saving"); toast(`${f.name} 업로드 중…`);
      try{ const buf=await f.arrayBuffer(); const b64=arrayBufferToBase64(buf);
        const j=await gwUpload(clientFolder(c)+"_인증서", f.name, f.type||"application/octet-stream", b64);
        c.cert.files.push({name:f.name,size:f.size,driveId:j.id,ts:now()});
      }catch(e){ toast(`${f.name} 실패: ${e.message}`); setSync("error"); } }
    touch(`[${c.name}] 공동인증서 첨부`); openCert(cid);
  };
  inp.click();
}
async function openCertFile(cid,idx){ const c=findClient(cid); const f=(c.cert.files||[])[idx]; if(!f) return; await downloadBlobBySha(f); }
async function removeCertFile(cid,idx){ const c=findClient(cid); const f=(c.cert.files||[])[idx]; if(!f) return; if(!confirm(`'${f.name}' 인증서 파일을 삭제할까요?`)) return;
  if(f.driveId){ try{ await gwDelete(f.driveId); }catch(_){} }
  else if(githubReady() && f.path){ try{ await fetch(ghContentsUrl(f.path),{method:"DELETE",headers:Object.assign({"Content-Type":"application/json"},ghHeaders()),body:JSON.stringify({message:`delete cert ${f.name}`,sha:f.sha,branch:cfg.branch})}); }catch(_){} }
  c.cert.files.splice(idx,1); touch(`[${c.name}] 인증서 삭제`); openCert(cid);
}
async function downloadBlobBySha(f){ toast("파일 여는 중…"); try{ const bytes=await fetchFileBytes(f); dlBlob(new Blob([bytes]), f.name); }catch(e){ toast("열기 실패: "+e.message); } }

function deleteClient(id){

/* 의뢰인 공개/비공개 (기본 비공개=관리자만, 공개=이준 직원·해당 원사무실에 노출). 실제 접근차단은 컷오버에서 RLS로. */

function batchSel(cid,action){ const c=findClient(cid); if(selSet.size===0){ toast("선택된 항목이 없습니다"); return; }
  let n=0; selSet.forEach(id=>{ const s=c.items[id]; if(!s) return; n++;
    if(action==="requesting"){ s.mode="request"; s.reqTag="requesting"; if(!s.reqDate)s.reqDate=now(); s.done=false; s.rejected=false; }
    else if(action==="received"){ s.done=true; s.recvDate=now(); s.rejected=false; if(s.mode==="request")s.reqTag="received"; }
    else if(action==="reject"){ s.rejected=true; s.done=false; if(s.mode==="request"&&s.reqTag==="received")s.reqTag="requesting"; }
    else if(action==="none"){ s.reqTag="none"; s.done=false; s.reqDate=null; }
  });
  touch(`[${c.name}] 선택 ${n}개 일괄 처리`); renderDetail(cid); toast(`${n}개 처리됨 ✓`); }

function copyText(t){
  if(navigator.clipboard && navigator.clipboard.writeText){
    return navigator.clipboard.writeText(t).then(()=>true).catch(()=>fallbackCopy(t));
  }
  return Promise.resolve(fallbackCopy(t));
}
function fallbackCopy(t){ const ta=document.createElement("textarea"); ta.value=t; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.focus(); ta.select(); let ok=false; try{ok=document.execCommand("copy");}catch(_){} document.body.removeChild(ta); return ok; }

function cleanMsgName(n){ return (n||"").replace(/채무자\s*/g,"").trim(); } /* 요청 메시지에는 '채무자' 단어 미표기 */
function buildRequestText(){
  const c=findClient(_msgCtx.cid);
  const firm=(c.firm||cfg.firmName||"법무법인").trim();
  const name=(c.name||"").trim();
  const items=_msgCtx.list.filter(x=>_msgCtx.sel.has(x.id));
  const how=_msgCtx.how;
  if(items.length===0) return "(포함할 서류를 1개 이상 선택하세요)";
  const remind = _msgCtx.kind==="reminder";
  let t="";
  if(_msgCtx.tone==="formal"){
    t+= remind
      ? `[${firm}] 안녕하세요, ${name}님.\n지난번에 요청드린 아래 서류가 아직 도착하지 않아 다시 안내드립니다. 번거로우시겠지만 준비되는 대로 보내주시면 감사하겠습니다.\n\n`
      : `[${firm}] 안녕하세요, ${name}님.\n개인회생 사건 진행을 위해 아래 서류가 필요합니다. 준비되는 대로 보내주시면 감사하겠습니다.\n\n`;
    items.forEach((x,i)=>{ t+=`${i+1}. ${cleanMsgName(x.name)}\n`; if(how && msgWhere(x.id)) t+=`   ↳ ${msgWhere(x.id)}\n`; });
    t+=`\n사진 또는 파일(PDF)로 보내주시면 됩니다. 문의사항은 편하게 연락 주세요.\n감사합니다.`;
  } else if(_msgCtx.tone==="simple"){
    t+= remind ? `${name}님, 지난번 요청드린 서류 중 아직 못 받은 항목입니다.\n\n` : `${name}님, 개인회생 진행에 필요한 서류입니다.\n\n`;
    items.forEach(x=>{ t+=`- ${cleanMsgName(x.name)}`; if(how && msgWhere(x.id)) t+=` (${msgWhere(x.id)})`; t+=`\n`; });
    t+=`\n준비되는 대로 보내주세요. 감사합니다. - ${firm}`;
  } else { // kakao
    t+= remind ? `${name}님 안녕하세요 😊\n지난번에 부탁드린 서류 중 아직 안 온 것들이에요! 확인 부탁드려요 🙏\n\n` : `${name}님 안녕하세요 😊\n개인회생 준비로 아래 서류가 필요해요!\n\n`;
    items.forEach(x=>{ t+=`✅ ${cleanMsgName(x.name)}`; if(how && msgWhere(x.id)) t+=`\n   → ${msgWhere(x.id)}`; t+=`\n`; });
    t+=`\n준비되면 사진이나 파일로 보내주시면 됩니다 🙏\n- ${firm}`;
  }
  return t;

/* ---------- 7b-2. 요청/리마인더 메시지 기록(날짜+본문) ---------- */
function logMessage(c, text, via){
  if(!c || !text || !text.trim()) return;
  text=text.trim();
  if(!c.msgLog) c.msgLog=[];
  const last=c.msgLog[c.msgLog.length-1];
  if(last && last.text===text && (Date.now()-new Date(last.ts).getTime())<60000) return; // 1분 내 동일내용 중복 방지
  const items=(_msgCtx && _msgCtx.list)?_msgCtx.list.filter(x=>_msgCtx.sel.has(x.id)).map(x=>x.name):[];
  c.msgLog.push({ ts:now(), kind:(_msgCtx?_msgCtx.kind:"request"), tone:(_msgCtx?_msgCtx.tone:""), via:via||"", items, text });
  if(c.msgLog.length>60) c.msgLog=c.msgLog.slice(-60);
}
function saveMsgDraft(){
  const ta=$("#msgText"); const text=ta?ta.value:""; if(!text.trim()){ toast("저장할 메시지가 없습니다"); return; }
  const c=findClient(_msgCtx.cid);
  logMessage(c, text, "저장");
  touch(`[${c.name}] ${_msgCtx.kind==="reminder"?"리마인더":"요청 메시지"} 기록 저장`);

function openMsgHistory(cid){
