<style>

<script>
 const SUPABASE_URL="https://zxwsfwhyjkixsnfpzpkt.supabase.co";
 const SUPABASE_ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4d3Nmd2h5amtpeHNuZnB6cGt0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0NjUxMzIsImV4cCI6MjA5ODA0MTEzMn0.mHfZJNRMmH-I2XI3ISutaYNemIbjKvWzFlOzMLmi-aQ";

 let MYROLE="office",MYNAME="",officeColor={},OFFNAME={},CLIENTS=[],PCT={},MISS={},viewF="all",searchQ="",officeF="";
 let VIEWAS=null;
 let DOCS=[],DCID=null,DSEL=new Set(),PV={};

 const toast=(m)=>{const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),2000);};
 const esc=(s)=>(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
 const effRole=()=>VIEWAS?"office":MYROLE;
 const canEdit=()=>effRole()==="master"||effRole()==="staff";
 const isMaster=()=>effRole()==="master";
 const fmtDt=(s)=>{if(!s)return"";const d=new Date(s);const M=d.getMonth()+1,D=d.getDate(),h=String(d.getHours()).padStart(2,"0"),m=String(d.getMinutes()).padStart(2,"0");return `${M}/${D} ${h}:${m}`;};
 function togglePw(){const p=$("#pw"),b=$("#pweye");if(!p)return;if(p.type==="password"){p.type="text";if(b)b.textContent="숨기기";}else{p.type="password";if(b)b.textContent="보기";}}
 const opts=(list,cur)=>list.map(o=>`<option ${o===(cur||"")?"selected":""}>${o||"선택"}</option>`).join("");
 function dday(ds){ if(!ds) return null; const today=new Date(new Date().toDateString()); const d=Math.ceil((new Date(ds+"T00:00:00")-today)/86400000);
   return {d,cls:d<=3?"soon":(d<=7?"warn":"norm"),txt:d>=0?("D-"+d):("D+"+(-d))}; }

 $("#loginForm").addEventListener("submit",async(e)=>{
   e.preventDefault();const b=$("#loginBtn"),er=$("#err");er.style.display="none";b.disabled=true;b.textContent="로그인 중…";
   const {error}=await db.auth.signInWithPassword({email:$("#email").value.trim(),password:$("#pw").value});

   load();
 });
 $("#logoutBtn").addEventListener("click",async()=>{await db.auth.signOut();$("#appView").classList.add("hidden");$("#loginView").classList.remove("hidden");$("#pw").value="";});
 $("#filters").addEventListener("click",e=>{const b=e.target.closest(".fchip");if(!b)return;document.querySelectorAll(".fchip").forEach(c=>c.classList.remove("on"));b.classList.add("on");viewF=b.dataset.v;renderList();});
 function onSearch(v){searchQ=v;renderList();}
 function onOffice(v){officeF=v;renderList();}
 $("#pvModal").addEventListener("click",e=>{if(e.target.id==="pvModal")closePreview();});
 document.addEventListener("keydown",e=>{if(e.key==="Escape")closePreview();});

 async function load(){
   $("#loginView").classList.add("hidden");$("#appView").classList.remove("hidden");
   $("#detailWrap").classList.add("hidden");$("#listWrap").classList.remove("hidden");
   const _aw=$("#adminWrap");if(_aw)_aw.classList.add("hidden");
   const {data:{session}}=await db.auth.getSession(); if(!session) return;
   const {data:prof}=await db.from("profiles").select("role,name").eq("id",session.user.id).single();
   MYROLE=prof?.role||"office"; MYNAME=prof?.name||"";
   $("#who").textContent=(MYNAME?MYNAME+" · ":"")+(ROLE_KO[MYROLE]||MYROLE);
   const _ab=$("#adminBtn");if(_ab)_ab.style.display=(MYROLE==="master")?"":"none";
   const [offRes,cliRes,progRes,itemRes]=await Promise.all([
     db.from("offices").select("id,name").order("name"),
     db.from("clients").select("id,name,office_id,case_type,stage,amending,assignee,phone,income_type,asset_type,income_note,asset_note,court_deadline,deadline_kind,urgent,pinned,archived,is_public").order("name"),
     db.rpc("my_progress"),
     db.from("checklist_items").select("client_id,doc_name,status")
   ]);
   officeColor={};OFFNAME={};
   (offRes.data||[]).forEach((o,i)=>{ const ours=(o.type==="ours")||((o.name||"").includes("이준")); officeColor[o.id]= ours ? {bg:"#FDECEF",dash:"#f0c9d2",dot:"#9B1B33"} : PALETTE[i%PALETTE.length]; OFFNAME[o.id]=o.name;});
   PCT={};(progRes.data||[]).forEach(r=>PCT[r.client_id]=r.pct);
   MISS={};
   (itemRes.data||[]).forEach(it=>{if(it.status==="미요청"||it.status==="요청중"){(MISS[it.client_id]=MISS[it.client_id]||[]).push(it.doc_name);}});
   CLIENTS=cliRes.data||[];
   if(effRole()!=="master") CLIENTS=CLIENTS.filter(c=>c.is_public); // 작성팀·원사무실은 공개된 의뢰인만
   renderPreviewBar();
   renderList();
 }
 function renderPreviewBar(){const el=$("#previewBar");if(!el)return;if(MYROLE!=="master"){el.innerHTML="";return;}
   if(VIEWAS){el.innerHTML=`<div class="pvbanner">원사무실 미리보기 · <b>${esc(OFFNAME[VIEWAS]||"")}</b> 가 보는 화면입니다<button class="pvexit" onclick="exitPreview()">미리보기 끝내기</button></div>`;}
   else{const offs=Object.keys(OFFNAME).map(id=>({id,name:OFFNAME[id]})).filter(o=>o.name!=="우리(이준 서초)");
     el.innerHTML=`<div class="pvpick">관리자 도구: 원사무실 화면 미리보기 <select id="pvSel"><option value="">사무실 선택</option>${offs.map(o=>`<option value="${o.id}">${esc(o.name)}</option>`).join("")}</select></div>`;
     const s=$("#pvSel");if(s)s.onchange=()=>{if(s.value)setPreview(s.value);};}
 }
 function setPreview(id){VIEWAS=id;load();window.scrollTo(0,0);}
 function exitPreview(){VIEWAS=null;load();}

 function renderDash(active){
   const el=$("#dash");if(!el)return;
   if(!canEdit()){el.innerHTML="";return;}   // 원사무소: 사무소별 안 보임 (핵심 숫자+파이프라인만)
   const offIds=[...new Set(active.map(c=>c.office_id))];
   const rows=offIds.map(id=>{
     const cs=active.filter(c=>c.office_id===id);
     const avg=cs.length?Math.round(cs.reduce((s,c)=>s+(PCT[c.id]||0),0)/cs.length):0;
     const col=officeColor[id]||{dot:"#9B1B33"};
     return `<div class="db-orow"><span class="db-dot" style="background:${col.dot}"></span><span class="db-nm">${esc(OFFNAME[id]||"사무소")}</span><span class="db-tr"><i style="width:${avg}%;background:${col.dot}"></i></span><span class="db-pc">${cs.length}건 · ${avg}%</span></div>`;
   }).join("");
   el.innerHTML=`<div class="db-h">사무소별 현황</div>`+(rows||`<div class="sd">없음</div>`);
 }
 function dbFilter(v){ viewF=v; document.querySelectorAll(".fchip").forEach(c=>c.classList.toggle("on",c.dataset.v===v)); renderList(); }
 function renderList(){
   const active=CLIENTS.filter(c=>!c.archived);
   const stN={}; STAGES.forEach(s=>stN[s]=active.filter(c=>c.stage===s).length);
   const received=active.length, inProg=stN["서류취합중"]||0, filed=(stN["접수완료"]||0)+(stN["개시결정"]||0)+(stN["인가결정"]||0);
   const maxS=STAGES.reduce((a,b)=>(stN[b]>stN[a]?b:a),STAGES[0]);
   $("#board").innerHTML=
     `<div class="db-kpis"><div class="db-kpi"><div class="v">${received}</div><div class="l">받은 사건</div></div><div class="db-kpi"><div class="v">${inProg}</div><div class="l">취합 중</div></div><div class="db-kpi"><div class="v">${filed}</div><div class="l">접수 완료</div></div></div>`+
     `<div class="db-h">단계별 사건</div><div class="db-pipe">`+STAGES.map(s=>`<div class="db-st ${(s===maxS&&stN[s]>0)?'hot':''}" onclick="dbFilter('${s}')"><div class="n">${stN[s]}</div><div class="x">${esc(s)}</div></div>`).join("")+`</div>`;
   renderDash(active);
   const offIds=[...new Set(CLIENTS.map(c=>c.office_id))];
   const offOpts=offIds.map(id=>`<option value="${id}" ${officeF===id?"selected":""}>${esc(OFFNAME[id]||"")}</option>`).join("");
   $("#toolbar").innerHTML = canEdit()
     ? `<button class="tbtn" onclick="openNewClient()" style="background:var(--primary);color:#fff;border-color:var(--primary)">+ 새 의뢰인</button><select class="sel" onchange="onOffice(this.value)"><option value="">전체 원사무실</option>${offOpts}</select><button class="tbtn" onclick="exportXlsx()">엑셀 내보내기</button><button class="tbtn" onclick="copySummary()">현황 요약 복사</button>` : "";
   let arr=CLIENTS.filter(c=> viewF==="archived"? c.archived : !c.archived);
   if(STAGES.includes(viewF)) arr=arr.filter(c=>c.stage===viewF);
   else if(viewF==="amending") arr=arr.filter(c=>c.amending);
   else if(viewF==="urgent") arr=arr.filter(c=>c.urgent);
   if(VIEWAS) arr=arr.filter(c=>c.office_id===VIEWAS);
   if(officeF) arr=arr.filter(c=>c.office_id===officeF);
   const q=(searchQ||"").trim().toLowerCase();
   if(q) arr=arr.filter(c=>(c.name||"").toLowerCase().includes(q)||(c.assignee||"").toLowerCase().includes(q)||(OFFNAME[c.office_id]||"").toLowerCase().includes(q));
   arr.sort((a,b)=>(b.pinned-a.pinned)||(b.urgent-a.urgent)||a.name.localeCompare(b.name,"ko"));
   const wrap=$("#cards");wrap.innerHTML="";
   if(arr.length===0){$("#emptyMsg").classList.remove("hidden");return;}$("#emptyMsg").classList.add("hidden");
   arr.forEach(c=>{
     const col=officeColor[c.office_id]||PALETTE[0];const p=PCT[c.id]||0;const ringc=p>=100?"var(--green)":"var(--kakao)";
     const mlist=MISS[c.id]||[];const dd=dday(c.court_deadline);
     let infoHtml,actBtn;
     if(effRole()==="office"){
       infoHtml=`<div class="lab">진행 상태</div><div class="val ${p>=100?'ok':''}">${p>=100?'취합 완료':'취합 진행 중'} (${p}%)</div>`;actBtn="";
     } else {
       infoHtml = mlist.length>0
         ? `<div class="lab">미수령 ${mlist.length}건</div><div class="val" style="font-size:13.5px;font-weight:600">${mlist.slice(0,3).map(esc).join("<br>")}${mlist.length>3?`<div class="sd" style="margin-top:3px">외 ${mlist.length-3}건</div>`:""}</div>`
         : `<div class="lab">취합 상태</div><div class="val ok">취합 완료</div>`;
       actBtn = (c.stage!=="인가결정")?`<button class="btn go" onclick="nextStage('${c.id}','${c.stage}')">다음 단계로</button>`:"";
     }
     const marks=(c.pinned?`<span class="mk pin">중요</span>`:"")+(c.urgent?`<span class="mk urgent">급건</span>`:"");
     const ddBadge=(dd&&canEdit())?`<span class="dday ${dd.cls}">${esc(c.deadline_kind||"기한")} ${dd.txt}</span>`:"";
     const amBadge=c.amending?`<span class="amend">보정중</span>`:"";
     const card=document.createElement("div");
     card.className="card";card.style.background=col.bg;card.style.border="1px solid "+col.dash;
     card.innerHTML=`<div class="ch"><div><div class="nm">${esc(c.name)} <span class="ctype">${esc(c.case_type||"개인회생")}</span></div>`+
       `<div class="of"><span class="ofchip" style="background:#fff;border:1px solid ${col.dash}"><span class="odot" style="background:${col.dot}"></span>${esc(OFFNAME[c.office_id]||"사무소")}</span>${c.assignee?" · "+esc(c.assignee):""}${canEdit()?`<label class="sw" style="margin-left:8px;vertical-align:-5px" title="원사무실 공개 여부"><input type="checkbox" ${c.is_public?"checked":""} onclick="event.stopPropagation()" onchange="setFlag('${c.id}','is_public',this.checked)"><span></span></label><span style="font-size:12px;font-weight:700;color:${c.is_public?"#0A7D3C":"#9a948c"};margin-left:5px;vertical-align:middle">${c.is_public?"공개":"비공개"}</span>`:""}</div></div>`+
       `<div class="chr"><span class="pill ${esc(c.stage)}">${esc(c.stage)}</span>${amBadge}${ddBadge}${marks?`<div>${marks}</div>`:""}</div></div>`+
       `<div class="bodyc"><div class="ring" style="background:conic-gradient(${ringc} calc(${p}*3.6deg), #eceae7 0)"><div class="hole"><b>${p}%</b><small>완료율</small></div></div>`+
       `<div class="info">${infoHtml}</div></div>`+actBtn+
       `<button class="btn ghost" onclick="openDetail('${c.id}')">상세 보기</button>`;
     wrap.appendChild(card);
   });
 }

 // ===== 엑셀 / 요약 =====
 function exportXlsx(){
   const arr=CLIENTS.filter(c=>!c.archived).slice().sort((a,b)=>a.name.localeCompare(b.name,"ko"));
   const rows=arr.map(c=>({"이름":c.name,"원사무소":OFFNAME[c.office_id]||"",사건종류:c.case_type||"",단계:c.stage,보정중:c.amending?"O":"",완료율:(PCT[c.id]||0)+"%",담당자:c.assignee||"",연락처:c.phone||"",법원기한:c.court_deadline||"",기한종류:c.deadline_kind||""}));
   if(!rows.length){toast("내보낼 의뢰인이 없습니다");return;}
   const ws=XLSX.utils.json_to_sheet(rows);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"의뢰인현황");
   XLSX.writeFile(wb,"케이스허브_의뢰인현황.xlsx");toast("엑셀로 내보냈습니다.");
 }
 function copySummary(){

   let t="[케이스허브 현황] "+new Date().toLocaleDateString("ko-KR")+"\n";

 // ===== 접수서류 =====
 function ftype(n){const e=((n||"").split(".").pop()||"").toLowerCase();if(e==="pdf")return"pdf";if(["doc","docx","hwp"].includes(e))return"doc";if(["xls","xlsx","csv"].includes(e))return"xls";if(["jpg","jpeg","png","gif","webp","bmp"].includes(e))return"img";return"etc";}
 function canPreview(n){const t=ftype(n);return t==="pdf"||t==="img";}
 function saveBlob(b,n){const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=n;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(u),10000);}
 function curDocs(){const q=(($("#docQ")&&$("#docQ").value)||"").toLowerCase();return DOCS.filter(d=>!q||(d.file_name||"").toLowerCase().includes(q));}
 function updDocSel(){const s=$("#docSel");if(s)s.textContent="선택 "+DSEL.size;const vis=curDocs();const all=$("#docAll");if(all)all.checked=vis.length>0&&vis.every(d=>DSEL.has(d.id));}
 function renderDocs(){const box=$("#docsBox");if(!box)return;const list=curDocs();
   box.innerHTML=list.length?list.map(d=>{const ext=ftype(d.storage_path||d.file_name);return `<div class="docrow"><input type="checkbox" class="dchk" data-id="${d.id}" ${DSEL.has(d.id)?"checked":""}><span class="ft ${ext}">${ext.toUpperCase()}</span><span class="dname">${esc(d.file_name)}</span><span class="dright">`+(canEdit()?`<span class="chk"><label class="sw"><input type="checkbox" ${d.is_public?"checked":""} onchange="setDoc('${d.id}','${DCID}',this.checked)"><span></span></label> 공개</span>`:`<span class="badge ${d.is_public?"b-pub":"b-int"}">${d.is_public?"공개":"내부"}</span>`)+(canPreview(d.storage_path||d.file_name)?`<button class="prev" data-id="${d.id}">미리보기</button>`:"")+(canEdit()?`<button class="ren" data-id="${d.id}">이름변경</button>`:"")+`<button class="getdl" data-id="${d.id}" title="받기" aria-label="받기"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="M7 11l5 5 5-5"/><path d="M5 21h14"/></svg></button>`+(canEdit()?`<button class="del" data-id="${d.id}" title="삭제" aria-label="삭제"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M6 6l1 14h10l1-14"/><path d="M10 11v6M14 11v6"/></svg></button>`:"")+`</span></div>`;}).join(""):'<div class="sd">등록된 서류가 없습니다.</div>';
   box.querySelectorAll(".dchk").forEach(cb=>cb.onchange=()=>{cb.checked?DSEL.add(cb.dataset.id):DSEL.delete(cb.dataset.id);updDocSel();});
   box.querySelectorAll(".getdl").forEach(b=>b.onclick=()=>{const d=DOCS.find(x=>x.id===b.dataset.id);if(d)dlOne(d.storage_path,d.file_name);});
   box.querySelectorAll(".prev").forEach(b=>b.onclick=()=>{const d=DOCS.find(x=>x.id===b.dataset.id);if(d)preview(d.storage_path,d.file_name,d.id);});
   box.querySelectorAll(".ren").forEach(b=>b.onclick=()=>renameDoc(b.dataset.id));
   box.querySelectorAll(".del").forEach(b=>b.onclick=()=>deleteDoc(b.dataset.id));
   if(canEdit()){box.ondragover=(e)=>{e.preventDefault();box.classList.add("drag");};box.ondragleave=()=>box.classList.remove("drag");box.ondrop=(e)=>{e.preventDefault();box.classList.remove("drag");const fs=[...((e.dataTransfer&&e.dataTransfer.files)||[])];if(fs.length)uploadFiles(fs);};}
   updDocSel();}
 async function preview(path,name,id){if(!path){toast("이 항목은 시험용(파일 없음)입니다");return;}const {data,error}=await db.storage.from("docs").createSignedUrl(path,600);if(error||!data){toast("미리보기 실패: 권한 또는 파일 없음");return;}const url=data.signedUrl;const t=ftype(path||name);PV={docId:id,path,name,type:t,url};if(t!=="pdf"&&t!=="img"){window.open(url,"_blank");return;}const body=$("#pvBody");$("#pvName").textContent=name||"미리보기";if(t==="img"){body.innerHTML=`<img src="${url}" alt="">`;}else{body.innerHTML="";renderPdfPreview(body);}$("#pvOpen").href=url;const eb=$("#pvEdit");if(eb)eb.classList.toggle("hidden",!(canEdit()&&(t==="img"||t==="pdf")));$("#pvModal").classList.remove("hidden");}
 function closePreview(){const m=$("#pvModal");if(m)m.classList.add("hidden");const b=$("#pvBody");if(b)b.innerHTML="";}
 async function renderPdfPreview(body){
   if(!window.pdfjsLib){body.innerHTML=`<iframe src="${PV.url}"></iframe>`;return;}
   body.innerHTML=`<div class="pvpdf" id="pvpdf"></div>`;
   const cont=$("#pvpdf");
   try{
     const {data,error}=await db.storage.from("docs").download(PV.path);
     if(error||!data) throw new Error("dl");
     const buf=await data.arrayBuffer();
     const pdf=await pdfjsLib.getDocument({data:buf}).promise;
     const targetW=Math.min((cont.clientWidth||800)-24,880);
     for(let i=1;i<=pdf.numPages;i++){
       const page=await pdf.getPage(i);
       const base=page.getViewport({scale:1});
       const vp=page.getViewport({scale:targetW/base.width});
       const cv=document.createElement("canvas");cv.width=vp.width;cv.height=vp.height;cv.className="pvpdfpage";
       cont.appendChild(cv);
       await page.render({canvasContext:cv.getContext("2d"),viewport:vp}).promise;
     }
   }catch(e){body.innerHTML=`<iframe src="${PV.url}"></iframe>`;}
 }
 function pickFiles(){const inp=document.createElement("input");inp.type="file";inp.multiple=true;inp.onchange=()=>uploadFiles([...inp.files]);inp.click();}
 async function uploadFiles(files){
   if(!files.length)return;
   toast("업로드 중...");
   let ok=0,fail=0,lastErr="";
   for(const f of files){
     const ext=((f.name||"").match(/\.[A-Za-z0-9]+$/)||[""])[0].toLowerCase();
     const path=`clients/${DCID}/${Date.now()}_${Math.random().toString(36).slice(2,8)}${ext}`;
     const up=await db.storage.from("docs").upload(path,f,{contentType:f.type||undefined,upsert:false});
     if(up.error){fail++;lastErr=up.error.message||String(up.error);console.error("storage upload error:",up.error);continue;}
     const ins=await db.from("documents").insert({client_id:DCID,file_name:f.name,storage_path:path,uploaded_by:MYNAME||"직원",is_public:false});
     if(ins.error){fail++;lastErr=ins.error.message||String(ins.error);console.error("documents insert error:",ins.error);await db.storage.from("docs").remove([path]);continue;}
     ok++;
   }
   if(ok)logAct(DCID,`접수서류 ${ok}건 업로드`);
   if(ok&&!fail)toast(`업로드 완료 (${ok}건)`);
   else if(ok&&fail)toast(`${ok}건 완료 · ${fail}건 실패: ${lastErr}`);
   else toast(`업로드 실패: ${lastErr}`);
   openDetail(DCID);
 }
 async function dlOne(path,name){if(!path){toast("이 항목은 시험용(파일 없음)입니다");return;}const {data,error}=await db.storage.from("docs").download(path);if(error){toast("다운로드 실패: 권한 또는 파일 없음");return;}saveBlob(data,name);}
 async function dlZip(list){if(!list.length){toast("선택된 파일이 없습니다");return;}if(!window.JSZip){toast("압축 모듈 로딩 중, 잠시 후 다시");return;}toast("압축 준비 중...");const zip=new JSZip();let ok=0;for(const d of list){if(!d.storage_path)continue;const {data,error}=await db.storage.from("docs").download(d.storage_path);if(!error&&data){zip.file(d.file_name,data);ok++;}}if(ok===0){toast("받을 수 있는 파일이 없습니다");return;}const blob=await zip.generateAsync({type:"blob"});saveBlob(blob,"접수서류.zip");toast(ok+"건 ZIP 다운로드");}

 function imgToPngBytes(ab){return new Promise((res,rej)=>{const url=URL.createObjectURL(new Blob([ab]));const im=new Image();im.onload=()=>{const c=document.createElement("canvas");c.width=im.naturalWidth;c.height=im.naturalHeight;c.getContext("2d").drawImage(im,0,0);c.toBlob(b=>{if(!b){rej(new Error("img"));return;}b.arrayBuffer().then(res);},"image/png");};im.onerror=()=>rej(new Error("img"));im.src=url;});}
 async function mergeSelected(cid){if(!window.PDFLib){toast("병합 모듈 로딩 중, 잠시 후 다시");return;}const sel=DOCS.filter(d=>DSEL.has(d.id)&&d.storage_path);if(sel.length<2){toast("병합할 파일을 2개 이상 선택하세요");return;}toast("병합 중...");try{const out=await PDFLib.PDFDocument.create();for(const d of sel){const {data,error}=await db.storage.from("docs").download(d.storage_path);if(error||!data)continue;const ab=await data.arrayBuffer();const t=ftype(d.storage_path);if(t==="pdf"){const src=await PDFLib.PDFDocument.load(ab);const ps=await out.copyPages(src,src.getPageIndices());ps.forEach(p=>out.addPage(p));}else if(t==="img"){try{const png=await imgToPngBytes(ab);const im=await out.embedPng(png);const pg=out.addPage([im.width,im.height]);pg.drawImage(im,{x:0,y:0,width:im.width,height:im.height});}catch(e){}}}if(out.getPageCount()===0){toast("병합할 수 있는 PDF·이미지가 없습니다");return;}const bytes=await out.save();const path=`clients/${cid}/${Date.now()}_merged.pdf`;const up=await db.storage.from("docs").upload(path,new Blob([bytes],{type:"application/pdf"}),{contentType:"application/pdf"});if(up.error){toast("병합 저장 실패: "+up.error.message);return;}await db.from("documents").insert({client_id:cid,file_name:`병합_${new Date().toISOString().slice(0,10)}.pdf`,storage_path:path,uploaded_by:MYNAME||"직원",is_public:false});logAct(cid,`서류 ${sel.length}개 PDF 병합`);toast("병합 PDF를 만들었습니다.");openDetail(cid);}catch(e){toast("병합 실패: "+e.message);console.error(e);}}

   drawImg();
 }
 function rotatedSize(){const w=IMG.img.naturalWidth,h=IMG.img.naturalHeight;return (IMG.rot%180===0)?{w,h}:{w:h,h:w};}
 function drawImg(){
   const cv=$("#imgCanvas");if(!cv)return;const {w,h}=rotatedSize();cv.width=w;cv.height=h;
   const ctx=cv.getContext("2d");ctx.clearRect(0,0,w,h);ctx.save();ctx.translate(w/2,h/2);ctx.rotate(IMG.rot*Math.PI/180);
   ctx.drawImage(IMG.img,-IMG.img.naturalWidth/2,-IMG.img.naturalHeight/2);ctx.restore();
   IMG.crop=null;const cb=$("#imgCrop");if(cb)cb.classList.add("hidden");
 }
 function imgRot(d){IMG.rot=((IMG.rot+d)%360+360)%360;drawImg();}
 function imgClearCrop(){IMG.crop=null;const cb=$("#imgCrop");if(cb)cb.classList.add("hidden");}
 function imgCropMode(){
   const cv=$("#imgCanvas"),box=$("#imgCrop");if(!cv||!box)return;toast("이미지 위에서 드래그해 자를 영역을 지정하세요");
   let drag=null;
   cv.onpointerdown=(e)=>{cv.setPointerCapture(e.pointerId);const r=cv.getBoundingClientRect();const p=pt(e);drag={x0:p.x-r.left,y0:p.y-r.top,r};box.classList.remove("hidden");box.style.left=drag.x0+"px";box.style.top=drag.y0+"px";box.style.width="0px";box.style.height="0px";e.preventDefault();};
   cv.onpointermove=(e)=>{if(!drag)return;const p=pt(e);const x=p.x-drag.r.left,y=p.y-drag.r.top;const L=Math.min(x,drag.x0),T=Math.min(y,drag.y0),W=Math.abs(x-drag.x0),H=Math.abs(y-drag.y0);box.style.left=L+"px";box.style.top=T+"px";box.style.width=W+"px";box.style.height=H+"px";e.preventDefault();};
   cv.onpointerup=()=>{if(!drag)return;const cvr=cv.getBoundingClientRect();const bx=box.getBoundingClientRect();const sx=cv.width/cvr.width,sy=cv.height/cvr.height;IMG.crop={x:(bx.left-cvr.left)*sx,y:(bx.top-cvr.top)*sy,w:bx.width*sx,h:bx.height*sy};drag=null;};
 }
 async function imgSave(){
   const {w,h}=rotatedSize();const base=document.createElement("canvas");base.width=w;base.height=h;const bx=base.getContext("2d");
   bx.save();bx.translate(w/2,h/2);bx.rotate(IMG.rot*Math.PI/180);bx.drawImage(IMG.img,-IMG.img.naturalWidth/2,-IMG.img.naturalHeight/2);bx.restore();
   let outCv=base;
   if(IMG.crop&&IMG.crop.w>4&&IMG.crop.h>4){const c=document.createElement("canvas");c.width=Math.round(IMG.crop.w);c.height=Math.round(IMG.crop.h);c.getContext("2d").drawImage(base,IMG.crop.x,IMG.crop.y,IMG.crop.w,IMG.crop.h,0,0,c.width,c.height);outCv=c;}
   const mime=(PV.name||"").toLowerCase().endsWith(".png")?"image/png":"image/jpeg";
   outCv.toBlob(async(blob)=>{if(!blob){toast("저장 실패");return;}toast("저장 중...");
     const up=await db.storage.from("docs").upload(PV.path,blob,{contentType:mime,upsert:true});
     if(up.error){toast("저장 실패: "+up.error.message);return;}
     logAct(DCID,`이미지 편집 저장: ${PV.name}`);toast("편집한 이미지를 저장했습니다.");closePreview();openDetail(DCID);
   },mime,0.92);
 }

 // ---- PDF 편집: 페이지 삭제 / 순서 / 회전 ----
 let PDFED=null,PDFDRAG=null;
 async function openPdfEditor(){
   if(!window.pdfjsLib||!window.PDFLib){toast("편집 모듈 로딩 중, 잠시 후 다시 시도하세요");return;}
   toast("PDF 불러오는 중...");
   const {data,error}=await db.storage.from("docs").download(PV.path);
   if(error||!data){toast("PDF 불러오기 실패");return;}
   const buf=await data.arrayBuffer();
   try{const pdf=await pdfjsLib.getDocument({data:buf.slice(0)}).promise;
     PDFED={bytes:buf,pdf,pages:[]};
     for(let i=0;i<pdf.numPages;i++)PDFED.pages.push({idx:i,rot:0,del:false});
     buildPdfEditor();
   }catch(e){toast("PDF를 열 수 없습니다: "+e.message);}
 }
 function buildPdfEditor(){
   $("#pvName").textContent="PDF 편집 · "+(PV.name||"");
   $("#pvBody").innerHTML=`<div class="edwrap"><div class="edtools">`+
     `<label class="eb" style="display:inline-flex;align-items:center;gap:6px"><input type="checkbox" id="pdfAll" onchange="pdfSelAll(this.checked)"> 전체 선택</label>`+
     `<button class="eb" onclick="pdfDelSelected()">선택 삭제</button>`+
     `<span class="pdfnum" style="align-self:center">끌어서 순서변경 · 선택/개별 삭제 · 회전 후 저장</span>`+
     `<button class="eb save" onclick="pdfSave()" style="margin-left:auto">저장</button>`+
     `<button class="eb" onclick="preview(PV.path,PV.name,PV.docId)">편집 닫기</button>`+
     `</div><div class="pdfgrid" id="pdfGrid"></div></div>`;
   renderPdfGrid();
 }
 async function renderPdfGrid(){
   const grid=$("#pdfGrid");if(!grid)return;grid.innerHTML="";
   for(let pos=0;pos<PDFED.pages.length;pos++){
     const pg=PDFED.pages[pos];
     const cell=document.createElement("div");cell.className="pdfpage"+(pg.del?" del":"");
     cell.innerHTML=`<label class="pdfnum" style="display:flex;align-items:center;justify-content:center;gap:6px"><input type="checkbox" class="pdfsel" ${pg.sel?"checked":""} onchange="pdfToggleSel(${pos},this.checked)"> ${pos+1}쪽</label><canvas></canvas><div class="pdfpr">`+
       `<button onclick="pdfMove(${pos},-1)">←</button>`+
       `<button onclick="pdfRot(${pos})">↻</button>`+
       `<button onclick="pdfDel(${pos})">${pg.del?"복원":"삭제"}</button>`+
       `<button onclick="pdfMove(${pos},1)">→</button></div>`;
     grid.appendChild(cell);
     cell.draggable=true;cell.dataset.pos=pos;
     cell.addEventListener("dragstart",()=>{PDFDRAG=Number(cell.dataset.pos);cell.style.opacity=".4";});
     cell.addEventListener("dragend",()=>{cell.style.opacity="";});
     cell.addEventListener("dragover",(e)=>{e.preventDefault();cell.style.outline="2px dashed var(--primary)";});
     cell.addEventListener("dragleave",()=>{cell.style.outline="";});
     cell.addEventListener("drop",(e)=>{e.preventDefault();cell.style.outline="";const to=Number(cell.dataset.pos);if(PDFDRAG===null||PDFDRAG===to){PDFDRAG=null;return;}const a=PDFED.pages;const m=a.splice(PDFDRAG,1)[0];a.splice(to,0,m);PDFDRAG=null;renderPdfGrid();});
     try{const page=await PDFED.pdf.getPage(pg.idx+1);const base=page.getViewport({scale:1});const scale=150/base.width;
       const vp=page.getViewport({scale,rotation:pg.rot});const cv=cell.querySelector("canvas");cv.width=vp.width;cv.height=vp.height;
       await page.render({canvasContext:cv.getContext("2d"),viewport:vp}).promise;}catch(e){}
   }
 }
 function pdfRot(pos){PDFED.pages[pos].rot=(PDFED.pages[pos].rot+90)%360;renderPdfGrid();}
 function pdfDel(pos){PDFED.pages[pos].del=!PDFED.pages[pos].del;renderPdfGrid();}
 function pdfMove(pos,d){const np=pos+d;if(np<0||np>=PDFED.pages.length)return;const a=PDFED.pages;[a[pos],a[np]]=[a[np],a[pos]];renderPdfGrid();}
 function pdfToggleSel(pos,v){if(PDFED.pages[pos])PDFED.pages[pos].sel=v;}
 function pdfSelAll(v){PDFED.pages.forEach(p=>p.sel=v);renderPdfGrid();}
 function pdfDelSelected(){const n=PDFED.pages.filter(p=>p.sel).length;if(!n){toast("선택된 페이지가 없습니다");return;}PDFED.pages.forEach(p=>{if(p.sel){p.del=true;p.sel=false;}});renderPdfGrid();toast(`${n}쪽 삭제 표시(저장하면 반영)`);}
 async function pdfSave(){
   const kept=PDFED.pages.filter(p=>!p.del);
   if(!kept.length){toast("최소 한 페이지는 남겨야 합니다");return;}
   toast("PDF 저장 중...");
   try{
     const src=await PDFLib.PDFDocument.load(PDFED.bytes);
     const out=await PDFLib.PDFDocument.create();
     const copied=await out.copyPages(src,kept.map(p=>p.idx));
     copied.forEach((cp,i)=>{const add=kept[i].rot||0;const cur=(cp.getRotation&&cp.getRotation().angle)||0;cp.setRotation(PDFLib.degrees(((cur+add)%360+360)%360));out.addPage(cp);});
     const bytes=await out.save();
     const up=await db.storage.from("docs").upload(PV.path,new Blob([bytes],{type:"application/pdf"}),{contentType:"application/pdf",upsert:true});
     if(up.error){toast("저장 실패: "+up.error.message);return;}
     logAct(DCID,`PDF 편집 저장: ${PV.name} (${kept.length}쪽)`);toast("편집한 PDF를 저장했습니다.");closePreview();openDetail(DCID);
   }catch(e){toast("저장 실패: "+e.message);console.error(e);}
 }

 (async()=>{const {data:{session}}=await db.auth.getSession(); if(session) load();})();
